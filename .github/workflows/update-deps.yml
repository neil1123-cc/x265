name: Update Dependencies

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  update-deps:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Get latest FFmpeg release
        id: ffmpeg
        run: |
          TAG=$(curl -s "https://api.github.com/repos/FFmpeg/FFmpeg/tags?per_page=100" | \
            jq -r '.[].name' | \
            grep -E '^n[0-9]+\.[0-9]+$' | \
            sort -Vr | \
            head -1)
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "FFmpeg latest release: $TAG"

      - name: Get latest mimalloc release
        id: mimalloc
        run: |
          TAG=$(curl -s "https://api.github.com/repos/microsoft/mimalloc/tags?per_page=100" | \
            jq -r '.[].name' | \
            grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | \
            sort -Vr | \
            head -1)
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "mimalloc latest release: $TAG"

      - name: Get latest obuparse commit
        id: obuparse
        run: |
          SHA=$(curl -s "https://api.github.com/repos/dwbuiten/obuparse/commits?per_page=1" | \
            jq -r '.[0].sha')
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "obuparse latest commit: $SHA"

      - name: Get current versions
        id: current
        run: |
          FFMPEG=$(grep -oP 'default: n[0-9]+\.[0-9]+' .github/actions/setup-windows-deps/action.yml | head -1 | grep -oP 'n[0-9]+\.[0-9]+')
          MIMALLOC=$(grep -oP 'default: v[0-9]+\.[0-9]+\.[0-9]+' .github/actions/setup-windows-deps/action.yml | head -1 | grep -oP 'v[0-9]+\.[0-9]+\.[0-9]+')
          echo "ffmpeg=$FFMPEG" >> $GITHUB_OUTPUT
          echo "mimalloc=$MIMALLOC" >> $GITHUB_OUTPUT

          if [ -f .github/deps-cache.json ]; then
            OBUPARSE_SHA=$(jq -r '.obuparse // ""' .github/deps-cache.json)
          else
            OBUPARSE_SHA=""
          fi
          echo "obuparse_sha=$OBUPARSE_SHA" >> $GITHUB_OUTPUT

          echo "=== Current versions ==="
          echo "FFmpeg: $FFMPEG"
          echo "mimalloc: $MIMALLOC"
          echo "obuparse: $OBUPARSE_SHA"

      - name: Check for changes
        id: check
        run: |
          CHANGES=""
          NEED_BUILD="false"

          if [ "${{ steps.ffmpeg.outputs.tag }}" != "${{ steps.current.outputs.ffmpeg }}" ]; then
            CHANGES="${CHANGES}FFmpeg ${{ steps.current.outputs.ffmpeg }} -> ${{ steps.ffmpeg.outputs.tag }}, "
            NEED_BUILD="true"
            echo "ffmpeg_changed=true" >> $GITHUB_OUTPUT
          else
            echo "ffmpeg_changed=false" >> $GITHUB_OUTPUT
          fi

          if [ "${{ steps.mimalloc.outputs.tag }}" != "${{ steps.current.outputs.mimalloc }}" ]; then
            CHANGES="${CHANGES}mimalloc ${{ steps.current.outputs.mimalloc }} -> ${{ steps.mimalloc.outputs.tag }}, "
            NEED_BUILD="true"
            echo "mimalloc_changed=true" >> $GITHUB_OUTPUT
          else
            echo "mimalloc_changed=false" >> $GITHUB_OUTPUT
          fi

          if [ -n "${{ steps.current.outputs.obuparse_sha }}" ] && [ "${{ steps.obuparse.outputs.sha }}" != "${{ steps.current.outputs.obuparse_sha }}" ]; then
            CHANGES="${CHANGES}obuparse new commit, "
            NEED_BUILD="true"
            echo "obuparse_changed=true" >> $GITHUB_OUTPUT
          else
            echo "obuparse_changed=false" >> $GITHUB_OUTPUT
          fi

          if [ ! -f .github/deps-cache.json ]; then
            NEED_BUILD="true"
            CHANGES="${CHANGES}first run (initializing cache), "
            echo "first_run=true" >> $GITHUB_OUTPUT
          else
            echo "first_run=false" >> $GITHUB_OUTPUT
          fi

          echo "changes=${CHANGES%,*}" >> $GITHUB_OUTPUT
          echo "need_build=$NEED_BUILD" >> $GITHUB_OUTPUT

          if [ "$NEED_BUILD" = "true" ]; then
            echo "=== Changes detected: ${CHANGES%,*} ==="
          else
            echo "=== No changes detected ==="
          fi

      - name: Update dependency refs
        if: steps.check.outputs.ffmpeg_changed == 'true' || steps.check.outputs.mimalloc_changed == 'true'
        run: |
          sed -i "0,/default: n[0-9]\+\.[0-9]\+/s//default: ${{ steps.ffmpeg.outputs.tag }}/" .github/actions/setup-windows-deps/action.yml
          sed -i "0,/default: v[0-9]\+\.[0-9]\+\.[0-9]\+/s//default: ${{ steps.mimalloc.outputs.tag }}/" .github/actions/setup-windows-deps/action.yml

      - name: Update deps cache
        run: |
          cat > .github/deps-cache.json << EOF
          {
            "obuparse": "${{ steps.obuparse.outputs.sha }}",
            "updated_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF
          cat .github/deps-cache.json

      - name: Commit and push changes
        if: steps.check.outputs.need_build == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/actions/setup-windows-deps/action.yml .github/deps-cache.json
          git commit -m "Update dependencies: ${{ steps.check.outputs.changes }}" || echo "Nothing to commit"
          git push

      - name: Trigger CI build
        if: steps.check.outputs.need_build == 'true'
        run: |
          echo "Triggering CI build due to: ${{ steps.check.outputs.changes }}"
          echo "Build will be triggered automatically by the push event"
