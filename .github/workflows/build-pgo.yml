name: Build PGO

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (empty for artifact only)'
        required: false
        default: ''
      profdata_source:
        description: 'Source of profdata'
        required: true
        default: 'generate'
        type: choice
        options:
          - generate
          - branch

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    strategy:
      fail-fast: true
      matrix:
        target_cpu:
          - x86-64
          - haswell
          - skylake
          - alderlake
          - raptorlake
          - arrowlake
          - znver2
          - znver3
          - znver4
          - znver5
    steps:
    - name: Checkout x265
      uses: actions/checkout@v4
      with:
        path: x265
        fetch-depth: 0

    - name: Fetch profdata from branch
      if: inputs.profdata_source == 'branch'
      run: |
        cd x265
        git fetch origin profdata-${{ matrix.target_cpu }} --depth=1 || echo "Branch not found"
        git checkout profdata-${{ matrix.target_cpu }} -- x265.profdata 2>/dev/null || echo "profdata not found in branch"
        mkdir -p ../build
        mv x265.profdata ../build/x265.profdata 2>/dev/null || echo "No profdata to move"

    - name: Cache FFmpeg
      id: cache-ff
      uses: actions/cache@v4
      with:
        path: ffmpeg
        key: ffmpeg-n8.1-full-v1-clang

    - name: Checkout FFmpeg
      uses: actions/checkout@v4
      with:
        path: ffmpeg
        repository: FFmpeg/FFmpeg
        ref: n8.1
      if: steps.cache-ff.outputs.cache-hit != 'true'

    - name: Checkout mimalloc
      uses: actions/checkout@v4
      with:
        path: mimalloc
        repository: microsoft/mimalloc
        ref: v3.2.8

    - name: Checkout obuparse
      uses: actions/checkout@v4
      with:
        path: obuparse
        repository: dwbuiten/obuparse

    - name: Checkout L-SMASH
      uses: actions/checkout@v4
      with:
        path: lsmash
        repository: vimeo/l-smash

    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: CLANG64
        update: true
        install: >-
          p7zip
          base-devel
          git
          autoconf
          automake
          libtool
          mingw-w64-clang-x86_64-nasm
          mingw-w64-clang-x86_64-toolchain
          mingw-w64-clang-x86_64-cmake
          mingw-w64-clang-x86_64-ninja

    - name: Compile FFmpeg (full with avfilter)
      run: |
        PGO_OPT="--enable-avdevice --enable-avfilter --enable-ffmpeg --enable-indev=lavfi"
        for f in testsrc testsrc2 smptebars nullsrc geq gradients format scale; do
          PGO_OPT="$PGO_OPT --enable-filter=$f"
        done
        ./configure --prefix=/usr/local --enable-gpl --enable-version3 \
          --disable-runtime-cpudetect --disable-all --disable-autodetect \
          --enable-avformat --enable-avcodec --enable-swscale --enable-swresample \
          --disable-everything --disable-network $PGO_OPT \
          --enable-demuxer=mpegts,mov,matroska,h264,hevc,rawvideo,yuv4mpegpipe \
          --enable-decoder=h264,hevc,ffv1,ffvhuff,huffyuv,rawvideo,wrapped_avframe,aac,ac3,mp3 \
          --enable-encoder=rawvideo,aac,ac3,mp2,pcm_s16le,pcm_s24le,pcm_s32le \
          --enable-muxer=yuv4mpegpipe \
          --enable-protocol=file,pipe \
          --cc=cc --cxx=c++ --cpu=x86-64
        make -j$(nproc)
      working-directory: ffmpeg
      if: steps.cache-ff.outputs.cache-hit != 'true'

    - name: Get rid of .dll.a
      run: find /*64/ /usr/ -type f -name "*.dll.a" -print -delete

    - name: Install FFmpeg
      run: make install
      working-directory: ffmpeg

    - name: Compile mimalloc
      run: |
        mkdir build
        cd build
        cmake -GNinja .. -DCMAKE_INSTALL_PREFIX=/usr/local -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=ON \
          -DMI_BUILD_SHARED=OFF -DMI_BUILD_STATIC=ON -DMI_BUILD_OBJECT=OFF -DMI_BUILD_TESTS=OFF -DMI_USE_CXX=ON
        ninja
      working-directory: mimalloc

    - name: Install mimalloc
      run: ninja install
      working-directory: mimalloc/build

    - name: Compile obuparse
      run: make CC=cc libobuparse.a
      working-directory: obuparse

    - name: Install obuparse
      run: |
        install -d /usr/local/include
        install -d /usr/local/lib
        install -v obuparse.h /usr/local/include
        install -v libobuparse.a /usr/local/lib
      working-directory: obuparse

    - name: Compile L-SMASH
      run: |
        ./configure --prefix=/usr/local --cc=cc --extra-cflags="-I/usr/local/include" \
          --extra-ldflags="-L/usr/local/lib" --extra-libs="-lobuparse"
        make -j$(nproc)
      working-directory: lsmash

    - name: Install L-SMASH
      run: |
        make install
        cp importer/importer.h /usr/local/include/lsmash_importer.h
      working-directory: lsmash

    - name: Setup build dir
      run: mkdir -p build/8b build/10b build/12b

    - name: Compile x265 8bit and 12bit (parallel)
      env:
        PKG_CONFIG_PATH: /usr/local/lib/pkgconfig:/clang64/lib/pkgconfig
      run: |
        cmake -GNinja x265/source -B build/8b -DCMAKE_PREFIX_PATH=/usr/local \
          -DEXPORT_C_API=OFF -DENABLE_SHARED=OFF -DENABLE_CLI=OFF \
          -DTARGET_CPU=${{matrix.target_cpu}} -DUSE_MIMALLOC=ON -DUSE_LTO=ON -DENABLE_UNITY_BUILD=ON \
          -DCMAKE_ASM_NASM_FLAGS=-w-macro-params-legacy &

        cmake -GNinja x265/source -B build/12b -DCMAKE_PREFIX_PATH=/usr/local \
          -DHIGH_BIT_DEPTH=ON -DMAIN12=ON -DEXPORT_C_API=OFF -DENABLE_SHARED=OFF -DENABLE_CLI=OFF \
          -DTARGET_CPU=${{matrix.target_cpu}} -DUSE_MIMALLOC=ON -DUSE_LTO=ON -DENABLE_UNITY_BUILD=ON \
          -DCMAKE_ASM_NASM_FLAGS=-w-macro-params-legacy &
        wait

        ninja -C build/8b &
        ninja -C build/12b &
        wait

        cp build/8b/libx265.a build/10b/libx265_8b.a
        cp build/12b/libx265.a build/10b/libx265_12b.a

    - name: Compile x265 10bit (profiling)
      if: inputs.profdata_source == 'generate'
      working-directory: build/10b
      env:
        PKG_CONFIG_PATH: /usr/local/lib/pkgconfig:/clang64/lib/pkgconfig
      run: |
        cmake -GNinja ../../x265/source -DCMAKE_PREFIX_PATH=/usr/local \
          -DEXTRA_LIB=x265_8b.a;x265_12b.a -DEXTRA_LINK_FLAGS=-L. \
          -DLINKED_8BIT=ON -DLINKED_12BIT=ON -DENABLE_HDR10_PLUS=ON \
          -DENABLE_AVISYNTH=OFF -DENABLE_VPYSYNTH=OFF -DHIGH_BIT_DEPTH=ON \
          -DENABLE_SHARED=OFF -DENABLE_LAVF=ON -DENABLE_STATIC_LAVF=ON \
          -DENABLE_LSMASH=ON -DENABLE_MKV=ON -DTARGET_CPU=${{matrix.target_cpu}} \
          -DUSE_MIMALLOC=ON -DENABLE_UNITY_BUILD=ON \
          -DCMAKE_ASM_NASM_FLAGS=-w-macro-params-legacy \
          -DCMAKE_CXX_FLAGS="-O2 -fprofile-instr-generate -fprofile-update=atomic -I/usr/local/include"
        ninja
        mv x265.exe x265-profiling.exe

    - name: Generate test videos for PGO
      if: inputs.profdata_source == 'generate'
      working-directory: build
      run: |
        mkdir -p test-videos
        # 1080p 30fps
        ffmpeg -f lavfi -i "testsrc=duration=8:size=1920x1080:rate=30" -c:v rawvideo -pix_fmt yuv420p test-videos/1080p_30fps.y4m
        # 720p 24fps
        ffmpeg -f lavfi -i "testsrc2=duration=6:size=1280x720:rate=24" -c:v rawvideo -pix_fmt yuv420p test-videos/720p_24fps.y4m
        # 480p
        ffmpeg -f lavfi -i "smptebars=duration=4:size=854x480:rate=30" -c:v rawvideo -pix_fmt yuv420p test-videos/480p_smpte.y4m
        # 4K
        ffmpeg -f lavfi -i "testsrc=duration=3:size=3840x2160:rate=30" -c:v rawvideo -pix_fmt yuv420p test-videos/4k_30fps.y4m
        # Noise
        ffmpeg -f lavfi -i "nullsrc=s=640x480:r=30,geq=random(1)*255:128:128" -t 3 -c:v rawvideo -pix_fmt yuv420p test-videos/noise_480p.y4m
        # Gradient
        ffmpeg -f lavfi -i "gradients=s=1280x720:c0=000000:c1=ffffff" -t 3 -c:v rawvideo -pix_fmt yuv420p test-videos/gradient_720p.y4m

    - name: Run PGO profiling workload
      if: inputs.profdata_source == 'generate'
      working-directory: build/10b
      run: |
        OPT10_FAST="--output-depth 10 --crf 28 --preset ultrafast --threads 4"
        OPT10_FASTER="--output-depth 10 --crf 28 --preset faster --threads 4"
        OPT10_MEDIUM="--output-depth 10 --crf 24 --preset medium --threads 4"
        OPT10_MEDIUM2="--output-depth 10 --crf 28 --preset medium --aq-mode 2 --threads 4"
        OPT10_SLOW="--output-depth 10 --crf 22 --preset slow --threads 4"
        OPT10_SLOWER="--output-depth 10 --crf 24 --preset slower --threads 2"
        OPT10_VERYSLOW="--output-depth 10 --crf 22 --preset veryslow --threads 2"
        OPT10_PSY="--output-depth 10 --crf 24 --preset medium --psy-rd 1.0:0.15 --aq-mode 3 --threads 4"

        echo "=== 10-bit Primary Tests ==="
        for opt in "$OPT10_MEDIUM" "$OPT10_MEDIUM2" "$OPT10_SLOW" "$OPT10_PSY"; do
          ./x265-profiling.exe $opt ../test-videos/1080p_30fps.y4m -o /dev/null 2>/dev/null || true
          ./x265-profiling.exe $opt ../test-videos/720p_24fps.y4m -o /dev/null 2>/dev/null || true
        done

        for opt in "$OPT10_MEDIUM" "$OPT10_SLOW"; do
          ./x265-profiling.exe $opt ../test-videos/4k_30fps.y4m -o /dev/null 2>/dev/null || true
        done

        echo "=== 10-bit Preset Coverage ==="
        for opt in "$OPT10_FAST" "$OPT10_FASTER" "$OPT10_SLOWER" "$OPT10_VERYSLOW"; do
          ./x265-profiling.exe $opt ../test-videos/480p_smpte.y4m -o /dev/null 2>/dev/null || true
          ./x265-profiling.exe $opt ../test-videos/noise_480p.y4m -o /dev/null 2>/dev/null || true
        done

        llvm-profdata merge -output=../x265.profdata *.profraw
        echo "=== Profile data generated ==="
        ls -la ../x265.profdata

    - name: Compile x265 10bit (PGO)
      working-directory: build/10b
      env:
        PKG_CONFIG_PATH: /usr/local/lib/pkgconfig:/clang64/lib/pkgconfig
      run: |
        CXX_FLAGS="-O3 -I/usr/local/include"
        if [ -f ../x265.profdata ]; then
          CXX_FLAGS="$CXX_FLAGS -fprofile-instr-use=../x265.profdata"
          echo "Using PGO profdata"
        else
          echo "Building without PGO (no profdata)"
        fi

        cmake -GNinja ../../x265/source -DCMAKE_PREFIX_PATH=/usr/local \
          -DEXTRA_LIB=x265_8b.a;x265_12b.a -DEXTRA_LINK_FLAGS=-L. \
          -DLINKED_8BIT=ON -DLINKED_12BIT=ON -DENABLE_HDR10_PLUS=ON \
          -DENABLE_AVISYNTH=OFF -DENABLE_VPYSYNTH=OFF -DHIGH_BIT_DEPTH=ON \
          -DENABLE_SHARED=OFF -DENABLE_LAVF=ON -DENABLE_STATIC_LAVF=ON \
          -DENABLE_LSMASH=ON -DENABLE_MKV=ON -DTARGET_CPU=${{matrix.target_cpu}} \
          -DUSE_MIMALLOC=ON -DUSE_LTO=ON -DENABLE_UNITY_BUILD=ON \
          -DCMAKE_ASM_NASM_FLAGS=-w-macro-params-legacy \
          -DCMAKE_CXX_FLAGS="$CXX_FLAGS"
        ninja
        strip -s x265.exe

    - name: Package
      run: |
        mkdir dist
        cp build/10b/x265.exe dist/
        cp build/x265.profdata dist/ 2>/dev/null || true

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: x265-pgo-${{ matrix.target_cpu }}
        path: dist/*

    - name: Compress for release
      if: github.event_name == 'workflow_dispatch' && inputs.tag != ''
      run: |
        cd dist
        7za a -t7z -mx=7 ../x265-win64-${{ matrix.target_cpu }}-clang-pgo.${{ inputs.tag }}.7z x265.exe

    - name: Release
      uses: softprops/action-gh-release@v2
      if: github.event_name == 'workflow_dispatch' && inputs.tag != ''
      with:
        tag_name: ${{ inputs.tag }}
        files: x265-win64-${{ matrix.target_cpu }}-clang-pgo.${{ inputs.tag }}.7z
        fail_on_unmatched_files: true
        generate_release_notes: false
        prerelease: true
