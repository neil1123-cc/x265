name: Build PGO

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (empty = artifact only)'
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    container:
      image: ghcr.io/neil1123-cc/video-build:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    defaults:
      run:
        shell: bash -lc "{0}"
    strategy:
      fail-fast: false
      matrix:
        target_cpu:
          - x86-64
          - haswell
          - skylake
          - alderlake
          - raptorlake
          - arrowlake
          - znver2
          - znver3
          - znver4
          - znver5
    steps:
    - name: Checkout x265
      uses: actions/checkout@v4
      with:
        path: x265
        fetch-depth: 0

    - name: Setup build dir
      run: mkdir -p build/8b build/10b build/12b

    - name: Download profdata
      run: |
        curl -sL https://github.com/${{github.repository}}/raw/profdata-${{matrix.target_cpu}}/x265.profdata -o x265.profdata || true
        if [ ! -f x265.profdata ]; then
          echo "No profdata found for ${{matrix.target_cpu}}, building without PGO"
        fi

    - name: Compile x265 8bit
      working-directory: build/8b
      run: |
        cmake -GNinja ../../x265/source -DEXPORT_C_API=OFF -DENABLE_SHARED=OFF -DENABLE_CLI=OFF \
          -DTARGET_CPU=${{matrix.target_cpu}} -DUSE_MIMALLOC=ON -DUSE_LTO=ON -DENABLE_UNITY_BUILD=ON \
          -DCMAKE_ASM_NASM_FLAGS=-w-macro-params-legacy
        ninja
        cp libx265.a ../10b/libx265_8b.a

    - name: Compile x265 12bit
      working-directory: build/12b
      run: |
        cmake -GNinja ../../x265/source -DHIGH_BIT_DEPTH=ON -DMAIN12=ON -DEXPORT_C_API=OFF -DENABLE_SHARED=OFF -DENABLE_CLI=OFF \
          -DTARGET_CPU=${{matrix.target_cpu}} -DUSE_MIMALLOC=ON -DUSE_LTO=ON -DENABLE_UNITY_BUILD=ON \
          -DCMAKE_ASM_NASM_FLAGS=-w-macro-params-legacy
        ninja
        cp libx265.a ../10b/libx265_12b.a

    - name: Compile x265 10bit (PGO)
      working-directory: build/10b
      env:
        PKG_CONFIG_PATH: /usr/local/lib/pkgconfig:/clang64/lib/pkgconfig
      run: |
        CXX_FLAGS="-I/usr/local/include"
        if [ -f ${{github.workspace}}/x265.profdata ]; then
          CXX_FLAGS="$CXX_FLAGS -fprofile-instr-use=${{github.workspace}}/x265.profdata"
          echo "Using PGO profdata"
        else
          echo "Building without PGO (no profdata)"
        fi

        cmake -GNinja ../../x265/source -DCMAKE_PREFIX_PATH=/usr/local \
          -DEXTRA_LIB=x265_8b.a;x265_12b.a -DEXTRA_LINK_FLAGS=-L. \
          -DLINKED_8BIT=ON -DLINKED_12BIT=ON -DENABLE_HDR10_PLUS=ON \
          -DENABLE_AVISYNTH=OFF -DENABLE_VPYSYNTH=OFF -DHIGH_BIT_DEPTH=ON \
          -DENABLE_SHARED=OFF -DENABLE_LAVF=ON -DENABLE_STATIC_LAVF=ON \
          -DENABLE_LSMASH=ON -DENABLE_MKV=ON -DTARGET_CPU=${{matrix.target_cpu}} \
          -DUSE_MIMALLOC=ON -DUSE_LTO=ON -DENABLE_UNITY_BUILD=ON \
          -DCMAKE_ASM_NASM_FLAGS=-w-macro-params-legacy \
          -DCMAKE_CXX_FLAGS="$CXX_FLAGS"
        ninja
        strip -s x265.exe

    - name: Package
      run: |
        mkdir dist
        cp build/10b/x265.exe dist/

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: x265-win64-${{matrix.target_cpu}}-clang-full
        path: dist/*

    - name: Compress for release
      if: github.event_name == 'workflow_dispatch' && github.event.inputs.tag != ''
      run: |
        cd dist
        7za a -t7z -mx=7 ../x265-win64-${{matrix.target_cpu}}-clang.${{ github.event.inputs.tag }}.7z x265.exe

    - name: Release
      uses: softprops/action-gh-release@v2
      if: github.event_name == 'workflow_dispatch' && github.event.inputs.tag != ''
      with:
        tag_name: ${{ github.event.inputs.tag }}
        files: x265-win64-${{matrix.target_cpu}}-clang.${{ github.event.inputs.tag }}.7z
        fail_on_unmatched_files: true
        generate_release_notes: false
        prerelease: true
