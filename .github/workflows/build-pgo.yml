name: Generate PGO Profdata

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  generate:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
    - name: Checkout x265
      uses: actions/checkout@v4
      with:
        path: x265
        fetch-depth: 0

    # === Dependency Caching ===
    - name: Cache FFmpeg
      id: cache-ffmpeg
      uses: actions/cache@v4
      with:
        path: ffmpeg
        key: ffmpeg-n8.1-full-v3-clang

    - name: Cache mimalloc
      id: cache-mimalloc
      uses: actions/cache@v4
      with:
        path: mimalloc-install
        key: mimalloc-v3.2.8-clang-v9

    - name: Cache obuparse
      id: cache-obuparse
      uses: actions/cache@v4
      with:
        path: obuparse-install
        key: obuparse-latest-clang-v1

    - name: Cache L-SMASH
      id: cache-lsmash
      uses: actions/cache@v4
      with:
        path: lsmash-install
        key: lsmash-latest-clang-v1

    - name: Checkout FFmpeg
      uses: actions/checkout@v4
      with:
        path: ffmpeg
        repository: FFmpeg/FFmpeg
        ref: n8.1
      if: steps.cache-ffmpeg.outputs.cache-hit != 'true'

    - name: Checkout mimalloc
      uses: actions/checkout@v4
      with:
        path: mimalloc
        repository: microsoft/mimalloc
        ref: v3.2.8
      if: steps.cache-mimalloc.outputs.cache-hit != 'true'

    - name: Checkout obuparse
      uses: actions/checkout@v4
      with:
        path: obuparse
        repository: dwbuiten/obuparse
      if: steps.cache-obuparse.outputs.cache-hit != 'true'

    - name: Checkout L-SMASH
      uses: actions/checkout@v4
      with:
        path: lsmash
        repository: vimeo/l-smash
      if: steps.cache-lsmash.outputs.cache-hit != 'true'

    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: CLANG64
        update: true
        install: >-
          p7zip
          base-devel
          git
          autoconf
          automake
          libtool
          mingw-w64-clang-x86_64-nasm
          mingw-w64-clang-x86_64-clang
          mingw-w64-clang-x86_64-compiler-rt
          mingw-w64-clang-x86_64-lld
          mingw-w64-clang-x86_64-crt
          mingw-w64-clang-x86_64-headers
          mingw-w64-clang-x86_64-libc++
          mingw-w64-clang-x86_64-libwinpthread
          mingw-w64-clang-x86_64-make
          mingw-w64-clang-x86_64-pkgconf
          mingw-w64-clang-x86_64-cmake
          mingw-w64-clang-x86_64-ninja
          mingw-w64-clang-x86_64-llvm

    - name: Compile FFmpeg (full with avfilter)
      if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
      working-directory: ffmpeg
      run: |
        PGO_OPT="--enable-avdevice --enable-avfilter --enable-ffmpeg --enable-indev=lavfi"
        # Video sources
        for f in testsrc testsrc2 smptebars smptehdbars nullsrc mandelbrot life cellauto haldclutsrc; do
          PGO_OPT="$PGO_OPT --enable-filter=$f"
        done
        # Video filters for complex content
        for f in geq gradients format scale noise zoompan hue fps setpts drawbox overlay crop rotate transpose hflip vflip concat select; do
          PGO_OPT="$PGO_OPT --enable-filter=$f"
        done
        ./configure --prefix=/usr/local --enable-gpl --enable-version3 \
          --disable-runtime-cpudetect --disable-all --disable-autodetect \
          --enable-avformat --enable-avcodec --enable-swscale --enable-swresample \
          --disable-everything --disable-network $PGO_OPT \
          --enable-demuxer=mpegts,mov,matroska,h264,hevc,rawvideo,yuv4mpegpipe \
          --enable-decoder=h264,hevc,ffv1,ffvhuff,huffyuv,rawvideo,wrapped_avframe,aac,ac3,mp3 \
          --enable-encoder=rawvideo,aac,ac3,mp2,pcm_s16le,pcm_s24le,pcm_s32le \
          --enable-muxer=yuv4mpegpipe \
          --enable-protocol=file,pipe \
          --cc=cc --cxx=c++ --cpu=x86-64
        make -j$(nproc)

    - name: Get rid of .dll.a
      run: find /*64/ /usr/ -type f -name "*.dll.a" -print -delete

    - name: Install FFmpeg
      run: make install
      working-directory: ffmpeg

    - name: Compile mimalloc
      if: steps.cache-mimalloc.outputs.cache-hit != 'true'
      working-directory: mimalloc
      run: |
        mkdir build
        cd build
        cmake -GNinja .. -DCMAKE_INSTALL_PREFIX=/usr/local \
          -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=ON \
          -DMI_BUILD_SHARED=OFF -DMI_BUILD_STATIC=ON -DMI_BUILD_OBJECT=OFF \
          -DMI_BUILD_TESTS=OFF -DMI_USE_CXX=ON
        ninja
        ninja install
        echo "=== Installed to /usr/local ==="
        ls -la /usr/local/lib/cmake/
        ls -la /usr/local/lib/
        # Create cache directory with proper structure (mimalloc v3.x uses versioned paths)
        mkdir -p mimalloc-install/lib/cmake/mimalloc
        mkdir -p mimalloc-install/lib/cmake/mimalloc-3.2
        mkdir -p mimalloc-install/lib/mimalloc-3.2
        mkdir -p mimalloc-install/include/mimalloc-3.2
        mkdir -p mimalloc-install/lib/pkgconfig
        # Copy versioned files
        cp -rv /usr/local/lib/cmake/mimalloc-3.2/* mimalloc-install/lib/cmake/mimalloc-3.2/
        cp -rv /usr/local/lib/mimalloc-3.2/* mimalloc-install/lib/mimalloc-3.2/
        cp -rv /usr/local/include/mimalloc-3.2/* mimalloc-install/include/mimalloc-3.2/
        cp -rv /usr/local/lib/pkgconfig/mimalloc* mimalloc-install/lib/pkgconfig/ 2>/dev/null || true
        # Create unversioned copy for CMake compatibility (dereferenced, not symlink)
        cp -rv /usr/local/lib/cmake/mimalloc-3.2/* mimalloc-install/lib/cmake/mimalloc/
        echo "=== Cache directory contents ==="
        ls -la mimalloc-install/lib/cmake/
        ls -la mimalloc-install/lib/
        mv mimalloc-install "$GITHUB_WORKSPACE/"

    - name: Compile obuparse
      if: steps.cache-obuparse.outputs.cache-hit != 'true'
      working-directory: obuparse
      run: |
        make CC=cc libobuparse.a
        install -v obuparse.h /usr/local/include
        install -v libobuparse.a /usr/local/lib
        mkdir -p obuparse-install/include
        mkdir -p obuparse-install/lib
        cp /usr/local/include/obuparse.h obuparse-install/include/
        cp /usr/local/lib/libobuparse.a obuparse-install/lib/
        mv obuparse-install "$GITHUB_WORKSPACE/"

    - name: Compile L-SMASH
      if: steps.cache-lsmash.outputs.cache-hit != 'true'
      working-directory: lsmash
      run: |
        ./configure --prefix=/usr/local --cc=cc \
          --extra-cflags="-I/usr/local/include" \
          --extra-ldflags="-L/usr/local/lib" \
          --extra-libs="-lobuparse"
        make -j$(nproc)
        make install
        cp importer/importer.h /usr/local/include/lsmash_importer.h
        mkdir -p lsmash-install/include
        mkdir -p lsmash-install/lib
        cp -r /usr/local/include/lsmash* lsmash-install/include/
        cp -r /usr/local/lib/liblsmash* lsmash-install/lib/
        cp -r /usr/local/lib/pkgconfig lsmash-install/lib/ 2>/dev/null || true
        mv lsmash-install "$GITHUB_WORKSPACE/"

    - name: Install cached mimalloc
      if: steps.cache-mimalloc.outputs.cache-hit == 'true'
      run: |
        echo "=== Installing cached mimalloc ==="
        ls -la mimalloc-install/ || echo "Directory not found"
        ls -la mimalloc-install/lib/cmake/ 2>/dev/null || echo "CMake config not found in cache"
        cp -rv mimalloc-install/* /usr/local/
        echo "=== Verifying installation ==="
        ls -la /usr/local/lib/cmake/
        ls -la /usr/local/lib/

    - name: Install cached obuparse
      if: steps.cache-obuparse.outputs.cache-hit == 'true'
      run: |
        cp obuparse-install/include/* /usr/local/include/
        cp obuparse-install/lib/* /usr/local/lib/

    - name: Install cached L-SMASH
      if: steps.cache-lsmash.outputs.cache-hit == 'true'
      run: |
        cp -r lsmash-install/include/* /usr/local/include/
        cp -r lsmash-install/lib/* /usr/local/lib/

    - name: Setup build dir
      run: mkdir -p build/8b build/10b build/12b

    - name: Compile x265 8bit and 12bit (parallel)
      env:
        PKG_CONFIG_PATH: /usr/local/lib/pkgconfig:/clang64/lib/pkgconfig
      run: |
        cmake -GNinja x265/source -B build/8b -DCMAKE_PREFIX_PATH=/usr/local \
          -DEXPORT_C_API=OFF -DENABLE_SHARED=OFF -DENABLE_CLI=OFF \
          -DTARGET_CPU=x86-64 -DENABLE_AVISYNTH=OFF -DENABLE_VPYSYNTH=OFF \
          -DUSE_MIMALLOC=ON -DENABLE_UNITY_BUILD=ON \
          -DCMAKE_CXX_FLAGS="-O2 -flto=thin -fmerge-all-constants -I/usr/local/include" \
          -DCMAKE_ASM_NASM_FLAGS=-w-macro-params-legacy
        ninja -C build/8b &

        cmake -GNinja x265/source -B build/12b -DCMAKE_PREFIX_PATH=/usr/local \
          -DHIGH_BIT_DEPTH=ON -DMAIN12=ON -DEXPORT_C_API=OFF -DENABLE_SHARED=OFF -DENABLE_CLI=OFF \
          -DTARGET_CPU=x86-64 -DENABLE_AVISYNTH=OFF -DENABLE_VPYSYNTH=OFF \
          -DUSE_MIMALLOC=ON -DENABLE_UNITY_BUILD=ON \
          -DCMAKE_CXX_FLAGS="-O2 -flto=thin -fmerge-all-constants -I/usr/local/include" \
          -DCMAKE_ASM_NASM_FLAGS=-w-macro-params-legacy
        ninja -C build/12b &

        wait

        cp build/8b/libx265.a build/10b/libx265_8b.a
        cp build/12b/libx265.a build/10b/libx265_12b.a

    - name: Compile x265 10bit (profiling)
      working-directory: build/10b
      env:
        PKG_CONFIG_PATH: /usr/local/lib/pkgconfig:/clang64/lib/pkgconfig
      run: |
        cmake -GNinja ../../x265/source -DCMAKE_PREFIX_PATH=/usr/local \
          -DEXTRA_LIB="x265_8b.a;x265_12b.a" -DEXTRA_LINK_FLAGS=-L. \
          -DLINKED_8BIT=ON -DLINKED_12BIT=ON -DENABLE_HDR10_PLUS=ON \
          -DENABLE_AVISYNTH=OFF -DENABLE_VPYSYNTH=OFF -DHIGH_BIT_DEPTH=ON \
          -DENABLE_SHARED=OFF -DENABLE_LAVF=ON -DENABLE_STATIC_LAVF=ON \
          -DENABLE_LSMASH=ON -DENABLE_MKV=ON -DTARGET_CPU=x86-64 \
          -DUSE_MIMALLOC=ON -DENABLE_UNITY_BUILD=ON \
          -DCMAKE_ASM_NASM_FLAGS=-w-macro-params-legacy \
          -DCMAKE_CXX_FLAGS="-O2 -flto=thin -fmerge-all-constants -fprofile-instr-generate -fprofile-update=atomic -I/usr/local/include" \
          -DCMAKE_EXE_LINKER_FLAGS="-flto=thin"
        ninja
        mv x265.exe x265-profiling.exe

    - name: Generate test videos for PGO
      working-directory: build
      run: |
        mkdir -p test-videos

        echo "=== Generating high-quality test videos ==="

        # === 4K Content (Primary target for x265) ===
        # 4K with complex patterns (mandelbrot has natural motion/detail)
        ffmpeg -f lavfi -i "mandelbrot=size=3840x2160:rate=30" -t 15 -c:v rawvideo -pix_fmt yuv420p test-videos/4k_mandelbrot.y4m
        # 4K standard test
        ffmpeg -f lavfi -i "testsrc=duration=10:size=3840x2160:rate=30" -c:v rawvideo -pix_fmt yuv420p test-videos/4k_30fps.y4m

        # === 1080p Content (Most common) ===
        # 1080p with motion simulation (zoompan creates natural movement)
        ffmpeg -f lavfi -i "testsrc=duration=15:size=1920x1080:rate=30,zoompan=z='min(zoom+0.0015,1.5)':d=1:x='iw/2-(iw/zoom/2)':y='ih/2-(ih/zoom/2)'" -c:v rawvideo -pix_fmt yuv420p test-videos/1080p_motion.y4m
        # 1080p standard
        ffmpeg -f lavfi -i "testsrc=duration=20:size=1920x1080:rate=30" -c:v rawvideo -pix_fmt yuv420p test-videos/1080p_30fps.y4m
        # 1080p high framerate
        ffmpeg -f lavfi -i "testsrc2=duration=15:size=1920x1080:rate=60" -c:v rawvideo -pix_fmt yuv420p test-videos/1080p_60fps.y4m
        # 1080p mandelbrot (complex detail)
        ffmpeg -f lavfi -i "mandelbrot=size=1920x1080:rate=30" -t 15 -c:v rawvideo -pix_fmt yuv420p test-videos/1080p_mandelbrot.y4m

        # === 720p Content ===
        # 720p with film grain (common encoding scenario)
        ffmpeg -f lavfi -i "testsrc=duration=15:size=1280x720:rate=24,noise=alls=15:allf=t" -c:v rawvideo -pix_fmt yuv420p test-videos/720p_film.y4m
        # 720p standard
        ffmpeg -f lavfi -i "testsrc=duration=15:size=1280x720:rate=24" -c:v rawvideo -pix_fmt yuv420p test-videos/720p_24fps.y4m
        # 720p with color animation (hue rotation simulates color changes)
        ffmpeg -f lavfi -i "testsrc=duration=10:size=1280x720:rate=30,hue=s=1:h='t*20'" -c:v rawvideo -pix_fmt yuv420p test-videos/720p_color.y4m

        # === Motion & Content Types ===
        # High detail noise (stress test for motion estimation)
        ffmpeg -f lavfi -i "nullsrc=s=1280x720:r=30,geq=random(1)*255:random(1)*255:random(1)*255" -t 8 -c:v rawvideo -pix_fmt yuv420p test-videos/noise_color.y4m
        # Life pattern (cellular automata - creates complex motion)
        ffmpeg -f lavfi -i "life=s=1280x720:r=30:mold=10:ratio=0.4" -t 10 -c:v rawvideo -pix_fmt yuv420p test-videos/life_pattern.y4m

        echo "=== Test videos generated ==="
        ls -la test-videos/

    - name: Run PGO profiling workload
      working-directory: build/10b
      run: |
        # === Preset definitions with varying complexity ===
        # Fast presets
        OPT_ULTRAFAST="--output-depth 10 --crf 28 --preset ultrafast --threads 4"
        OPT_FASTER="--output-depth 10 --crf 26 --preset faster --threads 4"
        OPT_FAST="--output-depth 10 --crf 24 --preset fast --threads 4"

        # Medium presets (most common)
        OPT_MEDIUM="--output-depth 10 --crf 22 --preset medium --threads 4"
        OPT_MEDIUM_MT="--output-depth 10 --crf 22 --preset medium --threads 8 --pmode"
        OPT_MEDIUM_AQ="--output-depth 10 --crf 24 --preset medium --aq-mode 2 --threads 4"
        OPT_MEDIUM_AQ3="--output-depth 10 --crf 22 --preset medium --aq-mode 3 --threads 4"

        # Slow presets
        OPT_SLOW="--output-depth 10 --crf 20 --preset slow --threads 4"
        OPT_SLOW_MT="--output-depth 10 --crf 20 --preset slow --threads 8"
        OPT_SLOWER="--output-depth 10 --crf 22 --preset slower --threads 2"
        OPT_VERYSLOW="--output-depth 10 --crf 20 --preset veryslow --threads 2"

        # Psy-rd presets (common for quality encoding)
        OPT_PSY="--output-depth 10 --crf 22 --preset medium --psy-rd 1.0:0.15 --aq-mode 3 --threads 4"
        OPT_PSY_STRONG="--output-depth 10 --crf 20 --preset slow --psy-rd 1.5:0.2 --aq-mode 3 --threads 4"

        # B-frame optimization
        OPT_BFRAME="--output-depth 10 --crf 22 --preset medium --bframes 8 --b-adapt 2 --threads 4"

        echo "=== 4K Tests (Primary x265 use case) ==="
        # 4K mandelbrot - complex patterns
        for opt in "$OPT_MEDIUM" "$OPT_SLOW" "$OPT_MEDIUM_MT"; do
          ./x265-profiling.exe $opt ../test-videos/4k_mandelbrot.y4m -o /dev/null 2>/dev/null || true
        done
        # 4K standard
        for opt in "$OPT_MEDIUM" "$OPT_FAST"; do
          ./x265-profiling.exe $opt ../test-videos/4k_30fps.y4m -o /dev/null 2>/dev/null || true
        done

        echo "=== 1080p Tests (Most common resolution) ==="
        # 1080p motion - most realistic content
        for opt in "$OPT_MEDIUM" "$OPT_MEDIUM_AQ" "$OPT_SLOW" "$OPT_PSY" "$OPT_BFRAME"; do
          ./x265-profiling.exe $opt ../test-videos/1080p_motion.y4m -o /dev/null 2>/dev/null || true
        done
        # 1080p standard
        for opt in "$OPT_MEDIUM" "$OPT_MEDIUM_AQ3" "$OPT_SLOW"; do
          ./x265-profiling.exe $opt ../test-videos/1080p_30fps.y4m -o /dev/null 2>/dev/null || true
        done
        # 1080p mandelbrot - complex detail
        for opt in "$OPT_MEDIUM" "$OPT_PSY_STRONG"; do
          ./x265-profiling.exe $opt ../test-videos/1080p_mandelbrot.y4m -o /dev/null 2>/dev/null || true
        done
        # 1080p 60fps - high framerate
        for opt in "$OPT_MEDIUM" "$OPT_MEDIUM_MT"; do
          ./x265-profiling.exe $opt ../test-videos/1080p_60fps.y4m -o /dev/null 2>/dev/null || true
        done

        echo "=== 720p Tests ==="
        # Film content with grain
        for opt in "$OPT_MEDIUM" "$OPT_PSY" "$OPT_SLOW"; do
          ./x265-profiling.exe $opt ../test-videos/720p_film.y4m -o /dev/null 2>/dev/null || true
        done
        # Standard 720p
        for opt in "$OPT_MEDIUM" "$OPT_PSY"; do
          ./x265-profiling.exe $opt ../test-videos/720p_24fps.y4m -o /dev/null 2>/dev/null || true
        done
        # Color animation
        ./x265-profiling.exe $OPT_MEDIUM ../test-videos/720p_color.y4m -o /dev/null 2>/dev/null || true

        echo "=== Stress Tests ==="
        # Random noise (worst case for motion estimation)
        for opt in "$OPT_MEDIUM" "$OPT_SLOW"; do
          ./x265-profiling.exe $opt ../test-videos/noise_color.y4m -o /dev/null 2>/dev/null || true
        done
        # Life pattern (complex motion)
        for opt in "$OPT_MEDIUM" "$OPT_PSY"; do
          ./x265-profiling.exe $opt ../test-videos/life_pattern.y4m -o /dev/null 2>/dev/null || true
        done

        echo "=== Preset Coverage Tests ==="
        # Fast presets
        for opt in "$OPT_ULTRAFAST" "$OPT_FASTER" "$OPT_FAST"; do
          ./x265-profiling.exe $opt ../test-videos/1080p_30fps.y4m -o /dev/null 2>/dev/null || true
        done
        # Slow presets
        for opt in "$OPT_SLOWER" "$OPT_VERYSLOW"; do
          ./x265-profiling.exe $opt ../test-videos/720p_24fps.y4m -o /dev/null 2>/dev/null || true
        done

        echo "=== Multi-threading Tests ==="
        # High thread count on 4K
        ./x265-profiling.exe $OPT_MEDIUM_MT ../test-videos/4k_mandelbrot.y4m -o /dev/null 2>/dev/null || true
        ./x265-profiling.exe $OPT_SLOW_MT ../test-videos/1080p_motion.y4m -o /dev/null 2>/dev/null || true

        llvm-profdata merge -output=../x265.profdata *.profraw
        echo "=== Profile data generated ==="
        ls -la ../x265.profdata

    - name: Push profdata to branch
      shell: bash
      run: |
        cd x265
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git checkout --orphan profdata-x86-64
        git rm -rf . 2>/dev/null || true
        cp ../build/x265.profdata ./x265.profdata
        git add x265.profdata
        git commit -m "Update PGO profdata - $(date +%Y%m%d-%H%M)"
        git push -f https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git profdata-x86-64
