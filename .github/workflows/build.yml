name: Build

on:
  push:
    branches:
      - '**'
    tags:
      - '**'
  workflow_dispatch:


permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-deps-cache-suffix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout X265
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check CI guardrails
        shell: bash
        run: |
          set -euo pipefail
          python .github/scripts/check_ci_guards.py
          python .github/scripts/test_check_ci_guards.py

      - name: Check dependency patch cache suffixes
        shell: bash
        run: |
          set -euo pipefail
          python .github/scripts/check_dependency_patch_suffixes.py

          before="${{ github.event.before }}"
          after="${{ github.sha }}"

          if [ "${{ github.event_name }}" != "push" ] || [[ "$before" =~ ^0+$ ]]; then
            echo "No push diff to validate"
            exit 0
          fi

          if ! git cat-file -e "$before^{commit}" 2>/dev/null; then
            echo "Before commit unavailable; skipping patch suffix diff validation"
            exit 0
          fi

          python .github/scripts/check_dependency_patch_suffixes.py --before "$before" --after "$after"

      - name: Check CMake C++20 contract
        shell: bash
        run: |
          set -euo pipefail
          python .github/scripts/check_cmake_cxx20_contract.py source

      - name: Check CMake C++20 contract guardrails
        shell: bash
        run: |
          set -euo pipefail
          python .github/scripts/test_check_cmake_cxx20_contract.py

      - name: Check C++20 compile command guardrails
        shell: bash
        run: |
          set -euo pipefail
          python .github/scripts/test_check_compile_commands.py

      - name: Check dependency patch suffix guardrails
        shell: bash
        run: |
          set -euo pipefail
          python .github/scripts/test_check_dependency_patch_suffixes.py

      - name: Check release needs guardrails
        shell: bash
        run: |
          set -euo pipefail
          python .github/scripts/check_release_needs.py

      - name: Check PGO metadata/consume guardrails
        shell: bash
        run: |
          set -euo pipefail
          python .github/scripts/test_check_pgo_consume_chain.py

  cxx20-warning-scan:
    needs: validate-deps-cache-suffix
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Checkout X265
        uses: actions/checkout@v6
        with:
          path: x265
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Shared Dependencies
        uses: ./x265/.github/actions/setup-windows-deps
        with:
          ffmpeg-cache-suffix: lavf-v2-clang
          ffmpeg-configure: |
            ./configure --prefix=/usr/local --enable-gpl \
              --disable-runtime-cpudetect --disable-all --disable-autodetect \
              --disable-everything --disable-network \
              --enable-avformat --enable-avcodec --enable-avutil --enable-swscale \
              --enable-demuxer=mov,matroska,mpegts,avi,mpegvideo,m4v,mpeg,ogg,asf \
              --enable-decoder=h264,hevc,ffv1,ffvhuff,huffyuv,rawvideo,wrapped_avframe,aac,ac3,mp3 \
              --enable-protocol=file \
              --cc=cc --cxx=c++ --cpu=x86-64
          use-mimalloc: 'false'
          extra-msys2-packages: >-
            mingw-w64-clang-x86_64-python

      - name: Prepare C++20 warning scan helpers
        run: cp x265/.github/scripts/cxx20_scan_helpers.sh ./cxx20-scan-helpers.sh

      - name: Check GNU++20 downgrade guardrail
        run: |
          set -euo pipefail
          source cxx20-scan-helpers.sh
          configure_cxx20_scan x265/source build/cxx20-downgrade-guard \
            -DCMAKE_CXX_STANDARD=17 \
            -DENABLE_CLI=OFF \
            -DENABLE_ASSEMBLY=OFF
          check_cxx20_commands_clang build/cxx20-downgrade-guard \
            --min-cpp-commands=50 \
            --forbidden-flag-substring=-std=gnu++17 \
            --forbidden-flag-substring=-std=c++17

      - name: Run C++20 CLI and dependency warning scans
        env:
          PKG_CONFIG_PATH: /usr/local/lib/pkgconfig:/clang64/lib/pkgconfig
        run: |
          source cxx20-scan-helpers.sh
          configure_cxx20_scan x265/source build/cxx20-warning-scan \
            -DENABLE_CLI=ON \
            -DENABLE_ASSEMBLY=OFF \
            -DENABLE_HDR10_PLUS=ON \
            -DENABLE_MKV=ON
          check_cxx20_commands_clang build/cxx20-warning-scan \
            --min-cpp-commands=60 \
            --required-depth-define=-DX265_DEPTH=8 \
            --forbidden-flag=-DX265_DEPTH=10 \
            --forbidden-flag=-DX265_DEPTH=12 \
            --required-file-substring=source/encoder/ \
            --required-file-substring=source/common/ \
            --required-file-substring=source/input/ \
            --required-file-substring=source/output/ \
            --required-file-substring=source/abrEncApp.cpp \
            --required-file-substring=source/dynamicHDR10/ \
            --forbidden-file-substring=source/input/lavf.cpp \
            --forbidden-file-substring=source/output/mp4.cpp
          ninja -C build/cxx20-warning-scan cli

          configure_cxx20_scan x265/source build/cxx20-warning-scan-12bit \
            -DENABLE_CLI=ON \
            -DENABLE_ASSEMBLY=OFF \
            -DENABLE_HDR10_PLUS=ON \
            -DENABLE_MKV=ON \
            -DHIGH_BIT_DEPTH=ON \
            -DMAIN12=ON
          check_cxx20_commands_clang build/cxx20-warning-scan-12bit \
            --min-cpp-commands=60 \
            --required-depth-define=-DX265_DEPTH=12 \
            --forbidden-flag=-DX265_DEPTH=8 \
            --forbidden-flag=-DX265_DEPTH=10 \
            --required-file-substring=source/abrEncApp.cpp
          ninja -C build/cxx20-warning-scan-12bit cli
          python - <<'PY'
          from pathlib import Path
          width = height = 64
          y = (512).to_bytes(2, 'little') * (width * height)
          uv = (2048).to_bytes(2, 'little') * (width * height // 2)
          Path('build/cxx20-warning-scan-12bit/smoke_12bit.yuv').write_bytes(y + uv)
          PY
          build/cxx20-warning-scan-12bit/x265.exe --input build/cxx20-warning-scan-12bit/smoke_12bit.yuv --input-res 64x64 --input-depth 12 --output-depth 12 --fps 1 --frames 1 --output build/cxx20-warning-scan-12bit/smoke_12bit.hevc
          test -s build/cxx20-warning-scan-12bit/smoke_12bit.hevc

          configure_cxx20_scan x265/source build/cxx20-warning-scan-unity \
            -DENABLE_CLI=ON \
            -DENABLE_ASSEMBLY=OFF \
            -DENABLE_UNITY_BUILD=ON \
            -DENABLE_HDR10_PLUS=ON \
            -DENABLE_MKV=ON
          check_cxx20_commands_clang build/cxx20-warning-scan-unity \
            --min-cpp-commands=1 \
            --required-depth-define=-DX265_DEPTH=8 \
            --forbidden-flag=-DX265_DEPTH=10 \
            --forbidden-flag=-DX265_DEPTH=12 \
            --required-file-substring=source/dynamicHDR10/ \
            --required-file-substring=source/output/output.cpp \
            --forbidden-file-substring=source/input/lavf.cpp \
            --forbidden-file-substring=source/output/mp4.cpp

          configure_cxx20_scan x265/source build/cxx20-warning-scan-shared-deps \
            -DENABLE_CLI=ON \
            -DENABLE_ASSEMBLY=OFF \
            -DENABLE_HDR10_PLUS=OFF \
            -DENABLE_MKV=ON \
            -DENABLE_LAVF=ON \
            -DENABLE_STATIC_LAVF=ON \
            -DENABLE_LSMASH=ON
          check_cxx20_commands_clang build/cxx20-warning-scan-shared-deps \
            --min-cpp-commands=60 \
            --required-depth-define=-DX265_DEPTH=8 \
            --forbidden-flag=-DX265_DEPTH=10 \
            --forbidden-flag=-DX265_DEPTH=12 \
            --required-file-substring=source/input/lavf.cpp \
            --required-file-substring=source/output/mkv.cpp \
            --required-file-substring=source/output/mp4.cpp \
            --required-file-flag=source/input/lavf.cpp=-DENABLE_LAVF \
            --required-file-flag=source/output/mkv.cpp=-DENABLE_MKV \
            --required-file-flag=source/output/mp4.cpp=-DENABLE_LSMASH \
            --forbidden-file-substring=source/dynamicHDR10/ \
            --forbidden-file-flag=source/common/common.cpp=-DENABLE_LAVF \
            --forbidden-file-flag=source/common/common.cpp=-DENABLE_MKV \
            --forbidden-file-flag=source/common/common.cpp=-DENABLE_LSMASH \
            --forbidden-file-flag=source/encoder/encoder.cpp=-DENABLE_LAVF \
            --forbidden-file-flag=source/encoder/encoder.cpp=-DENABLE_MKV \
            --forbidden-file-flag=source/encoder/encoder.cpp=-DENABLE_LSMASH

          configure_cxx20_scan x265/source build/cxx20-warning-scan-shared-deps-asm \
            -DENABLE_CLI=ON \
            -DENABLE_ASSEMBLY=ON \
            -DENABLE_HDR10_PLUS=OFF \
            -DENABLE_MKV=ON \
            -DENABLE_LAVF=ON \
            -DENABLE_STATIC_LAVF=ON \
            -DENABLE_LSMASH=ON \
            -DCMAKE_ASM_NASM_FLAGS=-w-macro-params-legacy
          check_cxx20_commands_clang build/cxx20-warning-scan-shared-deps-asm \
            --min-cpp-commands=60 \
            --required-depth-define=-DX265_DEPTH=8 \
            --forbidden-flag=-DX265_DEPTH=10 \
            --forbidden-flag=-DX265_DEPTH=12 \
            --required-file-substring=source/input/lavf.cpp \
            --required-file-substring=source/output/mkv.cpp \
            --required-file-substring=source/output/mp4.cpp \
            --required-file-flag=source/input/lavf.cpp=-DENABLE_LAVF \
            --required-file-flag=source/output/mkv.cpp=-DENABLE_MKV \
            --required-file-flag=source/output/mp4.cpp=-DENABLE_LSMASH \
            --forbidden-file-substring=source/dynamicHDR10/ \
            --forbidden-file-flag=source/common/common.cpp=-DENABLE_LAVF \
            --forbidden-file-flag=source/common/common.cpp=-DENABLE_MKV \
            --forbidden-file-flag=source/common/common.cpp=-DENABLE_LSMASH \
            --forbidden-file-flag=source/encoder/encoder.cpp=-DENABLE_LAVF \
            --forbidden-file-flag=source/encoder/encoder.cpp=-DENABLE_MKV \
            --forbidden-file-flag=source/encoder/encoder.cpp=-DENABLE_LSMASH
          ninja -C build/cxx20-warning-scan-shared-deps-asm cli


      - name: Run C++20 shared and all-bit-depth warning scans
        env:
          PKG_CONFIG_PATH: /usr/local/lib/pkgconfig:/clang64/lib/pkgconfig
        run: |
          source cxx20-scan-helpers.sh
          configure_cxx20_scan x265/source build/cxx20-warning-scan-shared-library \
            -DENABLE_CLI=ON \
            -DENABLE_SHARED=ON \
            -DENABLE_ASSEMBLY=OFF \
            -DENABLE_HDR10_PLUS=ON \
            -DENABLE_MKV=ON
          check_cxx20_commands_clang build/cxx20-warning-scan-shared-library \
            --min-cpp-commands=60 \
            --required-depth-define=-DX265_DEPTH=8 \
            --forbidden-flag=-DX265_DEPTH=10 \
            --forbidden-flag=-DX265_DEPTH=12 \
            --required-file-substring=source/output/output.cpp \
            --required-file-substring=source/encoder/api.cpp \
            --required-file-substring=source/common/version.cpp \
            --forbidden-file-substring=source/input/lavf.cpp \
            --forbidden-file-substring=source/output/mp4.cpp
          ninja -C build/cxx20-warning-scan-shared-library cli x265-shared
          python - <<'PY'
          from pathlib import Path
          width = height = 64
          frame = bytes([0]) * (width * height) + bytes([128]) * (width * height // 2)
          Path('build/cxx20-warning-scan-shared-library/smoke_shared.yuv').write_bytes(frame)
          PY
          build/cxx20-warning-scan-shared-library/x265.exe --input build/cxx20-warning-scan-shared-library/smoke_shared.yuv --input-res 64x64 --fps 1 --frames 1 --output build/cxx20-warning-scan-shared-library/smoke_shared.hevc
          test -s build/cxx20-warning-scan-shared-library/smoke_shared.hevc

          configure_cxx20_scan x265/source build/cxx20-warning-scan-all-8b-lib \
            -DENABLE_CLI=OFF \
            -DENABLE_ASSEMBLY=OFF \
            -DENABLE_HDR10_PLUS=OFF \
            -DENABLE_MKV=OFF \
            -DEXPORT_C_API=OFF
          check_cxx20_commands_clang build/cxx20-warning-scan-all-8b-lib \
            --min-cpp-commands=50 \
            --required-depth-define=-DX265_DEPTH=8 \
            --forbidden-flag=-DX265_DEPTH=10 \
            --forbidden-flag=-DX265_DEPTH=12 \
            --required-file-substring=source/encoder/api.cpp \
            --required-file-substring=source/common/version.cpp \
            --forbidden-file-flag=source/encoder/api.cpp=-DEXPORT_C_API=1 \
            --forbidden-file-substring=source/dynamicHDR10/ \
            --forbidden-file-substring=source/input/ \
            --forbidden-file-substring=source/output/ \
            --forbidden-file-substring=source/abrEncApp.cpp \
            --forbidden-file-substring=source/x265.cpp \
            --forbidden-file-substring=source/x265cli.cpp
          ninja -C build/cxx20-warning-scan-all-8b-lib x265-static

          configure_cxx20_scan x265/source build/cxx20-warning-scan-all-12b-lib \
            -DENABLE_CLI=OFF \
            -DENABLE_ASSEMBLY=OFF \
            -DENABLE_HDR10_PLUS=OFF \
            -DENABLE_MKV=OFF \
            -DEXPORT_C_API=OFF \
            -DHIGH_BIT_DEPTH=ON \
            -DMAIN12=ON
          check_cxx20_commands_clang build/cxx20-warning-scan-all-12b-lib \
            --min-cpp-commands=50 \
            --required-depth-define=-DX265_DEPTH=12 \
            --forbidden-flag=-DX265_DEPTH=8 \
            --forbidden-flag=-DX265_DEPTH=10 \
            --required-file-substring=source/encoder/api.cpp \
            --required-file-substring=source/common/version.cpp \
            --forbidden-file-flag=source/encoder/api.cpp=-DEXPORT_C_API=1 \
            --forbidden-file-substring=source/dynamicHDR10/ \
            --forbidden-file-substring=source/input/ \
            --forbidden-file-substring=source/output/ \
            --forbidden-file-substring=source/abrEncApp.cpp \
            --forbidden-file-substring=source/x265.cpp \
            --forbidden-file-substring=source/x265cli.cpp
          ninja -C build/cxx20-warning-scan-all-12b-lib x265-static

          mkdir -p build/cxx20-warning-scan-all
          cp build/cxx20-warning-scan-all-8b-lib/libx265.a build/cxx20-warning-scan-all/libx265_8b.a
          cp build/cxx20-warning-scan-all-12b-lib/libx265.a build/cxx20-warning-scan-all/libx265_12b.a
          configure_cxx20_scan x265/source build/cxx20-warning-scan-all \
            -DENABLE_CLI=ON \
            -DENABLE_ASSEMBLY=OFF \
            -DENABLE_HDR10_PLUS=ON \
            -DENABLE_MKV=ON \
            -DEXTRA_LIB="x265_8b.a;x265_12b.a" \
            -DEXTRA_LINK_FLAGS=-L. \
            -DLINKED_8BIT=ON \
            -DLINKED_12BIT=ON \
            -DHIGH_BIT_DEPTH=ON
          check_cxx20_commands_clang build/cxx20-warning-scan-all \
            --min-cpp-commands=60 \
            --required-depth-define=-DX265_DEPTH=10 \
            --forbidden-flag=-DX265_DEPTH=8 \
            --forbidden-flag=-DX265_DEPTH=12 \
            --required-file-substring=source/output/output.cpp \
            --required-file-substring=source/dynamicHDR10/ \
            --required-file-flag=source/common/version.cpp=-DLINKED_8BIT=1 \
            --required-file-flag=source/common/version.cpp=-DLINKED_12BIT=1 \
            --required-file-flag=source/encoder/api.cpp=-DLINKED_8BIT=1 \
            --required-file-flag=source/encoder/api.cpp=-DLINKED_12BIT=1 \
            --forbidden-file-substring=source/input/lavf.cpp \
            --forbidden-file-substring=source/output/mp4.cpp
          ninja -C build/cxx20-warning-scan-all cli
          python - <<'PY'
          from pathlib import Path
          width = height = 64
          y = (512).to_bytes(2, 'little') * (width * height)
          uv = (512).to_bytes(2, 'little') * (width * height // 2)
          Path('build/cxx20-warning-scan-all/smoke_all.yuv').write_bytes(y + uv)
          PY
          build/cxx20-warning-scan-all/x265.exe --input build/cxx20-warning-scan-all/smoke_all.yuv --input-res 64x64 --input-depth 10 --output-depth 10 --fps 1 --frames 1 --output build/cxx20-warning-scan-all/smoke_all.hevc
          test -s build/cxx20-warning-scan-all/smoke_all.hevc


      - name: Run C++20 CPU and ASM warning scans
        env:
          PKG_CONFIG_PATH: /usr/local/lib/pkgconfig:/clang64/lib/pkgconfig
        run: |
          source cxx20-scan-helpers.sh
          for target_cpu in haswell arrowlake znver5; do
            configure_cxx20_scan x265/source "build/cxx20-warning-scan-${target_cpu}" \
              --target-cpu="${target_cpu}" \
              -DENABLE_CLI=OFF \
              -DENABLE_ASSEMBLY=OFF \
              -DENABLE_HDR10_PLUS=OFF \
              -DENABLE_MKV=OFF
            check_cxx20_commands_clang "build/cxx20-warning-scan-${target_cpu}" \
              --min-cpp-commands=50 \
              --required-depth-define=-DX265_DEPTH=8 \
              --forbidden-flag=-DX265_DEPTH=10 \
              --forbidden-flag=-DX265_DEPTH=12 \
              --required-file-substring=source/encoder/api.cpp \
              --required-file-substring=source/common/cpu.cpp \
              --forbidden-file-substring=source/dynamicHDR10/ \
              --forbidden-file-substring=source/input/ \
              --forbidden-file-substring=source/output/ \
              --forbidden-file-substring=source/abrEncApp.cpp \
              --forbidden-file-substring=source/x265.cpp \
              --forbidden-file-substring=source/x265cli.cpp
          done

          configure_cxx20_scan x265/source build/cxx20-warning-scan-asm \
            -DENABLE_CLI=OFF \
            -DENABLE_ASSEMBLY=ON \
            -DENABLE_TESTS=ON \
            -DENABLE_HDR10_PLUS=OFF \
            -DENABLE_MKV=OFF \
            -DCMAKE_ASM_NASM_FLAGS=-w-macro-params-legacy
          check_cxx20_commands_clang build/cxx20-warning-scan-asm \
            --min-cpp-commands=3 \
            --required-file-substring=source/test/
          ninja -C build/cxx20-warning-scan-asm TestBench

  cxx20-gcc-compile-commands:
    needs: validate-deps-cache-suffix
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Checkout X265
        uses: actions/checkout@v6
        with:
          path: x265
          fetch-depth: 0
          fetch-tags: true

      - name: Setup GCC diagnostics
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            git
            make
            nasm
            pkgconf
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-python

      - name: Run GCC C++20 compile command diagnostics
        run: |
          set -euo pipefail
          source x265/.github/scripts/cxx20_scan_helpers.sh

          configure_cxx20_scan x265/source build/cxx20-gcc-compile-commands \
            --cxx-compiler=g++ \
            -DENABLE_CLI=ON \
            -DENABLE_ASSEMBLY=OFF \
            -DENABLE_HDR10_PLUS=ON \
            -DENABLE_MKV=ON
          check_cxx20_commands_gcc build/cxx20-gcc-compile-commands \
            --min-cpp-commands=60 \
            --required-depth-define=-DX265_DEPTH=8 \
            --forbidden-flag=-DX265_DEPTH=10 \
            --forbidden-flag=-DX265_DEPTH=12 \
            --required-file-substring=source/encoder/ \
            --required-file-substring=source/common/ \
            --required-file-substring=source/input/ \
            --required-file-substring=source/output/ \
            --required-file-substring=source/output/reconplay.cpp \
            --required-file-substring=source/dynamicHDR10/ \
            --forbidden-file-substring=source/input/lavf.cpp \
            --forbidden-file-substring=source/output/mp4.cpp
          ninja -C build/cxx20-gcc-compile-commands cli

          configure_cxx20_scan x265/source build/cxx20-gcc-compile-commands-12bit \
            --cxx-compiler=g++ \
            -DENABLE_CLI=OFF \
            -DENABLE_ASSEMBLY=OFF \
            -DENABLE_HDR10_PLUS=OFF \
            -DENABLE_MKV=OFF \
            -DEXPORT_C_API=OFF \
            -DHIGH_BIT_DEPTH=ON \
            -DMAIN12=ON
          check_cxx20_commands_gcc build/cxx20-gcc-compile-commands-12bit \
            --min-cpp-commands=50 \
            --required-depth-define=-DX265_DEPTH=12 \
            --forbidden-flag=-DX265_DEPTH=8 \
            --forbidden-flag=-DX265_DEPTH=10 \
            --required-file-substring=source/encoder/api.cpp \
            --required-file-substring=source/common/version.cpp \
            --forbidden-file-flag=source/encoder/api.cpp=-DEXPORT_C_API=1 \
            --forbidden-file-substring=source/dynamicHDR10/ \
            --forbidden-file-substring=source/input/ \
            --forbidden-file-substring=source/output/ \
            --forbidden-file-substring=source/abrEncApp.cpp \
            --forbidden-file-substring=source/x265.cpp \
            --forbidden-file-substring=source/x265cli.cpp
          ninja -C build/cxx20-gcc-compile-commands-12bit x265-static

          configure_cxx20_scan x265/source build/cxx20-gcc-compile-commands-8bit-lib \
            --cxx-compiler=g++ \
            -DENABLE_CLI=OFF \
            -DENABLE_ASSEMBLY=OFF \
            -DENABLE_HDR10_PLUS=OFF \
            -DENABLE_MKV=OFF \
            -DEXPORT_C_API=OFF
          check_cxx20_commands_gcc build/cxx20-gcc-compile-commands-8bit-lib \
            --min-cpp-commands=50 \
            --required-depth-define=-DX265_DEPTH=8 \
            --forbidden-flag=-DX265_DEPTH=10 \
            --forbidden-flag=-DX265_DEPTH=12 \
            --required-file-substring=source/encoder/api.cpp \
            --required-file-substring=source/common/version.cpp \
            --required-file-substring=source/common/winxp.cpp \
            --required-file-flag=source/common/winxp.cpp=-D_WIN32_WINNT=_WIN32_WINXP \
            --forbidden-file-flag=source/encoder/api.cpp=-DEXPORT_C_API=1 \
            --forbidden-file-substring=source/dynamicHDR10/ \
            --forbidden-file-substring=source/input/ \
            --forbidden-file-substring=source/output/ \
            --forbidden-file-substring=source/abrEncApp.cpp \
            --forbidden-file-substring=source/x265.cpp \
            --forbidden-file-substring=source/x265cli.cpp
          ninja -C build/cxx20-gcc-compile-commands-8bit-lib x265-static

          mkdir -p build/cxx20-gcc-compile-commands-all
          cp build/cxx20-gcc-compile-commands-8bit-lib/libx265.a build/cxx20-gcc-compile-commands-all/libx265_8b.a
          cp build/cxx20-gcc-compile-commands-12bit/libx265.a build/cxx20-gcc-compile-commands-all/libx265_12b.a
          configure_cxx20_scan x265/source build/cxx20-gcc-compile-commands-all \
            --cxx-compiler=g++ \
            -DENABLE_CLI=ON \
            -DENABLE_ASSEMBLY=OFF \
            -DENABLE_HDR10_PLUS=ON \
            -DENABLE_MKV=ON \
            -DEXTRA_LIB="x265_8b.a;x265_12b.a" \
            -DEXTRA_LINK_FLAGS=-L. \
            -DLINKED_8BIT=ON \
            -DLINKED_12BIT=ON \
            -DHIGH_BIT_DEPTH=ON
          check_cxx20_commands_gcc build/cxx20-gcc-compile-commands-all \
            --min-cpp-commands=60 \
            --required-depth-define=-DX265_DEPTH=10 \
            --forbidden-flag=-DX265_DEPTH=8 \
            --forbidden-flag=-DX265_DEPTH=12 \
            --required-file-substring=source/output/output.cpp \
            --required-file-substring=source/dynamicHDR10/ \
            --required-file-flag=source/common/version.cpp=-DLINKED_8BIT=1 \
            --required-file-flag=source/common/version.cpp=-DLINKED_12BIT=1 \
            --required-file-flag=source/encoder/api.cpp=-DLINKED_8BIT=1 \
            --required-file-flag=source/encoder/api.cpp=-DLINKED_12BIT=1 \
            --forbidden-file-substring=source/input/lavf.cpp \
            --forbidden-file-substring=source/output/mp4.cpp
          ninja -C build/cxx20-gcc-compile-commands-all cli

  cxx20-linux-gcc-compile-commands:
    needs: validate-deps-cache-suffix
    runs-on: ubuntu-latest
    steps:
      - name: Checkout X265
        uses: actions/checkout@v6
        with:
          path: x265
          fetch-depth: 0
          fetch-tags: true

      - name: Install CMake 4
        shell: bash
        run: |
          set -euo pipefail
          python -m venv "$RUNNER_TEMP/cmake-venv"
          "$RUNNER_TEMP/cmake-venv/bin/python" -m pip install 'cmake>=4.0,<5'
          echo "$RUNNER_TEMP/cmake-venv/bin" >> "$GITHUB_PATH"

      - name: Show GCC diagnostics tools
        shell: bash
        run: |
          set -euo pipefail
          cmake --version
          g++ --version
          ninja --version
          python --version

      - name: Run Linux GCC C++20 compile command diagnostics
        shell: bash
        run: |
          set -euo pipefail
          source x265/.github/scripts/cxx20_scan_helpers.sh

          configure_cxx20_scan x265/source build/cxx20-linux-gcc-compile-commands \
            --cxx-compiler=g++ \
            -DENABLE_CLI=ON \
            -DENABLE_ASSEMBLY=OFF \
            -DENABLE_HDR10_PLUS=ON \
            -DENABLE_MKV=ON
          check_cxx20_commands_gcc build/cxx20-linux-gcc-compile-commands \
            --min-cpp-commands=60 \
            --required-depth-define=-DX265_DEPTH=8 \
            --forbidden-flag=-DX265_DEPTH=10 \
            --forbidden-flag=-DX265_DEPTH=12 \
            --required-file-substring=source/encoder/ \
            --required-file-substring=source/common/ \
            --required-file-substring=source/input/ \
            --required-file-substring=source/output/ \
            --required-file-substring=source/output/reconplay.cpp \
            --required-file-substring=source/dynamicHDR10/ \
            --forbidden-file-substring=source/common/winxp.cpp \
            --forbidden-file-substring=source/input/lavf.cpp \
            --forbidden-file-substring=source/output/mp4.cpp
          ninja -C build/cxx20-linux-gcc-compile-commands cli
          python - <<'PY'
          from pathlib import Path
          width = height = 64
          frame = bytes([0]) * (width * height) + bytes([128]) * (width * height // 2)
          Path('build/cxx20-linux-gcc-compile-commands/smoke_linux_gcc.yuv').write_bytes(frame)
          PY
          build/cxx20-linux-gcc-compile-commands/x265 --input build/cxx20-linux-gcc-compile-commands/smoke_linux_gcc.yuv --input-res 64x64 --fps 1 --frames 1 --output build/cxx20-linux-gcc-compile-commands/smoke_linux_gcc.hevc 2>&1 | tee build/cxx20-linux-gcc-compile-commands/smoke_linux_gcc.log
          test -s build/cxx20-linux-gcc-compile-commands/smoke_linux_gcc.log
          test -s build/cxx20-linux-gcc-compile-commands/smoke_linux_gcc.hevc
          grep -Fq 'encoded 1 frames' build/cxx20-linux-gcc-compile-commands/smoke_linux_gcc.log

          configure_cxx20_scan x265/source build/cxx20-linux-gcc-compile-commands-12bit \
            --cxx-compiler=g++ \
            -DENABLE_CLI=OFF \
            -DENABLE_ASSEMBLY=OFF \
            -DENABLE_HDR10_PLUS=OFF \
            -DENABLE_MKV=OFF \
            -DEXPORT_C_API=OFF \
            -DHIGH_BIT_DEPTH=ON \
            -DMAIN12=ON
          check_cxx20_commands_gcc build/cxx20-linux-gcc-compile-commands-12bit \
            --min-cpp-commands=50 \
            --required-depth-define=-DX265_DEPTH=12 \
            --forbidden-flag=-DX265_DEPTH=8 \
            --forbidden-flag=-DX265_DEPTH=10 \
            --required-file-substring=source/encoder/api.cpp \
            --required-file-substring=source/common/version.cpp \
            --forbidden-file-flag=source/encoder/api.cpp=-DEXPORT_C_API=1 \
            --forbidden-file-substring=source/dynamicHDR10/ \
            --forbidden-file-substring=source/input/ \
            --forbidden-file-substring=source/output/ \
            --forbidden-file-substring=source/abrEncApp.cpp \
            --forbidden-file-substring=source/x265.cpp \
            --forbidden-file-substring=source/x265cli.cpp
          ninja -C build/cxx20-linux-gcc-compile-commands-12bit x265-static

  build:
    needs: validate-deps-cache-suffix
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    strategy:
      fail-fast: false
      matrix:
        target_cpu:
          - x86-64
          - haswell
          - skylake
          - alderlake
          - raptorlake
          - arrowlake
          - znver2
          - znver3
          - znver4
          - znver5

    steps:
    - name: Checkout X265
      uses: actions/checkout@v6
      with:
        path: x265
        fetch-depth: 0
        fetch-tags: true

    - name: Get Latest Tag
      id: tag
      shell: bash
      working-directory: x265
      run: |
        version=""
        if [[ "${GITHUB_REF:-}" == refs/tags/[0-9].[0-9]* ]]; then
          version="${GITHUB_REF_NAME:-}"
        else
          version=$(git tag --list '[0-9].[0-9]*' --sort=-v:refname | head -n1)
        fi
        if [ -z "$version" ]; then
          version="0.0"
          echo "::warning::No numeric version tag found; using $version as CI fallback"
        fi
        test -n "$version"
        echo "version=$version" >> "$GITHUB_OUTPUT"

    - name: Get CI Version
      id: ci_version
      shell: bash
      working-directory: x265
      run: |
        head_tag=$(git describe --tags --match='[0-9].[0-9]*' HEAD 2>/dev/null || true)
        head_hash=$(git rev-parse --short HEAD)
        if [ -z "$head_tag" ]; then
          version="${{ steps.tag.outputs.version }}-g${head_hash}"
        elif [[ "$head_tag" != *-* ]]; then
          version="${head_tag#M}-g${head_hash}"
        else
          orig_tag=${head_tag%%-*}
          rest=${head_tag#*-}
          distance=${rest%%-*}
          version="${orig_tag#M}+${distance}-g${head_hash}"
        fi
        test -n "$version"
        echo "version=$version" >> "$GITHUB_OUTPUT"

    - name: Setup Shared Dependencies
      uses: ./x265/.github/actions/setup-windows-deps
      with:
        ffmpeg-cache-suffix: lavf-v2-clang
        ffmpeg-configure: |
          ./configure --prefix=/usr/local --enable-gpl \
            --disable-runtime-cpudetect --disable-all --disable-autodetect \
            --disable-everything --disable-network \
            --enable-avformat --enable-avcodec --enable-avutil --enable-swscale \
            --enable-demuxer=mov,matroska,mpegts,avi,mpegvideo,m4v,mpeg,ogg,asf \
            --enable-decoder=h264,hevc,ffv1,ffvhuff,huffyuv,rawvideo,wrapped_avframe,aac,ac3,mp3 \
            --enable-protocol=file \
            --cc=cc --cxx=c++ --cpu=x86-64
        use-mimalloc: 'true'
        use-gop-muxer: 'true'
        extra-msys2-packages: >-
          mingw-w64-clang-x86_64-ffmpeg
          mingw-w64-clang-x86_64-lldb

    - name: Detect LLVM Profdata Identity
      id: llvm_profdata
      run: |
        version=$(llvm-profdata --version | sed -nE 's/.*LLVM version ([0-9]+\.[0-9]+).*/\1/p' | head -1)
        test -n "$version"
        safe_version=${version//[^A-Za-z0-9_.-]/_}
        echo "id=llvm-${safe_version}" >> "$GITHUB_OUTPUT"
        echo "version=$version" >> "$GITHUB_OUTPUT"

    - name: Fetch PGO Profdata
      shell: bash
      run: |
        mkdir -p build
        cd x265

        append_pgo_status() {
          local profile_target="$1"
          local status="$2"
          local branch="$3"
          local note="$4"
          note=$(printf '%s' "$note" | tr '\n|' ';/' | cut -c1-180)
          printf '| %s | %s | %s | %s | %s |\n' "${{ matrix.target_cpu }}" "$profile_target" "$status" "$branch" "$note" >> ../build/pgo-status.md
        }

        fetch_profdata() {
          local target="$1"
          local primary_branch="$2"
          local fallback_branch="$3"
          local source_path="$4"
          local expected_toolchain="${5:-}"
          local report_unavailable="${6:-true}"
          local destination="../build/x265-${target}.profdata"
          local branch last_branch="" status="unavailable" summary_branch="" summary_note="no matching profdata branch"

          if [ -s "$destination" ]; then
            echo "PGO profdata already selected for ${target}: ${destination}"
            append_pgo_status "$target" selected previous "already selected by newer branch identity"
            return 0
          fi

          for branch in "$primary_branch" "$fallback_branch"; do
            [ -n "$branch" ] || continue
            [ "$branch" != "$last_branch" ] || continue
            last_branch="$branch"
            summary_branch="$branch"

            local ls_remote_output ls_remote_status
            set +e
            ls_remote_output=$(git ls-remote --exit-code --heads origin "$branch" 2>&1)
            ls_remote_status=$?
            set -e
            if [ "$ls_remote_status" -eq 2 ]; then
              echo "PGO profdata branch missing: $branch"
              summary_note="missing branch ${branch}"
              continue
            fi
            if [ "$ls_remote_status" -ne 0 ]; then
              printf '%s\n' "$ls_remote_output"
              return "$ls_remote_status"
            fi

            echo "=== Fetching PGO profdata for ${target} from ${branch}:${source_path} ==="
            git fetch --quiet origin "$branch" --depth=1

            local metadata_path="../build/x265-${target}.profdata.metadata.json"
            rm -f "$metadata_path"
            if git show "FETCH_HEAD:metadata.json" > "$metadata_path" 2>/dev/null; then
              rm -rf ../build/profiles
              mkdir -p ../build/profiles
              if ! git show "FETCH_HEAD:profiles/0.profdata" > ../build/profiles/0.profdata 2>/dev/null; then
                rm -f ../build/profiles/0.profdata
              fi
              metadata_check_args=(
                --expected-target="$target"
                --expected-branch="$branch"
                --current-commit="${{ github.sha }}"
                --require-dependency-fields
                --require-fresh-slot
              )
              if [ -n "$expected_toolchain" ]; then
                metadata_check_args+=(--expected-toolchain="$expected_toolchain")
              fi
              if ! metadata_check_output=$(python .github/scripts/check_profdata_metadata.py "$metadata_path" "${metadata_check_args[@]}" 2>&1); then
                printf '%s\n' "$metadata_check_output"
                if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
                  {
                    echo
                    echo "#### Rejected PGO metadata"
                    echo
                    echo "- target_cpu: ${{ matrix.target_cpu }}"
                    echo "- profile_target: ${target}"
                    echo "- branch: ${branch}"
                    echo
                    echo '```text'
                    printf '%s\n' "$metadata_check_output" | head -20
                    echo '```'
                  } >> "$GITHUB_STEP_SUMMARY"
                fi
                while IFS= read -r line; do
                  [ -n "$line" ] && echo "::warning::PGO profdata metadata rejected: target=${target} branch=${branch}: $line"
                done <<< "$metadata_check_output"
                summary_note="metadata rejected: $(printf '%s' "$metadata_check_output" | tr '\n' ';' | cut -c1-180)"
                rm -f "$metadata_path"
                rm -rf ../build/profiles
                continue
              fi
              printf '%s\n' "$metadata_check_output"
              summary_note="metadata validated"
              rm -rf ../build/profiles
            else
              echo "::warning::PGO profdata metadata missing: target=${target} branch=${branch}"
              summary_note="metadata missing"
            fi

            if ! git show "FETCH_HEAD:${source_path}" > "$destination" 2>/dev/null; then
              echo "::warning::PGO profdata file missing: target=${target} branch=${branch} path=${source_path}"
              rm -f "$destination"
              summary_note="profdata file missing at ${source_path}"
              continue
            fi

            if [ "$branch" = "$fallback_branch" ] && [ "$primary_branch" != "$fallback_branch" ]; then
              echo "PGO profdata fallback hit: target=${target} primary=${primary_branch} fallback=${fallback_branch}"
              status="fallback"
            else
              echo "PGO profdata hit: target=${target} branch=${branch}"
              status="hit"
            fi
            echo "PGO profdata path: source=${source_path} destination=${destination}"
            append_pgo_status "$target" "$status" "$branch" "$summary_note"
            return 0
          done

          echo "::warning::PGO profdata unavailable: target=${target} primary=${primary_branch} fallback=${fallback_branch}"
          if [ "$report_unavailable" = true ]; then
            append_pgo_status "$target" unavailable "${summary_branch:-none}" "$summary_note"
          fi
        }

        {
          echo "### PGO profdata status"
          echo
          echo "| target_cpu | profile_target | status | branch | notes |"
          echo "| --- | --- | --- | --- | --- |"
        } > ../build/pgo-status.md

        fetch_profdata 8b-lib profdata-${{ matrix.target_cpu }}-8b-lib-${{ steps.llvm_profdata.outputs.id }} profdata-x86-64-8b-lib-${{ steps.llvm_profdata.outputs.id }} x265.profdata ${{ steps.llvm_profdata.outputs.id }} false
        fetch_profdata 8b-lib profdata-${{ matrix.target_cpu }}-8b-lib profdata-x86-64-8b-lib x265.profdata
        fetch_profdata 12b-lib profdata-${{ matrix.target_cpu }}-12b-lib-${{ steps.llvm_profdata.outputs.id }} profdata-x86-64-12b-lib-${{ steps.llvm_profdata.outputs.id }} x265.profdata ${{ steps.llvm_profdata.outputs.id }} false
        fetch_profdata 12b-lib profdata-${{ matrix.target_cpu }}-12b-lib profdata-x86-64-12b-lib x265.profdata
        fetch_profdata all profdata-${{ matrix.target_cpu }}-all-${{ steps.llvm_profdata.outputs.id }} profdata-x86-64-all-${{ steps.llvm_profdata.outputs.id }} x265.profdata ${{ steps.llvm_profdata.outputs.id }} false
        fetch_profdata all profdata-${{ matrix.target_cpu }}-all profdata-x86-64-all x265.profdata
        if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
          cat ../build/pgo-status.md >> "$GITHUB_STEP_SUMMARY"
        fi

    - name: Smoke Test L-SMASH
      env:
        MSYSTEM: CLANG64
      shell: msys2 {0}
      run: |
        set -ex
        export PATH="/clang64/bin:/usr/bin"
        echo "=== Step 1: Check library files ==="
        ls -la /usr/local/lib/liblsmash.a /usr/local/lib/libobuparse.a 2>&1
        echo "=== Step 2: Check symbols in liblsmash ==="
        nm /usr/local/lib/liblsmash.a 2>/dev/null | grep -E "lsmash_create_root|lsmash_destroy_root" | head -5
        echo "=== Step 3: Check obp symbols in liblsmash (verifies obuparse linkage) ==="
        nm /usr/local/lib/liblsmash.a 2>/dev/null | grep " obp_" | head -10
        echo "=== Step 4: Compile smoke test ==="
        cat > /tmp/lsmash_smoke.c << 'SMOKE'
        #include <stdio.h>
        #include <lsmash.h>
        int main(void) {
            printf("Creating root...\n");
            lsmash_root_t *root = lsmash_create_root();
            if (!root) { printf("FAIL: lsmash_create_root returned NULL\n"); return 1; }
            printf("OK: lsmash_create_root succeeded %p\n", (void*)root);
            printf("Destroying root...\n");
            lsmash_destroy_root(root);
            printf("OK: lsmash_destroy_root succeeded\n");
            return 0;
        }
        SMOKE
        echo "=== Step 5: Compile smoke test (no ASAN - runtime unavailable in clang64) ==="
        clang -g -I/usr/local/include -L/usr/local/lib /tmp/lsmash_smoke.c /usr/local/lib/liblsmash.a /usr/local/lib/libobuparse.a -lm -o /tmp/lsmash_smoke.exe
        cat > /tmp/mp4_smoke.c << 'MP4SMOKE'
        #include <stdio.h>
        #include <stdlib.h>
        #include <string.h>
        #include <lsmash.h>
        int main(void) {
            printf("Creating root...\n");
            lsmash_root_t *root = lsmash_create_root();
            if (!root) { printf("FAIL: lsmash_create_root\n"); return 1; }
            printf("OK: root %p\n", (void*)root);

            lsmash_file_parameters_t params = {0};
            printf("Opening file...\n");
            if (lsmash_open_file("./smoke.mp4", 0, &params) < 0) {
                printf("FAIL: lsmash_open_file\n"); lsmash_destroy_root(root); return 1; }
            printf("Setting file...\n");
            if (!lsmash_set_file(root, &params)) {
                printf("FAIL: lsmash_set_file\n"); lsmash_destroy_root(root); return 1; }

            printf("Creating track...\n");
            uint32_t track = lsmash_create_track(root, ISOM_MEDIA_HANDLER_TYPE_VIDEO_TRACK);
            if (!track) { printf("FAIL: lsmash_create_track\n"); lsmash_destroy_root(root); return 1; }
            printf("OK: track %u\n", track);

            lsmash_media_parameters_t media_params;
            lsmash_initialize_media_parameters(&media_params);
            media_params.timescale = 24;
            if (lsmash_set_media_parameters(root, track, &media_params) < 0) {
                printf("FAIL: lsmash_set_media_parameters\n"); lsmash_destroy_root(root); return 1; }

            lsmash_video_summary_t *summary = (lsmash_video_summary_t*)lsmash_create_summary(LSMASH_SUMMARY_TYPE_VIDEO);
            if (!summary) { printf("FAIL: lsmash_create_summary\n"); lsmash_destroy_root(root); return 1; }
            summary->sample_type = ISOM_CODEC_TYPE_HVC1_VIDEO;
            summary->width = 128;
            summary->height = 72;

            printf("Adding sample entry...\n");
            uint32_t sampleEntry = lsmash_add_sample_entry(root, track, (lsmash_summary_t*)summary);
            if (!sampleEntry) { printf("FAIL: lsmash_add_sample_entry\n"); lsmash_destroy_root(root); return 1; }
            printf("OK: sampleEntry %u\n", sampleEntry);

            // Create a minimal fake HEVC NAL unit (5 bytes: start code + slice)
            unsigned char fake_nal[5] = {0x00, 0x00, 0x00, 0x01, 0x41};
            lsmash_sample_t *sample = lsmash_create_sample(16);
            if (!sample) { printf("FAIL: lsmash_create_sample\n"); lsmash_destroy_root(root); return 1; }
            memset(sample->data, 0, 16);
            memcpy(sample->data, fake_nal, 5);
            sample->length = 16;
            sample->dts = 0;
            sample->cts = 0;
            sample->prop.ra_flags = ISOM_SAMPLE_RANDOM_ACCESS_FLAG_SYNC;
            sample->index = sampleEntry;

            printf("Appending sample (track=%u)...\n", track);
            if (lsmash_append_sample(root, track, sample)) {
                printf("FAIL: lsmash_append_sample\n"); lsmash_delete_sample(sample); lsmash_destroy_root(root); return 1; }
            printf("OK: sample appended\n");
            sample = NULL;

            printf("Finishing movie...\n");
            lsmash_finish_movie(root, NULL);
            printf("Closing file...\n");
            lsmash_close_file(&params);
            lsmash_destroy_root(root);
            printf("OK: complete MP4 write smoke passed\n");
            return 0;
        }
        MP4SMOKE
        echo "=== Step 6: Run root smoke ==="
        /tmp/lsmash_smoke.exe
        echo "=== Step 7: MP4 creation smoke (tests lsmash+obuparse ABI) ==="
        clang -g -I/usr/local/include -L/usr/local/lib /tmp/mp4_smoke.c /usr/local/lib/liblsmash.a /usr/local/lib/libobuparse.a -lm -o /tmp/mp4_smoke.exe
        cat > /tmp/mp4_smoke_lldb.cmd <<'LLDB'
        run
        process status
        thread list
        thread backtrace all
        bt full
        frame info
        register read
        disassemble --pc
        image list
        quit
        LLDB
        lldb -b -s /tmp/mp4_smoke_lldb.cmd /tmp/mp4_smoke.exe || true
        test -s smoke.mp4
        echo "L-SMASH smoke: PASS"

    # === Build x265 ===
    - name: Setup Build Dirs
      run: mkdir -p build/8b build/10b build/12b build/8b-lib build/12b-lib build/all-8b-lib build/all-12b-lib build/all

    - name: Compile X265
      env:
        PKG_CONFIG_PATH: /usr/local/lib/pkgconfig:/clang64/lib/pkgconfig
      run: |
        set -euo pipefail

        CPU=${{matrix.target_cpu}}
        FULL_BUILD=false
        if [ "${{ github.event_name }}" = 'workflow_dispatch' ] || [[ "${{ github.ref }}" == refs/tags/* ]]; then
          FULL_BUILD=true
          echo "Building full CLI set"
        else
          echo "Building all-only push path"
        fi

        mkdir -p build/logs

        print_thinlto_cache() {
          local dir="$1"
          local cache="$dir/CMakeCache.txt"

          echo "=== ThinLTO cache: $dir ==="
          if [ ! -f "$cache" ]; then
            echo "Missing CMakeCache.txt: $cache"
            return 1
          fi

          for key in CMAKE_CXX_COMPILER CMAKE_CXX_FLAGS CMAKE_EXE_LINKER_FLAGS CMAKE_INTERPROCEDURAL_OPTIMIZATION CMAKE_AR CMAKE_RANLIB; do
            grep -E "^${key}:" "$cache" || echo "${key}:UNSET=<unset>"
          done
        }

        run_ninja_logged() {
          local label="$1"
          local dir="$2"
          local jobs="${3:-}"
          local log="build/logs/${label}.log"

          echo "=== Verbose ninja: $dir -> $log ==="
          (
            set -o pipefail
            if [ -n "$jobs" ]; then
              ninja -C "$dir" -v -j "$jobs" 2>&1 | tee "$log"
            else
              ninja -C "$dir" -v 2>&1 | tee "$log"
            fi
          )
        }

        wait_for_jobs() {
          local status=0
          local pid

          for pid in "$@"; do
            if ! wait "$pid"; then
              status=1
            fi
          done

          return "$status"
        }

        NPROC=$(nproc)
        NINJA_JOBS_PAIR=$(( (NPROC + 1) / 2 ))
        NINJA_JOBS_TRIPLE=$(( (NPROC + 2) / 3 ))
        echo "Ninja job limits: single=${NPROC}, pair=${NINJA_JOBS_PAIR}, triple=${NINJA_JOBS_TRIPLE}"

        summarize_thinlto_logs() {
          local compile_cmd link_cmd archive_cmd

          compile_cmd=$(grep -h -E -- '-flto=thin' build/logs/*.log | grep -- ' -c ' | head -n1 || true)
          link_cmd=$(grep -h -E -- '-flto=thin' build/logs/*.log | grep -F 'x265' | grep -v -- ' -c ' | head -n1 || true)
          archive_cmd=$(grep -h -E 'libx265\.a|x265_8b\.a|x265_12b\.a' build/logs/*.log | grep -E 'llvm-ar|llvm-ranlib|(^|[[:space:]/])ar([[:space:]]|$)|(^|[[:space:]/])ranlib([[:space:]]|$)' | head -n1 || true)

          echo "=== ThinLTO summary ==="
          if [ -n "$compile_cmd" ]; then
            echo "compile_with_thinlto=yes"
            echo "$compile_cmd"
          else
            echo "compile_with_thinlto=no"
          fi

          if [ -n "$link_cmd" ]; then
            echo "link_with_thinlto=yes"
            echo "$link_cmd"
          else
            echo "link_with_thinlto=no"
          fi

          if [ -n "$archive_cmd" ]; then
            echo "archive_tool_detected=yes"
            echo "$archive_cmd"
          else
            echo "archive_tool_detected=no"
          fi

          echo "=== ThinLTO tool discovery ==="
          for tool in c++ ld.lld llvm-ar llvm-ranlib ar ranlib; do
            if command -v "$tool" >/dev/null 2>&1; then
              printf '%s=%s\n' "$tool" "$(command -v "$tool")"
            else
              printf '%s=<not found>\n' "$tool"
            fi
          done
        }

        BASE_CXX_FLAGS="-O3 -flto=thin -fmerge-all-constants -I/usr/local/include"
        cmake_common_args=(
          -GNinja x265/source
          -DCMAKE_PREFIX_PATH=/usr/local
          -DENABLE_LAVF=ON
          -DENABLE_STATIC_LAVF=ON
          -DENABLE_MKV=ON
          -DENABLE_LSMASH=ON
          -DTARGET_CPU="$CPU"
          -DENABLE_AVISYNTH=OFF
          -DENABLE_VPYSYNTH=OFF
          -DUSE_MIMALLOC=ON
          -DENABLE_UNITY_BUILD=ON
          -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
          -DCMAKE_ASM_NASM_FLAGS=-w-macro-params-legacy
        )

        configure_x265() {
          local build_dir="$1"
          shift
          cmake "${cmake_common_args[@]}" -B "$build_dir" "$@"
        }

        PGO_8B_LIB_FLAG=""
        if [ -f build/x265-8b-lib.profdata ]; then
          PGO_8B_LIB_FLAG="-fprofile-instr-use=$GITHUB_WORKSPACE/build/x265-8b-lib.profdata"
          echo "Using 8b-lib PGO profdata"
        else
          echo "Building 8b-lib without PGO"
        fi

        PGO_12B_LIB_FLAG=""
        if [ -f build/x265-12b-lib.profdata ]; then
          PGO_12B_LIB_FLAG="-fprofile-instr-use=$GITHUB_WORKSPACE/build/x265-12b-lib.profdata"
          echo "Using 12b-lib PGO profdata"
        else
          echo "Building 12b-lib without PGO"
        fi

        PGO_ALL_FLAG=""
        if [ -f build/x265-all.profdata ]; then
          PGO_ALL_FLAG="-fprofile-instr-use=$GITHUB_WORKSPACE/build/x265-all.profdata"
          echo "Using all-target PGO profdata"
        else
          echo "Building all target without PGO"
        fi

        CXX_FLAGS="${BASE_CXX_FLAGS}"
        CXX_FLAGS_8B_LIB="${BASE_CXX_FLAGS} ${PGO_8B_LIB_FLAG}"
        CXX_FLAGS_12B_LIB="${BASE_CXX_FLAGS} ${PGO_12B_LIB_FLAG}"
        CXX_FLAGS_ALL="${BASE_CXX_FLAGS} ${PGO_ALL_FLAG}"

        source x265/.github/scripts/cxx20_scan_helpers.sh

        check_pgo_consume_commands() {
          local build_dir="$1"
          local pgo_flag="$2"
          local min_cpp_commands="$3"
          [ -n "$pgo_flag" ] || return 0
          check_cxx20_commands_pgo_consume "$build_dir" --min-cpp-commands="$min_cpp_commands"
        }

        if [ "$FULL_BUILD" = true ]; then
          # === Configure and build 8bit CLI ===
          echo "=== Building 8bit CLI ==="
          configure_x265 build/8b \
            -DENABLE_SHARED=OFF \
            -DCMAKE_CXX_FLAGS="$CXX_FLAGS" \
            -DCMAKE_EXE_LINKER_FLAGS="-flto=thin"
          print_thinlto_cache build/8b
          run_ninja_logged 8b build/8b "$NINJA_JOBS_TRIPLE" &
          ninja_8b_pid=$!

          # === Configure and build 10bit CLI ===
          echo "=== Building 10bit CLI ==="
          configure_x265 build/10b \
            -DHIGH_BIT_DEPTH=ON -DENABLE_SHARED=OFF \
            -DCMAKE_CXX_FLAGS="$CXX_FLAGS" \
            -DCMAKE_EXE_LINKER_FLAGS="-flto=thin"
          print_thinlto_cache build/10b
          run_ninja_logged 10b build/10b "$NINJA_JOBS_TRIPLE" &
          ninja_10b_pid=$!

          # === Configure and build 12bit CLI ===
          echo "=== Building 12bit CLI ==="
          configure_x265 build/12b \
            -DHIGH_BIT_DEPTH=ON -DMAIN12=ON -DENABLE_SHARED=OFF \
            -DCMAKE_CXX_FLAGS="$CXX_FLAGS" \
            -DCMAKE_EXE_LINKER_FLAGS="-flto=thin"
          print_thinlto_cache build/12b
          run_ninja_logged 12b build/12b "$NINJA_JOBS_TRIPLE" &
          ninja_12b_pid=$!
          wait_for_jobs "$ninja_8b_pid" "$ninja_10b_pid" "$ninja_12b_pid"
          echo "=== Full CLI builds complete ==="
        fi

        if [ "$FULL_BUILD" = true ]; then
          # === Configure and build 8bit multilib ===
          echo "=== Building 8bit multilib ==="
          configure_x265 build/8b-lib \
            -DENABLE_SHARED=OFF -DENABLE_CLI=OFF -DEXPORT_C_API=OFF \
            -DCMAKE_CXX_FLAGS="$CXX_FLAGS_8B_LIB" \
            -DCMAKE_EXE_LINKER_FLAGS="-flto=thin"
          print_thinlto_cache build/8b-lib
          check_pgo_consume_commands build/8b-lib "$PGO_8B_LIB_FLAG" 50
          run_ninja_logged 8b-lib build/8b-lib "$NINJA_JOBS_PAIR" &
          ninja_8b_lib_pid=$!

          # === Configure and build 12bit multilib ===
          echo "=== Building 12bit multilib ==="
          configure_x265 build/12b-lib \
            -DHIGH_BIT_DEPTH=ON -DMAIN12=ON -DENABLE_SHARED=OFF -DENABLE_CLI=OFF -DEXPORT_C_API=OFF \
            -DCMAKE_CXX_FLAGS="$CXX_FLAGS_12B_LIB" \
            -DCMAKE_EXE_LINKER_FLAGS="-flto=thin"
          print_thinlto_cache build/12b-lib
          check_pgo_consume_commands build/12b-lib "$PGO_12B_LIB_FLAG" 50
          run_ninja_logged 12b-lib build/12b-lib "$NINJA_JOBS_PAIR" &
          ninja_12b_lib_pid=$!
          wait_for_jobs "$ninja_8b_lib_pid" "$ninja_12b_lib_pid"
          echo "=== Full multilib builds complete ==="
        fi

        echo "=== All CLI and multilib builds complete ==="

        # === Build all-bit-depth version ===
        echo "=== Building all-bit-depth version ==="

        echo "=== Building all-specific 8bit helper lib ==="
        configure_x265 build/all-8b-lib \
          -DENABLE_SHARED=OFF -DENABLE_CLI=OFF -DEXPORT_C_API=OFF \
          -DCMAKE_CXX_FLAGS="$CXX_FLAGS_ALL" \
          -DCMAKE_EXE_LINKER_FLAGS=""
        print_thinlto_cache build/all-8b-lib
        check_pgo_consume_commands build/all-8b-lib "$PGO_ALL_FLAG" 50
        run_ninja_logged all-8b-lib build/all-8b-lib "$NINJA_JOBS_PAIR" &
        ninja_all_8b_lib_pid=$!

        echo "=== Building all-specific 12bit helper lib ==="
        configure_x265 build/all-12b-lib \
          -DHIGH_BIT_DEPTH=ON -DMAIN12=ON -DENABLE_SHARED=OFF -DENABLE_CLI=OFF -DEXPORT_C_API=OFF \
          -DCMAKE_CXX_FLAGS="$CXX_FLAGS_ALL" \
          -DCMAKE_EXE_LINKER_FLAGS=""
        print_thinlto_cache build/all-12b-lib
        check_pgo_consume_commands build/all-12b-lib "$PGO_ALL_FLAG" 50
        run_ninja_logged all-12b-lib build/all-12b-lib "$NINJA_JOBS_PAIR" &
        ninja_all_12b_lib_pid=$!
        wait_for_jobs "$ninja_all_8b_lib_pid" "$ninja_all_12b_lib_pid"

        cp build/all-8b-lib/libx265.a build/all/libx265_8b.a
        cp build/all-12b-lib/libx265.a build/all/libx265_12b.a

        configure_x265 build/all \
          -DEXTRA_LIB="x265_8b.a;x265_12b.a" -DEXTRA_LINK_FLAGS=-L. \
          -DLINKED_8BIT=ON -DLINKED_12BIT=ON -DENABLE_HDR10_PLUS=ON \
          -DHIGH_BIT_DEPTH=ON -DENABLE_SHARED=OFF \
          -DCMAKE_CXX_FLAGS="$CXX_FLAGS_ALL" \
          -DOBUPARSE_LIBRARY=/usr/local/lib/libobuparse.a \
          -DCMAKE_EXE_LINKER_FLAGS=""
        check_pgo_consume_commands build/all "$PGO_ALL_FLAG" 60
        echo "=== All builds complete ==="
        run_ninja_logged all build/all
        echo "=== All builds complete ==="

        echo "Keeping built executables unstripped until packaging"

    - name: Runtime Smoke Boundary Summary
      run: |
        {
          echo "### Runtime smoke boundary"
          echo
          echo "| target_cpu | build | runtime_smoke | reason |"
          echo "| --- | --- | --- | --- |"
          if [ "${{ matrix.target_cpu }}" = "x86-64" ]; then
            echo "| ${{ matrix.target_cpu }} | yes | yes | baseline runner ISA |"
          else
            echo "| ${{ matrix.target_cpu }} | yes | no | GitHub runner host may not support target-specific instructions |"
          fi
        } >> "$GITHUB_STEP_SUMMARY"

    - name: RAW Smoke (All CLI)
      if: matrix.target_cpu == 'x86-64'
      run: |
        ffmpeg -hide_banner -loglevel error -f lavfi -i testsrc2=size=160x90:rate=24 -frames:v 12 -pix_fmt yuv420p smoke_raw.y4m
        build/all/x265.exe --input smoke_raw.y4m --input-res 160x90 --fps 24 --frames 12 --output smoke_raw.hevc
        test -s smoke_raw.hevc
        ffprobe -v error -show_entries stream=codec_name,codec_type,width,height -select_streams v:0 -of default=noprint_wrappers=1 smoke_raw.hevc > smoke_raw_probe.txt
        grep -q "codec_name=hevc" smoke_raw_probe.txt
        grep -q "codec_type=video" smoke_raw_probe.txt
        grep -q "width=160" smoke_raw_probe.txt
        grep -q "height=90" smoke_raw_probe.txt

    - name: MKV Smoke (All CLI)
      if: matrix.target_cpu == 'x86-64'
      run: |
        ffmpeg -hide_banner -loglevel error -f lavfi -i testsrc2=size=160x90:rate=24 -frames:v 12 -pix_fmt yuv420p smoke_mkv.y4m
        build/all/x265.exe --input smoke_mkv.y4m --input-res 160x90 --fps 24 --frames 12 --output smoke_mkv.mkv
        test -s smoke_mkv.mkv
        ffprobe -v error -show_entries format=format_name,duration -of default=noprint_wrappers=1 smoke_mkv.mkv > smoke_mkv_format.txt
        ffprobe -v error -show_entries stream=codec_name,codec_type,width,height -select_streams v:0 -of default=noprint_wrappers=1 smoke_mkv.mkv > smoke_mkv_stream.txt
        ffprobe -v error -count_frames -select_streams v:0 -show_entries stream=nb_read_frames -of default=noprint_wrappers=1 smoke_mkv.mkv > smoke_mkv_count.txt
        grep -q "format_name=matroska,webm" smoke_mkv_format.txt
        grep -q "codec_name=hevc" smoke_mkv_stream.txt
        grep -q "codec_type=video" smoke_mkv_stream.txt
        grep -q "width=160" smoke_mkv_stream.txt
        grep -q "height=90" smoke_mkv_stream.txt
        grep -q "nb_read_frames=12" smoke_mkv_count.txt

    - name: LAVF Input Smoke (All CLI)
      if: matrix.target_cpu == 'x86-64'
      run: |
        ffmpeg -hide_banner -loglevel error -f lavfi -i testsrc2=size=160x90:rate=24 -frames:v 12 -pix_fmt yuv420p -c:v ffv1 smoke_lavf_input.mkv
        build/all/x265.exe --input smoke_lavf_input.mkv --frames 12 --output smoke_lavf_output.hevc 2>&1 | tee smoke_lavf_log.txt
        test -s smoke_lavf_output.hevc
        grep -Fq "lavf" smoke_lavf_log.txt
        ffprobe -v error -show_entries stream=codec_name,codec_type,width,height -select_streams v:0 -of default=noprint_wrappers=1 smoke_lavf_output.hevc > smoke_lavf_probe.txt
        grep -q "codec_name=hevc" smoke_lavf_probe.txt
        grep -q "width=160" smoke_lavf_probe.txt
        grep -q "height=90" smoke_lavf_probe.txt

    - name: Threaded ME Smoke (All CLI)
      if: matrix.target_cpu == 'x86-64'
      run: |
        ffmpeg -hide_banner -loglevel error -f lavfi -i testsrc2=size=160x90:rate=24 -frames:v 16 -pix_fmt yuv420p smoke_threaded_me.y4m
        build/all/x265.exe --input smoke_threaded_me.y4m --input-res 160x90 --fps 24 --frames 16 --preset medium --threaded-me --pools 32 --frame-threads 1 --no-wpp --no-progress --output smoke_threaded_me.hevc 2>&1 | tee smoke_threaded_me_log.txt
        test -s smoke_threaded_me.hevc
