        awk -F= '/^duration=/{ d=$2+0 } END { if (d < 0.60 || d > 0.75) exit 1 }' smoke_eos_format.txt
        awk -F= '/^duration=/{ d=$2+0 } END { if (d < 0.60 || d > 0.75) exit 1 }' smoke_eos_timing.txt

    - name: MP4 smoke (all CLI IDR recovery SEI)
      if: matrix.target_cpu == 'x86-64'
      run: |
        ffmpeg -hide_banner -loglevel error -f lavfi -i testsrc2=size=128x72:rate=24 -frames:v 16 -pix_fmt yuv420p smoke_recovery.y4m
        build/all/x265.exe --input smoke_recovery.y4m --input-res 128x72 --fps 24 --frames 16 --bframes 0 --keyint 8 --min-keyint 8 --no-open-gop --idr-recovery-sei --output smoke_recovery.mp4
        ffprobe -v error -show_streams -select_streams v:0 smoke_recovery.mp4 > smoke_recovery_stream.txt
        ffprobe -v error -show_entries stream=time_base,r_frame_rate,avg_frame_rate,duration,nal_length_size -select_streams v:0 -of default=noprint_wrappers=1 smoke_recovery.mp4 > smoke_recovery_timing.txt
        ffprobe -v error -show_entries format=format_name,duration -of default=noprint_wrappers=1 smoke_recovery.mp4 > smoke_recovery_format.txt
        ffprobe -v error -count_frames -select_streams v:0 -show_entries stream=nb_read_frames -of default=noprint_wrappers=1 smoke_recovery.mp4 > smoke_recovery_count.txt
        ffprobe -v error -show_packets -select_streams v:0 -show_entries packet=pts_time,dts_time,flags -of csv=p=0 smoke_recovery.mp4 > smoke_recovery_packets.csv
        ffprobe -v error -select_streams v:0 -show_entries frame=pts_time,pkt_dts_time,pkt_duration_time,key_frame -of csv=p=0 smoke_recovery.mp4 > smoke_recovery_frames.csv
        grep -q "format_name=mov,mp4,m4a,3gp,3g2,mj2" smoke_recovery_format.txt
        grep -q "codec_name=hevc" smoke_recovery_stream.txt
        grep -q "codec_tag_string=hvc1" smoke_recovery_stream.txt
        grep -q "codec_type=video" smoke_recovery_stream.txt
        grep -q "width=128" smoke_recovery_stream.txt
        grep -q "height=72" smoke_recovery_stream.txt
        grep -q "pix_fmt=yuv420p" smoke_recovery_stream.txt
        awk -F= '/^extradata_size=/{ if (($2+0) > 0) found=1 } END { if (!found) exit 1 }' smoke_recovery_stream.txt
        grep -q "time_base=" smoke_recovery_timing.txt
        grep -q "time_base=1/24000" smoke_recovery_timing.txt
        if grep -q '^nal_length_size=' smoke_recovery_timing.txt; then grep -q "nal_length_size=4" smoke_recovery_timing.txt; fi
        grep -q "r_frame_rate=24/1" smoke_recovery_timing.txt
        grep -q "avg_frame_rate=24/1" smoke_recovery_timing.txt
        grep -q "nb_read_frames=16" smoke_recovery_count.txt
        test -s smoke_recovery_timing.txt
        test -s smoke_recovery_format.txt
        test -s smoke_recovery_count.txt
        test -s smoke_recovery_packets.csv
        test -s smoke_recovery_frames.csv
        awk -F, 'NR == 1 { if (NF < 3 || $3 !~ /K/) exit 1 } END { if (NR != 16) exit 1 }' smoke_recovery_packets.csv
        awk -F, 'NF >= 3 && $3 != "N/A" { if (seen && ($3+0) < prev) exit 1; prev=$3+0; seen=1 } END { if (!seen) exit 1 }' smoke_recovery_frames.csv
        awk -F, 'NF >= 3 && $2 != "N/A" && $3 != "N/A" { if (($2+0) != ($3+0)) exit 1 } END { if (NR != 16) exit 1 }' smoke_recovery_frames.csv
        awk -F, 'NR == 1 { if (NF < 3 || $1 != 1 || $2 == "N/A" || $3 == "N/A") exit 1; if (($2+0) < -0.001 || ($3+0) < -0.001) exit 1; if (($2+0) > 0.05 || ($3+0) > 0.05) exit 1 }' smoke_recovery_frames.csv
        awk -F, '$3 ~ /K/ { kf++; if (kf == 2) { if ($1 == "N/A") exit 1; if (($1+0) < 0.30 || ($1+0) > 0.38) exit 1 } } END { if (kf < 2) exit 1 }' smoke_recovery_packets.csv
        awk -F, 'NR > 1 && $2 != "N/A" && prev != "" { delta = ($2+0) - prev; if (delta < 0.03 || delta > 0.05) exit 1 } { if ($2 != "N/A") prev = $2+0 } END { if (NR < 2) exit 1 }' smoke_recovery_frames.csv
        awk -F, 'END { if (NR != 16) exit 1; if (NF < 2 || $2 == "N/A") exit 1; if (($2+0) < 0.60 || ($2+0) > 0.75) exit 1 }' smoke_recovery_frames.csv
        awk -F= '/^duration=/{ d=$2+0 } END { if (d < 0.60 || d > 0.75) exit 1 }' smoke_recovery_format.txt
        awk -F= '/^duration=/{ d=$2+0 } END { if (d < 0.60 || d > 0.75) exit 1 }' smoke_recovery_timing.txt

    - name: Package
      run: |
        mkdir dist
        if [ "${{ github.event_name }}" = 'workflow_dispatch' ] || [[ "${{ github.ref }}" == refs/tags/* ]]; then
          cp build/8b/x265.exe dist/x265-win64-${{matrix.target_cpu}}-8bit.exe
          cp build/10b/x265.exe dist/x265-win64-${{matrix.target_cpu}}-10bit.exe
          cp build/12b/x265.exe dist/x265-win64-${{matrix.target_cpu}}-12bit.exe
        fi
        cp build/all/x265.exe dist/x265-win64-${{matrix.target_cpu}}-all.exe

    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: x265-win64-${{matrix.target_cpu}}-clang.${{ steps.tag.outputs.version }}
        path: dist/*
        compression-level: 9

    - name: Compress for release
      if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
      run: |
        cd dist
        7za a -t7z -mx=9 ../x265-win64-${{matrix.target_cpu}}-clang.${{ steps.tag.outputs.version }}.7z \
          x265-win64-${{matrix.target_cpu}}-8bit.exe \
          x265-win64-${{matrix.target_cpu}}-10bit.exe \
          x265-win64-${{matrix.target_cpu}}-12bit.exe \
          x265-win64-${{matrix.target_cpu}}-all.exe

    - name: Release
      uses: softprops/action-gh-release@v3
      if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
      with:
        tag_name: ${{ steps.tag.outputs.version }}
        files: x265-win64-${{matrix.target_cpu}}-clang.${{ steps.tag.outputs.version }}.7z
        fail_on_unmatched_files: true
        generate_release_notes: false
        prerelease: true
