    - name: Package
      run: |
        mkdir dist
        if [ "${{ github.event_name }}" = 'workflow_dispatch' ] || [[ "${{ github.ref }}" == refs/tags/* ]]; then
          strip -s build/8b/x265.exe
          strip -s build/10b/x265.exe
          strip -s build/12b/x265.exe
          cp build/8b/x265.exe dist/x265-win64-${{matrix.target_cpu}}-8bit.exe
          cp build/10b/x265.exe dist/x265-win64-${{matrix.target_cpu}}-10bit.exe
          cp build/12b/x265.exe dist/x265-win64-${{matrix.target_cpu}}-12bit.exe
        fi
        strip -s build/all/x265.exe
        cp build/all/x265.exe dist/x265-win64-${{matrix.target_cpu}}-all.exe

    - name: Set Package Version
      id: package_version
      shell: bash
      run: |
        if [ "${{ github.event_name }}" = 'workflow_dispatch' ] || [[ "${{ github.ref }}" == refs/tags/* ]]; then
          version="${{ steps.tag.outputs.version }}"
        else
          version="${{ steps.ci_version.outputs.version }}"
        fi
        test -n "$version"
        echo "version=$version" >> "$GITHUB_OUTPUT"

    - name: Compress Package
      run: |
        cd dist
        7za a -t7z -mx=9 ../x265-win64-${{matrix.target_cpu}}-clang.${{ steps.package_version.outputs.version }}.7z ./*.exe

    - name: Upload Artifact
      uses: actions/upload-artifact@v7
      with:
        name: x265-win64-${{matrix.target_cpu}}-clang.${{ steps.package_version.outputs.version }}
        path: x265-win64-${{matrix.target_cpu}}-clang.${{ steps.package_version.outputs.version }}.7z
        compression-level: 0

  publish-release:
    needs:
      - cxx20-warning-scan
      - cxx20-gcc-compile-commands
      - cxx20-linux-gcc-compile-commands
      - build
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    runs-on: windows-latest
    steps:
    - name: Checkout X265
      uses: actions/checkout@v6
      with:
        path: x265
        fetch-depth: 0
        fetch-tags: true

    - name: Get Latest Tag
      id: tag
      shell: bash
      working-directory: x265
      run: |
        if [[ "${GITHUB_REF:-}" == refs/tags/[0-9].[0-9]* ]]; then
          version="${GITHUB_REF_NAME:-}"
        else
          version=$(git tag --list '[0-9].[0-9]*' --sort=-v:refname | head -n1)
        fi
        test -n "$version"
        echo "version=$version" >> "$GITHUB_OUTPUT"

    - name: Download Release Artifacts
      uses: actions/download-artifact@v7
      with:
        path: release-assets

    - name: Release Artifacts
      uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ steps.tag.outputs.version }}
        files: release-assets/**/*.7z
        fail_on_unmatched_files: true
        generate_release_notes: false
        prerelease: true
