    - name: Package
      run: |
        mkdir dist
        cp build/8b/x265.exe dist/x265-8bit.exe
        cp build/10b/x265.exe dist/x265-10bit.exe
        cp build/12b/x265.exe dist/x265-12bit.exe
        cp build/all/x265.exe dist/x265.exe

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: x265-win64-${{matrix.target_cpu}}-clang${{ matrix.artifact_suffix || '' }}
        path: dist/*

    - name: Compress for release
      if: github.event_name == 'workflow_dispatch' && (matrix.run_release != false)
      run: |
        cd dist
        7za a -t7z -mx=7 ../x265-win64-${{matrix.target_cpu}}-clang${{ matrix.artifact_suffix || '' }}.${{ steps.tag.outputs.version }}.7z \
          x265-8bit.exe x265-10bit.exe x265-12bit.exe x265.exe

    - name: Release
      uses: softprops/action-gh-release@v2
      if: github.event_name == 'workflow_dispatch' && (matrix.run_release != false)
      with:
        tag_name: ${{ steps.tag.outputs.version }}
        files: x265-win64-${{matrix.target_cpu}}-clang${{ matrix.artifact_suffix || '' }}.${{ steps.tag.outputs.version }}.7z
        fail_on_unmatched_files: true
        generate_release_notes: false
        prerelease: true
