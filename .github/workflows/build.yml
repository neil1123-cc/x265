name: Build

on:
  push:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lsmash-smoke:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
    - name: Checkout obuparse
      uses: actions/checkout@v4
      with:
        path: obuparse
        repository: dwbuiten/obuparse

    - name: Checkout L-SMASH
      uses: actions/checkout@v4
      with:
        path: lsmash
        repository: vimeo/l-smash

    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: UCRT64
        update: false
        install: >-
          base-devel
          mingw-w64-ucrt-x86_64-gcc
          mingw-w64-ucrt-x86_64-make

    - name: Compile obuparse
      working-directory: obuparse
      shell: msys2 {0}
      env:
        MSYSTEM: UCRT64
      run: |
        make CC=gcc libobuparse.a
        install -v obuparse.h /usr/local/include
        install -v libobuparse.a /usr/local/lib

    - name: Compile L-SMASH
      working-directory: lsmash
      shell: msys2 {0}
      env:
        MSYSTEM: UCRT64
      run: |
        ./configure --cc=gcc \
          --extra-cflags="-O0 -I$GITHUB_WORKSPACE/obuparse" \
          --extra-ldflags="-L$GITHUB_WORKSPACE/obuparse" \
          --extra-libs="-lobuparse"
        make -j$(nproc) lib

    - name: L-SMASH smoke test
      shell: msys2 {0}
      env:
        MSYSTEM: UCRT64
      run: |
        cat > lsmash_smoke.c <<'EOF'
        #include <stdio.h>
        #include <lsmash.h>

        int main(void)
        {
          lsmash_root_t *root = lsmash_create_root();
          if (!root)
          {
            fprintf(stderr, "lsmash_create_root returned NULL\n");
            return 1;
          }
          lsmash_destroy_root(root);
          return 0;
        }
        EOF

        gcc -O0 lsmash_smoke.c -Ilsmash -Llsmash -Lobuparse \
          -llsmash -lobuparse -o lsmash-smoke.exe
        ./lsmash-smoke.exe

  build:
    needs: lsmash-smoke
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    strategy:
      fail-fast: false
      matrix:
        target_cpu:
          - x86-64
        lto_mode:
          - off

    steps:
    - name: Checkout x265
      uses: actions/checkout@v4
      with:
        path: x265
        fetch-depth: 0

    - name: Get latest tag
      id: tag
      shell: bash
      working-directory: x265
      run: echo "version=$(git describe --tags --match=[0-9].[0-9]* --abbrev=0)" >> $GITHUB_OUTPUT

    - name: Fetch PGO profdata
      shell: bash
      run: |
        cd x265
        git fetch origin profdata-x86-64 --depth=1 || { echo "Branch not found"; exit 0; }
        git checkout FETCH_HEAD -- x265.profdata 2>/dev/null || echo "profdata not found"
        mkdir -p ../build
        mv x265.profdata ../build/x265.profdata 2>/dev/null || echo "No profdata"

    # === Dependency Caching ===
    - name: Cache FFmpeg
      id: cache-ffmpeg
      uses: actions/cache@v4
      with:
        path: ffmpeg
        key: ffmpeg-n8.1-lavf-v1-clang

    - name: Cache obuparse
      id: cache-obuparse
      uses: actions/cache@v4
      with:
        path: obuparse-install
        key: obuparse-latest-clang-v1

    - name: Cache L-SMASH
      id: cache-lsmash
      uses: actions/cache@v4
      with:
        path: lsmash-install
        key: lsmash-latest-ucrt-gcc-v4-vimeo

    - name: Checkout FFmpeg
      uses: actions/checkout@v4
      with:
        path: ffmpeg
        repository: FFmpeg/FFmpeg
        ref: n8.1
      if: steps.cache-ffmpeg.outputs.cache-hit != 'true'

    - name: Checkout mimalloc
      uses: actions/checkout@v4
      with:
        path: mimalloc
        repository: microsoft/mimalloc
        ref: v3.2.8

    - name: Checkout obuparse
      uses: actions/checkout@v4
      with:
        path: obuparse
        repository: dwbuiten/obuparse
      if: steps.cache-obuparse.outputs.cache-hit != 'true'

    - name: Checkout L-SMASH
      uses: actions/checkout@v4
      with:
        path: lsmash
        repository: vimeo/l-smash
      if: steps.cache-lsmash.outputs.cache-hit != 'true'

    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: CLANG64
        update: false
        install: >-
          p7zip
          base-devel
          git
          libtool
          mingw-w64-clang-x86_64-nasm
          mingw-w64-clang-x86_64-clang
          mingw-w64-clang-x86_64-compiler-rt
          mingw-w64-clang-x86_64-lld
          mingw-w64-clang-x86_64-crt
          mingw-w64-clang-x86_64-headers
          mingw-w64-clang-x86_64-libc++
          mingw-w64-clang-x86_64-libwinpthread
          mingw-w64-clang-x86_64-make
          mingw-w64-clang-x86_64-pkgconf
          mingw-w64-clang-x86_64-cmake
          mingw-w64-clang-x86_64-ninja
          mingw-w64-ucrt-x86_64-gcc
          mingw-w64-ucrt-x86_64-binutils
          mingw-w64-ucrt-x86_64-make
          mingw-w64-ucrt-x86_64-pkgconf

    - name: Compile FFmpeg (lavf input only)
      if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
      working-directory: ffmpeg
      run: |
        ./configure --prefix=/usr/local --enable-gpl \
          --disable-runtime-cpudetect --disable-all --disable-autodetect \
          --enable-avformat --enable-avcodec \
          --disable-everything --disable-network \
          --enable-demuxer=mov,matroska,mpegts,avi,mpegvideo,m4v,mpeg,ogg,asf \
          --enable-decoder=h264,hevc,ffv1,ffvhuff,huffyuv,rawvideo,wrapped_avframe,aac,ac3,mp3 \
          --enable-protocol=file \
          --cc=cc --cxx=c++ --cpu=x86-64
        make -j$(nproc)

    - name: Get rid of .dll.a
      run: find /*64/ /usr/ -type f -name "*.dll.a" -print -delete

    - name: Install FFmpeg
      working-directory: ffmpeg
      run: make install

    - name: Compile mimalloc
      working-directory: mimalloc
      run: |
        mkdir build
        cd build
        cmake -GNinja .. -DCMAKE_INSTALL_PREFIX=/usr/local \
          -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=ON \
          -DMI_BUILD_SHARED=OFF -DMI_BUILD_STATIC=ON -DMI_BUILD_OBJECT=OFF \
          -DMI_BUILD_TESTS=OFF -DMI_USE_CXX=ON
        ninja
        ninja install
        # Create compatibility symlink for CMake (mimalloc v3.x uses versioned directories)
        shopt -s nullglob
        for dir in /usr/local/lib/cmake/mimalloc-*; do
          ln -s "$dir" /usr/local/lib/cmake/mimalloc
          break
        done

    - name: Compile obuparse
      if: steps.cache-obuparse.outputs.cache-hit != 'true'
      working-directory: obuparse
      run: |
        make CC=cc libobuparse.a
        install -v obuparse.h /usr/local/include
        install -v libobuparse.a /usr/local/lib
        # Create cache copy (use relative path for actions/cache)
        mkdir -p obuparse-install/include
        mkdir -p obuparse-install/lib
        cp /usr/local/include/obuparse.h obuparse-install/include/
        cp /usr/local/lib/libobuparse.a obuparse-install/lib/
        mv obuparse-install "$GITHUB_WORKSPACE/"

    - name: Install cached obuparse
      if: steps.cache-obuparse.outputs.cache-hit == 'true'
      run: |
        cp obuparse-install/include/* /usr/local/include/
        cp obuparse-install/lib/* /usr/local/lib/

    - name: Compile L-SMASH
      if: steps.cache-lsmash.outputs.cache-hit != 'true'
      working-directory: lsmash
      shell: msys2 {0}
      env:
        MSYSTEM: UCRT64
      run: |
        ./configure --prefix=/usr/local --cc=gcc \
          --extra-cflags="-O0 -I/usr/local/include" \
          --extra-ldflags="-L/usr/local/lib" \
          --extra-libs="-lobuparse"
        make -j$(nproc)
        make install
        cp importer/importer.h /usr/local/include/lsmash_importer.h
        # Create cache copy (use relative path for actions/cache)
        mkdir -p lsmash-install/include
        mkdir -p lsmash-install/lib
        cp -r /usr/local/include/lsmash* lsmash-install/include/
        cp -r /usr/local/lib/liblsmash* lsmash-install/lib/
        cp -r /usr/local/lib/pkgconfig lsmash-install/lib/ 2>/dev/null || true
        mv lsmash-install "$GITHUB_WORKSPACE/"

    - name: Install cached L-SMASH
      if: steps.cache-lsmash.outputs.cache-hit == 'true'
      run: |
        cp -r lsmash-install/include/* /usr/local/include/
        cp -r lsmash-install/lib/* /usr/local/lib/

    # === Build x265 (All variants in parallel) ===
    - name: Setup build dirs
      run: mkdir -p build/8b-lib build/12b-lib build/all

    - name: Compile x265 (all variants parallel)
      env:
        PKG_CONFIG_PATH: /usr/local/lib/pkgconfig:/clang64/lib/pkgconfig
      run: |
        CPU=${{matrix.target_cpu}}
        LTO_MODE=${{matrix.lto_mode}}
        PGO_FLAG=""
        if [ -f build/x265.profdata ]; then
          if llvm-profdata show build/x265.profdata >/dev/null 2>&1; then
            PGO_FLAG="-fprofile-instr-use=$GITHUB_WORKSPACE/build/x265.profdata"
            echo "Using PGO profdata"
          else
            echo "Skipping incompatible PGO profdata"
          fi
        else
          echo "Building without PGO"
        fi

        LTO_FLAG=""
        if [ "$LTO_MODE" = "on" ]; then
          LTO_FLAG="-flto"
        fi

        CXX_FLAGS="-O3 -fmerge-all-constants -I/usr/local/include $PGO_FLAG $LTO_FLAG"

        # === Configure and build 8bit multilib ===
        echo "=== Building 8bit multilib ==="
        cmake -GNinja x265/source -B build/8b-lib -DCMAKE_PREFIX_PATH=/usr/local \
          -DENABLE_SHARED=OFF -DENABLE_CLI=OFF -DEXPORT_C_API=OFF \
          -DENABLE_LAVF=ON -DENABLE_STATIC_LAVF=ON \
          -DENABLE_LSMASH=ON -DENABLE_MKV=ON -DTARGET_CPU=$CPU \
          -DENABLE_AVISYNTH=OFF -DENABLE_VPYSYNTH=OFF \
          -DUSE_MIMALLOC=OFF -DENABLE_UNITY_BUILD=ON \
          -DCMAKE_ASM_NASM_FLAGS=-w-macro-params-legacy \
          -DCMAKE_CXX_FLAGS="$CXX_FLAGS" \
          -DCMAKE_EXE_LINKER_FLAGS=""
        ninja -C build/8b-lib &

        # === Configure and build 12bit multilib ===
        echo "=== Building 12bit multilib ==="
        cmake -GNinja x265/source -B build/12b-lib -DCMAKE_PREFIX_PATH=/usr/local \
          -DHIGH_BIT_DEPTH=ON -DMAIN12=ON -DENABLE_SHARED=OFF -DENABLE_CLI=OFF -DEXPORT_C_API=OFF \
          -DENABLE_LAVF=ON -DENABLE_STATIC_LAVF=ON \
          -DENABLE_LSMASH=ON -DENABLE_MKV=ON -DTARGET_CPU=$CPU \
          -DENABLE_AVISYNTH=OFF -DENABLE_VPYSYNTH=OFF \
          -DUSE_MIMALLOC=OFF -DENABLE_UNITY_BUILD=ON \
          -DCMAKE_ASM_NASM_FLAGS=-w-macro-params-legacy \
          -DCMAKE_CXX_FLAGS="$CXX_FLAGS" \
          -DCMAKE_EXE_LINKER_FLAGS=""
        ninja -C build/12b-lib &

        wait
        echo "=== Multilib builds complete ==="

        # === Build all-bit-depth version ===
        echo "=== Building all-bit-depth version ==="
        cp build/8b-lib/libx265.a build/all/libx265_8b.a
        cp build/12b-lib/libx265.a build/all/libx265_12b.a

        cmake -GNinja x265/source -B build/all -DCMAKE_PREFIX_PATH=/usr/local \
          -DEXTRA_LIB="x265_8b.a;x265_12b.a" -DEXTRA_LINK_FLAGS=-L. \
          -DLINKED_8BIT=ON -DLINKED_12BIT=ON -DENABLE_HDR10_PLUS=ON \
          -DENABLE_AVISYNTH=OFF -DENABLE_VPYSYNTH=OFF -DHIGH_BIT_DEPTH=ON \
          -DENABLE_SHARED=OFF -DENABLE_LAVF=ON -DENABLE_STATIC_LAVF=ON \
          -DENABLE_LSMASH=ON -DENABLE_MKV=ON -DTARGET_CPU=$CPU \
          -DUSE_MIMALLOC=OFF -DENABLE_UNITY_BUILD=ON \
          -DCMAKE_ASM_NASM_FLAGS=-w-macro-params-legacy \
          -DCMAKE_CXX_FLAGS="$CXX_FLAGS" \
          -DCMAKE_EXE_LINKER_FLAGS=""
        ninja -C build/all
        echo "=== All build complete ==="

        # Strip executable
        strip -s build/all/x265.exe

    - name: Package
      run: |
        mkdir dist
        cp build/all/x265.exe dist/x265.exe

    - name: MP4 smoke (clang)
      shell: bash
      run: |
        set -o pipefail
        python3 -c "w,h=320,180;fpsn,fpsd=24000,1001;frames=10;f=open('mini.y4m','wb');f.write(f'YUV4MPEG2 W{w} H{h} F{fpsn}:{fpsd} Ip A0:0 C420jpeg\\n'.encode());frame=bytes([16])*(w*h)+bytes([128])*(w*h//4)+bytes([128])*(w*h//4);[f.write(b'FRAME\\n') or f.write(frame) for _ in range(frames)];f.close()"
        set +e
        build/all/x265.exe --input mini.y4m --y4m -o smoke.mp4 --preset medium --crf 28 --log-level full 2>&1 | tee smoke.log
        SMOKE_RET=${PIPESTATUS[0]}
        set -e
        echo "clang_smoke_exit_code=$SMOKE_RET" | tee -a smoke.log
        python3 -c "import os;d=open('smoke.mp4','rb').read() if os.path.exists('smoke.mp4') else b'';print('size',len(d),'ftyp',d.find(b'ftyp'),'moov',d.find(b'moov'),'mdat',d.find(b'mdat'))" | tee -a smoke.log

    - name: Upload MP4 smoke logs (clang)
      uses: actions/upload-artifact@v4
      with:
        name: mp4-smoke-clang
        path: |
          smoke.log
          smoke.mp4

    - name: Compress for release
      if: github.event_name == 'workflow_dispatch'
      run: |
        cd dist
        7za a -t7z -mx=7 ../x265-win64-${{matrix.target_cpu}}-clang.${{ steps.tag.outputs.version }}.7z \
          x265.exe

    - name: Release
      uses: softprops/action-gh-release@v2
      if: github.event_name == 'workflow_dispatch' && startsWith(github.ref, 'refs/tags/')
      with:
        tag_name: ${{ steps.tag.outputs.version }}
        files: x265-win64-${{matrix.target_cpu}}-clang.${{ steps.tag.outputs.version }}.7z
        fail_on_unmatched_files: true
        generate_release_notes: false
        prerelease: true


  build-gcc-contrast:
    needs: lsmash-smoke
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
    - name: Checkout x265
      uses: actions/checkout@v4
      with:
        path: x265

    - name: Checkout FFmpeg
      uses: actions/checkout@v4
      with:
        path: ffmpeg
        repository: FFmpeg/FFmpeg
        ref: n8.1

    - name: Checkout obuparse
      uses: actions/checkout@v4
      with:
        path: obuparse
        repository: dwbuiten/obuparse

    - name: Checkout L-SMASH
      uses: actions/checkout@v4
      with:
        path: lsmash
        repository: vimeo/l-smash

    - name: Setup MSYS2 (GCC)
      uses: msys2/setup-msys2@v2
      with:
        msystem: UCRT64
        update: false
        install: >-
          p7zip
          base-devel
          git
          libtool
          mingw-w64-ucrt-x86_64-gcc
          mingw-w64-ucrt-x86_64-binutils
          mingw-w64-ucrt-x86_64-make
          mingw-w64-ucrt-x86_64-pkgconf
          mingw-w64-ucrt-x86_64-cmake
          mingw-w64-ucrt-x86_64-ninja
          mingw-w64-ucrt-x86_64-nasm
          mingw-w64-ucrt-x86_64-python

    - name: Compile FFmpeg (gcc/ucrt)
      working-directory: ffmpeg
      run: |
        ./configure --prefix=/usr/local --enable-gpl \
          --disable-runtime-cpudetect --disable-all --disable-autodetect \
          --enable-avformat --enable-avcodec \
          --disable-everything --disable-network \
          --enable-demuxer=mov,matroska,mpegts,avi,mpegvideo,m4v,mpeg,ogg,asf \
          --enable-decoder=h264,hevc,ffv1,ffvhuff,huffyuv,rawvideo,wrapped_avframe,aac,ac3,mp3 \
          --enable-protocol=file \
          --cc=gcc --cxx=g++ --cpu=x86-64
        make -j$(nproc)
        make install

    - name: Compile obuparse (gcc)
      working-directory: obuparse
      run: |
        make CC=gcc libobuparse.a
        install -v obuparse.h /usr/local/include
        install -v libobuparse.a /usr/local/lib

    - name: Compile L-SMASH (gcc)
      working-directory: lsmash
      run: |
        ./configure --prefix=/usr/local --cc=gcc \
          --extra-cflags="-O0 -I/usr/local/include" \
          --extra-ldflags="-L/usr/local/lib" \
          --extra-libs="-lobuparse"
        make -j$(nproc)
        make install
        cp importer/importer.h /usr/local/include/lsmash_importer.h

    - name: Setup build dirs
      run: mkdir -p build-gcc/8b-lib build-gcc/12b-lib build-gcc/all build-gcc/dist

    - name: Compile x265 all-only (gcc contrast)
      env:
        PKG_CONFIG_PATH: /usr/local/lib/pkgconfig
      run: |
        CXX_FLAGS="-O3 -fmerge-all-constants -I/usr/local/include"

        cmake -GNinja x265/source -B build-gcc/8b-lib -DCMAKE_PREFIX_PATH=/usr/local \
          -DCMAKE_C_COMPILER=gcc -DCMAKE_CXX_COMPILER=g++ \
          -DENABLE_SHARED=OFF -DENABLE_CLI=OFF -DEXPORT_C_API=OFF \
          -DENABLE_LAVF=ON -DENABLE_STATIC_LAVF=ON \
          -DENABLE_LSMASH=ON -DENABLE_MKV=ON -DTARGET_CPU=x86-64 \
          -DENABLE_AVISYNTH=OFF -DENABLE_VPYSYNTH=OFF \
          -DUSE_MIMALLOC=OFF \
          -DCMAKE_ASM_NASM_FLAGS=-w-macro-params-legacy \
          -DCMAKE_CXX_FLAGS="$CXX_FLAGS"
        ninja -C build-gcc/8b-lib

        cmake -GNinja x265/source -B build-gcc/12b-lib -DCMAKE_PREFIX_PATH=/usr/local \
          -DCMAKE_C_COMPILER=gcc -DCMAKE_CXX_COMPILER=g++ \
          -DHIGH_BIT_DEPTH=ON -DMAIN12=ON -DENABLE_SHARED=OFF -DENABLE_CLI=OFF -DEXPORT_C_API=OFF \
          -DENABLE_LAVF=ON -DENABLE_STATIC_LAVF=ON \
          -DENABLE_LSMASH=ON -DENABLE_MKV=ON -DTARGET_CPU=x86-64 \
          -DENABLE_AVISYNTH=OFF -DENABLE_VPYSYNTH=OFF \
          -DUSE_MIMALLOC=OFF \
          -DCMAKE_ASM_NASM_FLAGS=-w-macro-params-legacy \
          -DCMAKE_CXX_FLAGS="$CXX_FLAGS"
        ninja -C build-gcc/12b-lib

        cp build-gcc/8b-lib/libx265.a build-gcc/all/libx265_8b.a
        cp build-gcc/12b-lib/libx265.a build-gcc/all/libx265_12b.a

        cmake -GNinja x265/source -B build-gcc/all -DCMAKE_PREFIX_PATH=/usr/local \
          -DCMAKE_C_COMPILER=gcc -DCMAKE_CXX_COMPILER=g++ \
          -DEXTRA_LIB="x265_8b.a;x265_12b.a" -DEXTRA_LINK_FLAGS=-L. \
          -DLINKED_8BIT=ON -DLINKED_12BIT=ON -DENABLE_HDR10_PLUS=OFF \
          -DENABLE_AVISYNTH=OFF -DENABLE_VPYSYNTH=OFF -DHIGH_BIT_DEPTH=ON \
          -DENABLE_SHARED=OFF -DENABLE_LAVF=ON -DENABLE_STATIC_LAVF=ON \
          -DENABLE_LSMASH=ON -DENABLE_MKV=ON -DTARGET_CPU=x86-64 \
          -DUSE_MIMALLOC=OFF \
          -DCMAKE_ASM_NASM_FLAGS=-w-macro-params-legacy \
          -DCMAKE_CXX_FLAGS="$CXX_FLAGS"
        ninja -C build-gcc/all
        strip -s build-gcc/all/x265.exe
        cp build-gcc/all/x265.exe build-gcc/dist/x265.exe

    - name: MP4 smoke (gcc contrast)
      shell: msys2 {0}
      env:
        MSYSTEM: UCRT64
      run: |
        set -o pipefail
        export PATH="/ucrt64/bin:$PATH"
        python3 -c "w,h=320,180;fpsn,fpsd=24000,1001;frames=10;f=open('mini.y4m','wb');f.write(f'YUV4MPEG2 W{w} H{h} F{fpsn}:{fpsd} Ip A0:0 C420jpeg\\n'.encode());frame=bytes([16])*(w*h)+bytes([128])*(w*h//4)+bytes([128])*(w*h//4);[f.write(b'FRAME\\n') or f.write(frame) for _ in range(frames)];f.close()"
        set +e
        build-gcc/all/x265.exe --input mini.y4m --y4m -o smoke-gcc.mp4 --preset medium --crf 28 --log-level full 2>&1 | tee smoke-gcc.log
        SMOKE_GCC_RET=${PIPESTATUS[0]}
        if [ "$SMOKE_GCC_RET" -eq 127 ]; then
          {
            echo "=== gcc smoke runtime diagnostics ==="
            uname -a
            pwd
            ls -la build-gcc/all || true
            ls -la /ucrt64/bin/libstdc++-6.dll /ucrt64/bin/libgcc_s_seh-1.dll /ucrt64/bin/libwinpthread-1.dll || true
            command -v ldd || true
            ldd build-gcc/all/x265.exe || true
          } | tee -a smoke-gcc.log
        fi
        set -e
        echo "gcc_smoke_exit_code=$SMOKE_GCC_RET" | tee -a smoke-gcc.log
        python3 -c "import os;d=open('smoke-gcc.mp4','rb').read() if os.path.exists('smoke-gcc.mp4') else b'';print('size',len(d),'ftyp',d.find(b'ftyp'),'moov',d.find(b'moov'),'mdat',d.find(b'mdat'))" | tee -a smoke-gcc.log

    - name: Upload MP4 smoke logs (gcc)
      uses: actions/upload-artifact@v4
      with:
        name: mp4-smoke-gcc
        path: |
          smoke-gcc.log
          smoke-gcc.mp4

    - name: Upload gcc contrast artifact
      uses: actions/upload-artifact@v4
      with:
        name: x265-win64-x86-64-gcc-contrast
        path: build-gcc/dist/*
