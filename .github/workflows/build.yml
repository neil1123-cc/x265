name: Build

on:
  push:
    branches:
      - '**'
    tags:
      - '**'
  workflow_dispatch:


permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    strategy:
      fail-fast: false
      matrix:
        target_cpu:
          - x86-64
          - haswell
          - skylake
          - alderlake
          - raptorlake
          - arrowlake
          - znver2
          - znver3
          - znver4
          - znver5

    steps:
    - name: Checkout x265
      uses: actions/checkout@v6
      with:
        path: x265
        fetch-depth: 0
        fetch-tags: true

    - name: Get latest tag
      id: tag
      shell: bash
      working-directory: x265
      run: echo "version=$(git describe --tags --match=[0-9].[0-9]* --abbrev=0)" >> $GITHUB_OUTPUT

    - name: Get CI version
      id: ci_version
      shell: bash
      working-directory: x265
      run: |
        head_tag=$(git describe --tags --match='[0-9].[0-9]*' HEAD 2>/dev/null || true)
        head_hash=$(git rev-parse --short HEAD)
        if [ -z "$head_tag" ]; then
          # No version tag on this commit, use tag step's raw value as fallback
          version="${{ steps.tag.outputs.version }}"
        elif [[ "$head_tag" != *-* ]]; then
          version="${head_tag#M}"
        else
          orig_tag=${head_tag%%-*}
          rest=${head_tag#*-}
          distance=${rest%%-*}
          version="${orig_tag#M}+${distance}-g${head_hash}"
        fi
        echo "version=$version" >> "$GITHUB_OUTPUT"

    - name: Fetch PGO profdata
      shell: bash
      run: |
        mkdir -p build
        cd x265

        fetch_profdata() {
          local target="$1"
          local primary_branch="$2"
          local fallback_branch="$3"
          local source_path="$4"
          local destination="../build/x265-${target}.profdata"
          local branch

          rm -f "$destination"

          for branch in "$primary_branch" "$fallback_branch"; do
            [ -n "$branch" ] || continue
            if [ "$branch" = "$fallback_branch" ] && [ "$primary_branch" = "$fallback_branch" ]; then
              [ "$branch" = "$primary_branch" ] || continue
            fi

            echo "=== Fetching PGO profdata for ${target} from ${branch}:${source_path} ==="
            if ! git fetch origin "$branch" --depth=1; then
              echo "Branch not found: $branch"
              continue
            fi

            if ! git show "FETCH_HEAD:${source_path}" > "$destination" 2>/dev/null; then
              echo "profdata not found in $branch at $source_path"
              rm -f "$destination"
              continue
            fi

            if [ "$branch" = "$fallback_branch" ] && [ "$primary_branch" != "$fallback_branch" ]; then
              echo "Using fallback x86-64 profdata for ${target}"
            fi
            echo "Fetched profdata to $destination"
            return 0
          done
        }

        fetch_profdata 8b-lib profdata-${{ matrix.target_cpu }}-8b-lib profdata-x86-64-8b-lib x265.profdata
        fetch_profdata 12b-lib profdata-${{ matrix.target_cpu }}-12b-lib profdata-x86-64-12b-lib x265.profdata
        fetch_profdata all profdata-${{ matrix.target_cpu }}-all profdata-x86-64-all x265.profdata

    - name: Setup shared dependencies
      uses: ./x265/.github/actions/setup-windows-deps
      with:
        ffmpeg-cache-suffix: lavf-v1-clang
        ffmpeg-configure: |
          ./configure --prefix=/usr/local --enable-gpl \
            --disable-runtime-cpudetect --disable-all --disable-autodetect \
            --enable-avformat --enable-avcodec --enable-avutil --enable-swscale \
            --disable-everything --disable-network \
            --enable-demuxer=mov,matroska,mpegts,avi,mpegvideo,m4v,mpeg,ogg,asf \
            --enable-decoder=h264,hevc,ffv1,ffvhuff,huffyuv,rawvideo,wrapped_avframe,aac,ac3,mp3 \
            --enable-protocol=file \
            --cc=cc --cxx=c++ --cpu=x86-64
        use-mimalloc: 'true'
        extra-msys2-packages: >-
          mingw-w64-clang-x86_64-ffmpeg
          mingw-w64-x86_64-gcc
          mingw-w64-clang-x86_64-lldb

    - name: Checkout L-SMASH
      uses: actions/checkout@v6
      with:
        path: l-smash
        repository: vimeo/l-smash
        ref: master

    - name: Override L-SMASH with clang build + patch
      working-directory: l-smash
      env:
        MSYSTEM: CLANG64
      shell: msys2 {0}
      run: |
        set -x
        export PATH="/clang64/bin:/usr/bin:/mingw64/bin"
        hash -r
        clang --version

        git apply --ignore-whitespace ../x265/.github/patches/l-smash-clang-coff-refptr.patch
        git diff --check --cached -- codecs/description.c codecs/hevc.c core/box.c core/box_default.c core/box_default.h core/isom.c core/write.c

        LSMASH_CFLAGS="-I/usr/local/include -O3 -DNDEBUG -fno-lto -fno-pic -fno-pie"
        LSMASH_LDFLAGS="-L/usr/local/lib -fno-lto -fno-pic"
        ./configure --prefix=/usr/local --cc=clang --extra-cflags="$LSMASH_CFLAGS" --extra-ldflags="$LSMASH_LDFLAGS"
        make clean
        make lib -j$(nproc)
        make install-lib

    - name: Smoke test L-SMASH
      env:
        MSYSTEM: CLANG64
      shell: msys2 {0}
      run: |
        set -ex
        export PATH="/clang64/bin:/usr/bin:/mingw64/bin"
        echo "=== Step 1: Check library files ==="
        ls -la /usr/local/lib/liblsmash.a /usr/local/lib/libobuparse.a 2>&1
        echo "=== Step 2: Check symbols in liblsmash ==="
        nm /usr/local/lib/liblsmash.a 2>/dev/null | grep -E "lsmash_create_root|lsmash_destroy_root" | head -5
        echo "=== Step 3: Check obp symbols in liblsmash (verifies obuparse linkage) ==="
        nm /usr/local/lib/liblsmash.a 2>/dev/null | grep " obp_" | head -10
        echo "=== Step 4: Compile smoke test ==="
        cat > /tmp/lsmash_smoke.c << 'SMOKE'
        #include <stdio.h>
        #include <lsmash.h>
        int main(void) {
            printf("Creating root...\n");
            lsmash_root_t *root = lsmash_create_root();
            if (!root) { printf("FAIL: lsmash_create_root returned NULL\n"); return 1; }
            printf("OK: lsmash_create_root succeeded %p\n", (void*)root);
            printf("Destroying root...\n");
            lsmash_destroy_root(root);
            printf("OK: lsmash_destroy_root succeeded\n");
            return 0;
        }
        SMOKE
        echo "=== Step 5: Compile smoke test (no ASAN - runtime unavailable in clang64) ==="
        clang -g -I/usr/local/include -L/usr/local/lib /tmp/lsmash_smoke.c /usr/local/lib/liblsmash.a /usr/local/lib/libobuparse.a -lm -o /tmp/lsmash_smoke.exe
        cat > /tmp/mp4_smoke.c << 'MP4SMOKE'
        #include <stdio.h>
        #include <stdlib.h>
        #include <string.h>
        #include <lsmash.h>
        int main(void) {
            printf("Creating root...\n");
            lsmash_root_t *root = lsmash_create_root();
            if (!root) { printf("FAIL: lsmash_create_root\n"); return 1; }
            printf("OK: root %p\n", (void*)root);

            lsmash_file_parameters_t params = {0};
            printf("Opening file...\n");
            if (lsmash_open_file("./smoke.mp4", 0, &params) < 0) {
                printf("FAIL: lsmash_open_file\n"); lsmash_destroy_root(root); return 1; }
            printf("Setting file...\n");
            if (!lsmash_set_file(root, &params)) {
                printf("FAIL: lsmash_set_file\n"); lsmash_destroy_root(root); return 1; }

            printf("Creating track...\n");
            uint32_t track = lsmash_create_track(root, ISOM_MEDIA_HANDLER_TYPE_VIDEO_TRACK);
            if (!track) { printf("FAIL: lsmash_create_track\n"); lsmash_destroy_root(root); return 1; }
            printf("OK: track %u\n", track);

            lsmash_media_parameters_t media_params;
            lsmash_initialize_media_parameters(&media_params);
            media_params.timescale = 24;
            if (lsmash_set_media_parameters(root, track, &media_params) < 0) {
                printf("FAIL: lsmash_set_media_parameters\n"); lsmash_destroy_root(root); return 1; }

            lsmash_video_summary_t *summary = (lsmash_video_summary_t*)lsmash_create_summary(LSMASH_SUMMARY_TYPE_VIDEO);
            if (!summary) { printf("FAIL: lsmash_create_summary\n"); lsmash_destroy_root(root); return 1; }
            summary->sample_type = ISOM_CODEC_TYPE_HVC1_VIDEO;
            summary->width = 128;
            summary->height = 72;

            printf("Adding sample entry...\n");
            uint32_t sampleEntry = lsmash_add_sample_entry(root, track, (lsmash_summary_t*)summary);
            if (!sampleEntry) { printf("FAIL: lsmash_add_sample_entry\n"); lsmash_destroy_root(root); return 1; }
            printf("OK: sampleEntry %u\n", sampleEntry);

            // Create a minimal fake HEVC NAL unit (5 bytes: start code + slice)
            unsigned char fake_nal[5] = {0x00, 0x00, 0x00, 0x01, 0x41};
            lsmash_sample_t *sample = lsmash_create_sample(16);
            if (!sample) { printf("FAIL: lsmash_create_sample\n"); lsmash_destroy_root(root); return 1; }
            memset(sample->data, 0, 16);
            memcpy(sample->data, fake_nal, 5);
            sample->length = 16;
            sample->dts = 0;
            sample->cts = 0;
            sample->prop.ra_flags = ISOM_SAMPLE_RANDOM_ACCESS_FLAG_SYNC;
            sample->index = sampleEntry;

            printf("Appending sample (track=%u)...\n", track);
            if (lsmash_append_sample(root, track, sample)) {
                printf("FAIL: lsmash_append_sample\n"); lsmash_delete_sample(sample); lsmash_destroy_root(root); return 1; }
            printf("OK: sample appended\n");
            sample = NULL;

            printf("Finishing movie...\n");
            lsmash_finish_movie(root, NULL);
            printf("Closing file...\n");
            lsmash_close_file(&params);
            lsmash_destroy_root(root);
            printf("OK: complete MP4 write smoke passed\n");
            return 0;
        }
        MP4SMOKE
        echo "=== Step 6: Run root smoke ==="
        /tmp/lsmash_smoke.exe
        echo "=== Step 7: MP4 creation smoke (tests lsmash+obuparse ABI) ==="
        clang -g -I/usr/local/include -L/usr/local/lib /tmp/mp4_smoke.c /usr/local/lib/liblsmash.a /usr/local/lib/libobuparse.a -lm -o /tmp/mp4_smoke.exe
        cat > /tmp/mp4_smoke_lldb.cmd <<'LLDB'
        run
        process status
        thread list
        thread backtrace all
        bt full
        frame info
        register read
        disassemble --pc
        image list
        quit
        LLDB
        lldb -b -s /tmp/mp4_smoke_lldb.cmd /tmp/mp4_smoke.exe || true
        test -s smoke.mp4
        echo "L-SMASH smoke: PASS"

    # === Build x265 ===
    - name: Setup build dirs
      run: mkdir -p build/8b build/10b build/12b build/8b-lib build/12b-lib build/all-8b-lib build/all-12b-lib build/all

    - name: Compile x265
      env:
        PKG_CONFIG_PATH: /usr/local/lib/pkgconfig:/clang64/lib/pkgconfig
      run: |
        set -euo pipefail

        CPU=${{matrix.target_cpu}}
        FULL_BUILD=false
        if [ "${{ github.event_name }}" = 'workflow_dispatch' ] || [[ "${{ github.ref }}" == refs/tags/* ]]; then
          FULL_BUILD=true
          echo "Building full CLI set"
        else
          echo "Building all-only push path"
        fi

        mkdir -p build/logs

        print_thinlto_cache() {
          local dir="$1"
          local cache="$dir/CMakeCache.txt"

          echo "=== ThinLTO cache: $dir ==="
          if [ ! -f "$cache" ]; then
            echo "Missing CMakeCache.txt: $cache"
            return 1
          fi

          for key in CMAKE_CXX_COMPILER CMAKE_CXX_FLAGS CMAKE_EXE_LINKER_FLAGS CMAKE_INTERPROCEDURAL_OPTIMIZATION CMAKE_AR CMAKE_RANLIB; do
            grep -E "^${key}:" "$cache" || echo "${key}:UNSET=<unset>"
          done
        }

        run_ninja_logged() {
          local label="$1"
          local dir="$2"
          local log="build/logs/${label}.log"

          echo "=== Verbose ninja: $dir -> $log ==="
          (
            set -o pipefail
            ninja -C "$dir" -v 2>&1 | tee "$log"
          )
        }

        summarize_thinlto_logs() {
          local compile_cmd link_cmd archive_cmd

          compile_cmd=$(grep -h -E -- '-flto=thin' build/logs/*.log | grep -- ' -c ' | head -n1 || true)
          link_cmd=$(grep -h -E -- '-flto=thin' build/logs/*.log | grep -F 'x265' | grep -v -- ' -c ' | head -n1 || true)
          archive_cmd=$(grep -h -E 'libx265\.a|x265_8b\.a|x265_12b\.a' build/logs/*.log | grep -E 'llvm-ar|llvm-ranlib|(^|[[:space:]/])ar([[:space:]]|$)|(^|[[:space:]/])ranlib([[:space:]]|$)' | head -n1 || true)

          echo "=== ThinLTO summary ==="
          if [ -n "$compile_cmd" ]; then
            echo "compile_with_thinlto=yes"
            echo "$compile_cmd"
          else
            echo "compile_with_thinlto=no"
          fi

          if [ -n "$link_cmd" ]; then
            echo "link_with_thinlto=yes"
            echo "$link_cmd"
          else
            echo "link_with_thinlto=no"
          fi

          if [ -n "$archive_cmd" ]; then
            echo "archive_tool_detected=yes"
            echo "$archive_cmd"
          else
            echo "archive_tool_detected=no"
          fi

          echo "=== ThinLTO tool discovery ==="
          for tool in c++ ld.lld llvm-ar llvm-ranlib ar ranlib; do
            if command -v "$tool" >/dev/null 2>&1; then
              printf '%s=%s\n' "$tool" "$(command -v "$tool")"
            else
              printf '%s=<not found>\n' "$tool"
            fi
          done
        }

        BASE_CXX_FLAGS="-O3 -flto=thin -fmerge-all-constants -I/usr/local/include"

        PGO_8B_LIB_FLAG=""
        if [ -f build/x265-8b-lib.profdata ]; then
          PGO_8B_LIB_FLAG="-fprofile-instr-use=$GITHUB_WORKSPACE/build/x265-8b-lib.profdata"
          echo "Using 8b-lib PGO profdata"
        else
          echo "Building 8b-lib without PGO"
        fi

        PGO_12B_LIB_FLAG=""
        if [ -f build/x265-12b-lib.profdata ]; then
          PGO_12B_LIB_FLAG="-fprofile-instr-use=$GITHUB_WORKSPACE/build/x265-12b-lib.profdata"
          echo "Using 12b-lib PGO profdata"
        else
          echo "Building 12b-lib without PGO"
        fi

        PGO_ALL_FLAG=""
        if [ -f build/x265-all.profdata ]; then
          PGO_ALL_FLAG="-fprofile-instr-use=$GITHUB_WORKSPACE/build/x265-all.profdata"
          echo "Using all-target PGO profdata"
        else
          echo "Building all target without PGO"
        fi

        CXX_FLAGS="${BASE_CXX_FLAGS}"
        CXX_FLAGS_8B_LIB="${BASE_CXX_FLAGS} ${PGO_8B_LIB_FLAG}"
        CXX_FLAGS_12B_LIB="${BASE_CXX_FLAGS} ${PGO_12B_LIB_FLAG}"
        CXX_FLAGS_ALL="${BASE_CXX_FLAGS} ${PGO_ALL_FLAG}"

        if [ "$FULL_BUILD" = true ]; then
          # === Configure and build 8bit CLI ===
          echo "=== Building 8bit CLI ==="
          cmake -GNinja x265/source -B build/8b -DCMAKE_PREFIX_PATH=/usr/local \
            -DENABLE_SHARED=OFF -DENABLE_LAVF=ON -DENABLE_STATIC_LAVF=ON \
            -DENABLE_MKV=ON -DENABLE_LSMASH=ON -DTARGET_CPU=$CPU \
            -DENABLE_AVISYNTH=OFF -DENABLE_VPYSYNTH=OFF \
            -DUSE_MIMALLOC=ON -DENABLE_UNITY_BUILD=ON \
            -DCMAKE_ASM_NASM_FLAGS=-w-macro-params-legacy \
            -DCMAKE_CXX_FLAGS="$CXX_FLAGS" \
            -DCMAKE_EXE_LINKER_FLAGS="-flto=thin"
          print_thinlto_cache build/8b
          run_ninja_logged 8b build/8b &

          # === Configure and build 10bit CLI ===
          echo "=== Building 10bit CLI ==="
          cmake -GNinja x265/source -B build/10b -DCMAKE_PREFIX_PATH=/usr/local \
            -DHIGH_BIT_DEPTH=ON -DENABLE_SHARED=OFF -DENABLE_LAVF=ON -DENABLE_STATIC_LAVF=ON \
            -DENABLE_MKV=ON -DENABLE_LSMASH=ON -DTARGET_CPU=$CPU \
            -DENABLE_AVISYNTH=OFF -DENABLE_VPYSYNTH=OFF \
            -DUSE_MIMALLOC=ON -DENABLE_UNITY_BUILD=ON \
            -DCMAKE_ASM_NASM_FLAGS=-w-macro-params-legacy \
            -DCMAKE_CXX_FLAGS="$CXX_FLAGS" \
            -DCMAKE_EXE_LINKER_FLAGS="-flto=thin"
          print_thinlto_cache build/10b
          run_ninja_logged 10b build/10b &

          # === Configure and build 12bit CLI ===
          echo "=== Building 12bit CLI ==="
          cmake -GNinja x265/source -B build/12b -DCMAKE_PREFIX_PATH=/usr/local \
            -DHIGH_BIT_DEPTH=ON -DMAIN12=ON -DENABLE_SHARED=OFF -DENABLE_LAVF=ON -DENABLE_STATIC_LAVF=ON \
            -DENABLE_MKV=ON -DENABLE_LSMASH=ON -DTARGET_CPU=$CPU \
            -DENABLE_AVISYNTH=OFF -DENABLE_VPYSYNTH=OFF \
            -DUSE_MIMALLOC=ON -DENABLE_UNITY_BUILD=ON \
            -DCMAKE_ASM_NASM_FLAGS=-w-macro-params-legacy \
            -DCMAKE_CXX_FLAGS="$CXX_FLAGS" \
            -DCMAKE_EXE_LINKER_FLAGS="-flto=thin"
          print_thinlto_cache build/12b
          run_ninja_logged 12b build/12b &
        fi

        if [ "$FULL_BUILD" = true ]; then
          # === Configure and build 8bit multilib ===
          echo "=== Building 8bit multilib ==="
          cmake -GNinja x265/source -B build/8b-lib -DCMAKE_PREFIX_PATH=/usr/local \
            -DENABLE_SHARED=OFF -DENABLE_CLI=OFF -DEXPORT_C_API=OFF \
            -DENABLE_LAVF=ON -DENABLE_STATIC_LAVF=ON \
            -DENABLE_MKV=ON -DENABLE_LSMASH=ON -DTARGET_CPU=$CPU \
            -DENABLE_AVISYNTH=OFF -DENABLE_VPYSYNTH=OFF \
            -DUSE_MIMALLOC=ON -DENABLE_UNITY_BUILD=ON \
            -DCMAKE_ASM_NASM_FLAGS=-w-macro-params-legacy \
            -DCMAKE_CXX_FLAGS="$CXX_FLAGS_8B_LIB" \
            -DCMAKE_EXE_LINKER_FLAGS="-flto=thin"
          print_thinlto_cache build/8b-lib
          run_ninja_logged 8b-lib build/8b-lib &

          # === Configure and build 12bit multilib ===
          echo "=== Building 12bit multilib ==="
          cmake -GNinja x265/source -B build/12b-lib -DCMAKE_PREFIX_PATH=/usr/local \
            -DHIGH_BIT_DEPTH=ON -DMAIN12=ON -DENABLE_SHARED=OFF -DENABLE_CLI=OFF -DEXPORT_C_API=OFF \
            -DENABLE_LAVF=ON -DENABLE_STATIC_LAVF=ON \
            -DENABLE_MKV=ON -DENABLE_LSMASH=ON -DTARGET_CPU=$CPU \
            -DENABLE_AVISYNTH=OFF -DENABLE_VPYSYNTH=OFF \
            -DUSE_MIMALLOC=ON -DENABLE_UNITY_BUILD=ON \
            -DCMAKE_ASM_NASM_FLAGS=-w-macro-params-legacy \
            -DCMAKE_CXX_FLAGS="$CXX_FLAGS_12B_LIB" \
            -DCMAKE_EXE_LINKER_FLAGS="-flto=thin"
          print_thinlto_cache build/12b-lib
          run_ninja_logged 12b-lib build/12b-lib &
        fi

        wait
        echo "=== All CLI and multilib builds complete ==="

        # === Build all-bit-depth version ===
        echo "=== Building all-bit-depth version ==="

        echo "=== Building all-specific 8bit helper lib ==="
        cmake -GNinja x265/source -B build/all-8b-lib -DCMAKE_PREFIX_PATH=/usr/local \
          -DENABLE_SHARED=OFF -DENABLE_CLI=OFF -DEXPORT_C_API=OFF \
          -DENABLE_LAVF=ON -DENABLE_STATIC_LAVF=ON \
          -DENABLE_MKV=ON -DENABLE_LSMASH=ON -DTARGET_CPU=$CPU \
          -DENABLE_AVISYNTH=OFF -DENABLE_VPYSYNTH=OFF \
          -DUSE_MIMALLOC=ON -DENABLE_UNITY_BUILD=ON \
          -DCMAKE_ASM_NASM_FLAGS=-w-macro-params-legacy \
          -DCMAKE_CXX_FLAGS="$CXX_FLAGS_ALL" \
          -DCMAKE_EXE_LINKER_FLAGS=""
        print_thinlto_cache build/all-8b-lib
        run_ninja_logged all-8b-lib build/all-8b-lib &

        echo "=== Building all-specific 12bit helper lib ==="
        cmake -GNinja x265/source -B build/all-12b-lib -DCMAKE_PREFIX_PATH=/usr/local \
          -DHIGH_BIT_DEPTH=ON -DMAIN12=ON -DENABLE_SHARED=OFF -DENABLE_CLI=OFF -DEXPORT_C_API=OFF \
          -DENABLE_LAVF=ON -DENABLE_STATIC_LAVF=ON \
          -DENABLE_MKV=ON -DENABLE_LSMASH=ON -DTARGET_CPU=$CPU \
          -DENABLE_AVISYNTH=OFF -DENABLE_VPYSYNTH=OFF \
          -DUSE_MIMALLOC=ON -DENABLE_UNITY_BUILD=ON \
          -DCMAKE_ASM_NASM_FLAGS=-w-macro-params-legacy \
          -DCMAKE_CXX_FLAGS="$CXX_FLAGS_ALL" \
          -DCMAKE_EXE_LINKER_FLAGS=""
        print_thinlto_cache build/all-12b-lib
        run_ninja_logged all-12b-lib build/all-12b-lib

        cp build/all-8b-lib/libx265.a build/all/libx265_8b.a
        cp build/all-12b-lib/libx265.a build/all/libx265_12b.a

        # DIAG: test liblsmash clang with -fno-strict-aliasing -fno-strict-overflow flags
        cmake -GNinja x265/source -B build/all -DCMAKE_PREFIX_PATH=/usr/local \
          -DEXTRA_LIB="x265_8b.a;x265_12b.a" -DEXTRA_LINK_FLAGS=-L. \
          -DLINKED_8BIT=ON -DLINKED_12BIT=ON -DENABLE_HDR10_PLUS=ON \
          -DENABLE_AVISYNTH=OFF -DENABLE_VPYSYNTH=OFF -DHIGH_BIT_DEPTH=ON \
          -DENABLE_SHARED=OFF -DENABLE_LAVF=ON -DENABLE_STATIC_LAVF=ON \
          -DENABLE_MKV=ON -DENABLE_LSMASH=ON -DTARGET_CPU=$CPU \
          -DUSE_MIMALLOC=ON -DENABLE_UNITY_BUILD=ON \
          -DCMAKE_ASM_NASM_FLAGS=-w-macro-params-legacy \
          -DCMAKE_CXX_FLAGS="$CXX_FLAGS_ALL" \
          -DOBUPARSE_LIBRARY=/usr/local/lib/libobuparse.a \
          -DCMAKE_EXE_LINKER_FLAGS=""
        echo "=== All builds complete ==="
        run_ninja_logged all build/all
        echo "=== All builds complete ==="

        # Strip built executables
        if [ "$FULL_BUILD" = true ]; then
          strip -s build/8b/x265.exe
          strip -s build/10b/x265.exe
          strip -s build/12b/x265.exe
        fi
        if [ "$CPU" != x86-64 ]; then
          strip -s build/all/x265.exe
        else
          echo "Keeping build/all/x265.exe unstripped for x86-64 smoke diagnostics"
        fi

    - name: RAW smoke (all CLI)
      if: matrix.target_cpu == 'x86-64'
      run: |
        ffmpeg -hide_banner -loglevel error -f lavfi -i testsrc2=size=160x90:rate=24 -frames:v 12 -pix_fmt yuv420p smoke_raw.y4m
        build/all/x265.exe --input smoke_raw.y4m --input-res 160x90 --fps 24 --frames 12 --output smoke_raw.hevc
        test -s smoke_raw.hevc
        ffprobe -v error -show_entries stream=codec_name,codec_type,width,height -select_streams v:0 -of default=noprint_wrappers=1 smoke_raw.hevc > smoke_raw_probe.txt
        grep -q "codec_name=hevc" smoke_raw_probe.txt
        grep -q "codec_type=video" smoke_raw_probe.txt
