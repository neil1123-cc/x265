name: Build

on:
  push:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    strategy:
      fail-fast: false
      matrix:
        target_cpu:
          - x86-64
          - haswell
          - skylake
          - alderlake
          - raptorlake
          - arrowlake
          - znver2
          - znver3
          - znver4
          - znver5
        use_mimalloc:
          - 'ON'
        include:
          - target_cpu: x86-64
            use_mimalloc: 'OFF'
            artifact_suffix: -nomimalloc
            run_release: false

    steps:
    - name: Checkout x265
      uses: actions/checkout@v4
      with:
        path: x265
        fetch-depth: 0

    - name: Get latest tag
      id: tag
      shell: bash
      working-directory: x265
      run: echo "version=$(git describe --tags --match=[0-9].[0-9]* --abbrev=0)" >> $GITHUB_OUTPUT

    - name: Fetch PGO profdata
      shell: bash
      run: |
        cd x265
        git fetch origin profdata-x86-64 --depth=1 || { echo "Branch not found"; exit 0; }
        git checkout FETCH_HEAD -- x265.profdata 2>/dev/null || echo "profdata not found"
        mkdir -p ../build
        mv x265.profdata ../build/x265.profdata 2>/dev/null || echo "No profdata"

    # === Dependency Caching ===
    - name: Cache FFmpeg
      id: cache-ffmpeg
      uses: actions/cache@v4
      with:
        path: ffmpeg
        key: ffmpeg-n8.1-lavf-v1-clang

    - name: Cache obuparse
      id: cache-obuparse
      uses: actions/cache@v4
      with:
        path: obuparse-install
        key: obuparse-latest-clang-v1

    - name: Checkout FFmpeg
      uses: actions/checkout@v4
      with:
        path: ffmpeg
        repository: FFmpeg/FFmpeg
        ref: n8.1
      if: steps.cache-ffmpeg.outputs.cache-hit != 'true'

    - name: Checkout mimalloc
      if: matrix.use_mimalloc == 'ON'
      uses: actions/checkout@v4
      with:
        path: mimalloc
        repository: microsoft/mimalloc
        ref: v3.2.8

    - name: Checkout obuparse
      uses: actions/checkout@v4
      with:
        path: obuparse
        repository: dwbuiten/obuparse
      if: steps.cache-obuparse.outputs.cache-hit != 'true'

    - name: Checkout L-SMASH
      uses: actions/checkout@v4
      with:
        path: l-smash
        repository: vimeo/l-smash
        ref: v2.18.0

    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: CLANG64
        update: true
        install: >-
          p7zip
          base-devel
          git
          libtool
          mingw-w64-clang-x86_64-nasm
          mingw-w64-clang-x86_64-clang
          mingw-w64-clang-x86_64-compiler-rt
          mingw-w64-clang-x86_64-lld
          mingw-w64-clang-x86_64-crt
          mingw-w64-clang-x86_64-headers
          mingw-w64-clang-x86_64-libc++
          mingw-w64-clang-x86_64-libwinpthread
          mingw-w64-clang-x86_64-make
          mingw-w64-clang-x86_64-pkgconf
          mingw-w64-clang-x86_64-cmake
          mingw-w64-clang-x86_64-ninja
          mingw-w64-clang-x86_64-gdb
          mingw-w64-clang-x86_64-ffmpeg
          mingw-w64-x86_64-binutils
          mingw-w64-x86_64-gcc

    - name: Compile FFmpeg (lavf input only)
      if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
      working-directory: ffmpeg
      run: |
        ./configure --prefix=/usr/local --enable-gpl \
          --disable-runtime-cpudetect --disable-all --disable-autodetect \
          --enable-avformat --enable-avcodec \
          --disable-everything --disable-network \
          --enable-demuxer=mov,matroska,mpegts,avi,mpegvideo,m4v,mpeg,ogg,asf \
          --enable-decoder=h264,hevc,ffv1,ffvhuff,huffyuv,rawvideo,wrapped_avframe,aac,ac3,mp3 \
          --enable-protocol=file \
          --cc=cc --cxx=c++ --cpu=x86-64
        make -j$(nproc)

    - name: Get rid of .dll.a
      run: find /*64/ /usr/ -type f -name "*.dll.a" -print -delete

    - name: Install FFmpeg
      working-directory: ffmpeg
      run: make install

    - name: Compile obuparse
      if: steps.cache-obuparse.outputs.cache-hit != 'true'
      working-directory: obuparse
      run: |
        make CC=cc libobuparse.a
        install -v obuparse.h /usr/local/include
        install -v libobuparse.a /usr/local/lib
        # Create cache copy (use relative path for actions/cache)
        mkdir -p obuparse-install/include
        mkdir -p obuparse-install/lib
        cp /usr/local/include/obuparse.h obuparse-install/include/
        cp /usr/local/lib/libobuparse.a obuparse-install/lib/
        mv obuparse-install "$GITHUB_WORKSPACE/"

    - name: Install cached obuparse
      if: steps.cache-obuparse.outputs.cache-hit == 'true'
      run: |
        cp obuparse-install/include/* /usr/local/include/
        cp obuparse-install/lib/* /usr/local/lib/

    - name: Compile L-SMASH
      working-directory: l-smash
      run: |
        LSMASH_CFLAGS="-I/usr/local/include -O0 -g -fno-lto -fno-strict-aliasing"
        LSMASH_LDFLAGS="-L/usr/local/lib -fno-lto"
        ./configure --prefix=/usr/local --cc=cc --extra-cflags="$LSMASH_CFLAGS" --extra-ldflags="$LSMASH_LDFLAGS"
        make clean
        make -j$(nproc)
        install -v lsmash.h /usr/local/include
        install -v liblsmash.a /usr/local/lib

    - name: Smoke test L-SMASH root creation
      run: |
        cat > lsmash_root_smoke.c <<'EOF'
        #include <stdio.h>
        #include <lsmash.h>

        int main(void)
        {
            lsmash_root_t* root = lsmash_create_root();
            if (!root)
            {
                fprintf(stderr, "lsmash_create_root returned NULL\n");
                return 1;
            }
            lsmash_destroy_root(root);
            puts("lsmash root smoke ok");
            return 0;
        }
        EOF
        echo '=== smoke toolchain ==='
        command -v cc clang ld.lld ld.bfd /mingw64/bin/gcc /mingw64/bin/ld.bfd || true
        cc --version || true
        clang --version || true
        ld.lld --version || true
        ld.bfd --version || true
        /mingw64/bin/gcc --version || true
        /mingw64/bin/ld.bfd --version || true
        echo '=== default driver link line ==='
        cc -### -O0 -g -I/usr/local/include lsmash_root_smoke.c -L/usr/local/lib -Wl,-Map,lsmash_root_smoke.map -llsmash -lobuparse -o lsmash_root_smoke.exe 2>&1 || true
        cc -O0 -g -I/usr/local/include lsmash_root_smoke.c -L/usr/local/lib -Wl,-Map,lsmash_root_smoke.map -llsmash -lobuparse -o lsmash_root_smoke.exe
        if [ -x /mingw64/bin/gcc ]; then
          echo '=== gcc+bfd control link attempt ==='
          set +e
          env MSYSTEM=MINGW64 CHERE_INVOKING=1 PATH="/mingw64/bin:/usr/bin" /usr/bin/bash -lc '
            gcc -v -save-temps -O0 -g -I/usr/local/include lsmash_root_smoke.c -L/usr/local/lib \
              -Wl,--verbose -Wl,-Map,lsmash_root_smoke_gcc_bfd.map -llsmash -lobuparse \
              -o lsmash_root_smoke_gcc_bfd.exe
          ' >gcc_bfd_stdout.txt 2>gcc_bfd_link.txt
          gcc_bfd_status=$?
          set -e
          echo "gcc+bfd exit code: $gcc_bfd_status"
          if [ -s gcc_bfd_stdout.txt ]; then
            echo '=== gcc+bfd stdout ==='
            cat gcc_bfd_stdout.txt
          fi
          if [ -s gcc_bfd_link.txt ]; then
            echo '=== gcc+bfd stderr ==='
            cat gcc_bfd_link.txt
            echo '=== gcc+bfd stderr tail ==='
            tail -n 80 gcc_bfd_link.txt
          fi
          echo '=== gcc+bfd temp files ==='
          ls -1 lsmash_root_smoke_gcc_bfd* 2>/dev/null || true
          if [ -f ./lsmash_root_smoke_gcc_bfd.exe ]; then
            echo 'gcc+bfd exe produced'
          else
            echo 'gcc+bfd exe missing'
          fi
          if [ "$gcc_bfd_status" -eq 0 ] && [ -f ./lsmash_root_smoke_gcc_bfd.exe ]; then
            echo 'gcc+bfd link ok'
            if ./lsmash_root_smoke_gcc_bfd.exe; then
              echo 'gcc+bfd smoke ok'
            else
              echo 'gcc+bfd smoke crashed'
            fi
          else
            echo 'gcc+bfd link unavailable'
          fi
        fi
        echo '=== clang+bfd control link attempt ==='
        set +e
        clang -v -fuse-ld=bfd -save-temps -O0 -g -I/usr/local/include lsmash_root_smoke.c -L/usr/local/lib \
          -Wl,--verbose -Wl,-Map,lsmash_root_smoke_clang_bfd.map -llsmash -lobuparse \
          -o lsmash_root_smoke_clang_bfd.exe >clang_bfd_stdout.txt 2>clang_bfd_link.txt
        clang_bfd_status=$?
        set -e
        echo "clang+bfd exit code: $clang_bfd_status"
        if [ -s clang_bfd_stdout.txt ]; then
          echo '=== clang+bfd stdout ==='
          cat clang_bfd_stdout.txt
        fi
        if [ -s clang_bfd_link.txt ]; then
          echo '=== clang+bfd stderr ==='
          cat clang_bfd_link.txt
          echo '=== clang+bfd stderr tail ==='
          tail -n 80 clang_bfd_link.txt
        fi
        echo '=== clang+bfd temp files ==='
        ls -1 lsmash_root_smoke_clang_bfd* 2>/dev/null || true
        if [ -f ./lsmash_root_smoke_clang_bfd.exe ]; then
          echo 'clang+bfd exe produced'
        else
          echo 'clang+bfd exe missing'
        fi
        if [ "$clang_bfd_status" -eq 0 ] && [ -f ./lsmash_root_smoke_clang_bfd.exe ]; then
          echo 'clang+bfd link ok'
          if ./lsmash_root_smoke_clang_bfd.exe; then
            echo 'clang+bfd smoke ok'
          else
            echo 'clang+bfd smoke crashed'
          fi
        else
          echo 'clang+bfd link unavailable'
        fi
        if [ -x /mingw64/bin/gcc ]; then
          echo '=== gcc+lld control link attempt ==='
          set +e
          env MSYSTEM=MINGW64 CHERE_INVOKING=1 PATH="/mingw64/bin:/usr/bin:/clang64/bin" /usr/bin/bash -lc '
            gcc -v -save-temps -O0 -g -I/usr/local/include -c lsmash_root_smoke.c \
              -o lsmash_root_smoke_gcc_lld-lsmash_root_smoke.o
            gcc_libdir="$(dirname "$(gcc -print-libgcc-file-name)")"
            mingw_lib="$(dirname "$(gcc -print-file-name=crt2.o)")"
            mingw_target_lib="/mingw64/x86_64-w64-mingw32/lib"
            crt2="$(gcc -print-file-name=crt2.o)"
            crtbegin="$(gcc -print-file-name=crtbegin.o)"
            crtend="$(gcc -print-file-name=crtend.o)"
            manifest="$(gcc -print-file-name=default-manifest.o)"
            echo "gcc libdir: $gcc_libdir"
            echo "mingw lib: $mingw_lib"
            echo "target lib: $mingw_target_lib"
            echo "crt2: $crt2"
            echo "crtbegin: $crtbegin"
            echo "crtend: $crtend"
            echo "manifest: $manifest"
            /clang64/bin/ld.lld -m i386pep -Bdynamic \
              -o lsmash_root_smoke_gcc_lld.exe \
              "$crt2" "$crtbegin" \
              -L/usr/local/lib -L"$gcc_libdir" -L"$mingw_lib" -L"$mingw_target_lib" \
              lsmash_root_smoke_gcc_lld-lsmash_root_smoke.o \
              --verbose -Map lsmash_root_smoke_gcc_lld.map \
              -llsmash -lobuparse \
              -lmingw32 -lgcc -lgcc_eh -lmingwex -lmsvcrt -lkernel32 -lpthread -ladvapi32 -lshell32 -luser32 -lkernel32 \
              -lmingw32 -lgcc -lgcc_eh -lmingwex -lmsvcrt -lkernel32 \
              "$manifest" "$crtend"
          ' >gcc_lld_stdout.txt 2>gcc_lld_link.txt
          gcc_lld_status=$?
          set -e
          echo "gcc+lld exit code: $gcc_lld_status"
          if [ -s gcc_lld_stdout.txt ]; then
            echo '=== gcc+lld stdout ==='
            cat gcc_lld_stdout.txt
          fi
          if [ -s gcc_lld_link.txt ]; then
            echo '=== gcc+lld stderr ==='
            cat gcc_lld_link.txt
            echo '=== gcc+lld stderr tail ==='
            tail -n 80 gcc_lld_link.txt
          fi
          echo '=== gcc+lld temp files ==='
          ls -1 lsmash_root_smoke_gcc_lld* 2>/dev/null || true
          if [ -f ./lsmash_root_smoke_gcc_lld.exe ]; then
            echo 'gcc+lld exe produced'
          else
            echo 'gcc+lld exe missing'
          fi
          if [ "$gcc_lld_status" -eq 0 ] && [ -f ./lsmash_root_smoke_gcc_lld.exe ]; then
            echo 'gcc+lld link ok'
            if ./lsmash_root_smoke_gcc_lld.exe; then
              echo 'gcc+lld smoke ok'
            else
              echo 'gcc+lld smoke crashed'
            fi
          else
            echo 'gcc+lld link unavailable'
          fi
        fi
        if ! ./lsmash_root_smoke.exe; then
          echo '=== archive symbols ==='
          nm -A /usr/local/lib/liblsmash.a | grep -E 'lsmash_create_root|allocate_box_by_default|lsmash_memdup|isom_root_abstract_box_default' || true
          echo '=== exe symbols ==='
          nm -n ./lsmash_root_smoke.exe | grep -E 'lsmash_create_root|allocate_box_by_default|lsmash_memdup|isom_root_abstract_box_default' || true
          echo '=== link map ==='
          grep -E 'lsmash_create_root|allocate_box_by_default|lsmash_memdup|isom_root_abstract_box_default' lsmash_root_smoke.map || true
          if [ -f ./lsmash_root_smoke_gcc_bfd.exe ]; then
            echo '=== gcc+bfd exe symbols ==='
            nm -n ./lsmash_root_smoke_gcc_bfd.exe | grep -E 'lsmash_create_root|allocate_box_by_default|lsmash_memdup|isom_root_abstract_box_default' || true
            echo '=== gcc+bfd link map ==='
            grep -E 'lsmash_create_root|allocate_box_by_default|lsmash_memdup|isom_root_abstract_box_default' lsmash_root_smoke_gcc_bfd.map || true
          fi
          if [ -f ./lsmash_root_smoke_clang_bfd.exe ]; then
            echo '=== clang+bfd exe symbols ==='
            nm -n ./lsmash_root_smoke_clang_bfd.exe | grep -E 'lsmash_create_root|allocate_box_by_default|lsmash_memdup|isom_root_abstract_box_default' || true
            echo '=== clang+bfd link map ==='
            grep -E 'lsmash_create_root|allocate_box_by_default|lsmash_memdup|isom_root_abstract_box_default' lsmash_root_smoke_clang_bfd.map || true
          fi
          if [ -f ./lsmash_root_smoke_gcc_lld.exe ]; then
            echo '=== gcc+lld exe symbols ==='
            nm -n ./lsmash_root_smoke_gcc_lld.exe | grep -E 'lsmash_create_root|allocate_box_by_default|lsmash_memdup|isom_root_abstract_box_default' || true
            echo '=== gcc+lld link map ==='
            grep -E 'lsmash_create_root|allocate_box_by_default|lsmash_memdup|isom_root_abstract_box_default' lsmash_root_smoke_gcc_lld.map || true
          fi
          echo '=== smoke PE imports ==='
          for exe in ./lsmash_root_smoke.exe ./lsmash_root_smoke_gcc_bfd.exe ./lsmash_root_smoke_gcc_lld.exe; do
            if [ -f "$exe" ]; then
              base="${exe#./}"
              dump_file="${base%.exe}.imports.txt"
              echo "--- $base import table ---"
              objdump -p "$exe" > "$dump_file"
              grep -E 'DLL Name:|memmove|memcpy|memset|malloc|calloc|realloc|free' "$dump_file" || true
            fi
          done
          echo '=== smoke PE headers ==='
          for exe in ./lsmash_root_smoke.exe ./lsmash_root_smoke_gcc_bfd.exe ./lsmash_root_smoke_gcc_lld.exe; do
            if [ -f "$exe" ]; then
              base="${exe#./}"
              header_file="${base%.exe}.headers.txt"
              section_file="${base%.exe}.sections.txt"
              syms_file="${base%.exe}.syms.txt"
              echo "--- $base PE header ---"
              objdump -x "$exe" > "$header_file"
              perl -ne 'print if /AddressOfEntryPoint|ImageBase|SectionAlignment|FileAlignment|SizeOfImage|SizeOfHeaders|Subsystem|DllCharacteristics/' "$header_file" || true
              echo "--- $base sections ---"
              objdump -h "$exe" > "$section_file"
              cat "$section_file"
              echo "--- $base symbols ---"
              nm -n "$exe" > "$syms_file"
              grep -E 'lsmash_create_root|allocate_box_by_default|lsmash_memdup|isom_root_abstract_box_default|\.refptr' "$syms_file" || true
              echo "--- $base refptr relocations ---"
              objdump -r "$exe" | grep -E 'isom_root_abstract_box_default|\.refptr' || true
            fi
          done
          echo '=== archive disassembly ==='
          objdump -drC /usr/local/lib/liblsmash.a > lsmash_archive.objdump.txt
          grep -nE 'isom_root_abstract_box_default|<lsmash_create_root>|<allocate_box_by_default>|<lsmash_memdup>' lsmash_archive.objdump.txt || true
          for sym in lsmash_create_root allocate_box_by_default lsmash_memdup; do
            echo "--- archive $sym ---"
            sed -n "/<$sym>/,/^$/p" lsmash_archive.objdump.txt || true
          done
          echo '=== archive COMDAT sections ==='
          ar p /usr/local/lib/liblsmash.a box.o > lsmash_box.o
          ar p /usr/local/lib/liblsmash.a box_default.o > lsmash_box_default.o
          for obj in lsmash_box.o lsmash_box_default.o; do
            echo "--- $obj sections ---"
            objdump -h "$obj" || true
            echo "--- $obj headers ---"
            objdump -x "$obj" | grep -E 'COMDAT|LINK_ONCE|\.refptr|isom_root_abstract_box_default|ISOM_BOX_TYPE_(FTYP|MOOV|TRAK|UUID|HDLR)' || true
            echo "--- $obj relocations ---"
            objdump -r "$obj" | grep -E '\.refptr|isom_root_abstract_box_default|ISOM_BOX_TYPE_(FTYP|MOOV|TRAK|UUID|HDLR)' || true
          done
          echo '=== exe disassembly ==='
          objdump -drC ./lsmash_root_smoke.exe > lsmash_exe.objdump.txt
          grep -nE 'isom_root_abstract_box_default|<lsmash_create_root>|<allocate_box_by_default>|<lsmash_memdup>' lsmash_exe.objdump.txt || true
          for sym in lsmash_create_root allocate_box_by_default lsmash_memdup; do
            echo "--- exe $sym ---"
            sed -n "/<$sym>/,/^$/p" lsmash_exe.objdump.txt || true
          done
          if [ -f ./lsmash_root_smoke_gcc_bfd.exe ]; then
            echo '=== gcc+bfd exe disassembly ==='
            objdump -drC ./lsmash_root_smoke_gcc_bfd.exe > lsmash_exe_gcc_bfd.objdump.txt
            grep -nE 'isom_root_abstract_box_default|<lsmash_create_root>|<allocate_box_by_default>|<lsmash_memdup>' lsmash_exe_gcc_bfd.objdump.txt || true
            for sym in lsmash_create_root allocate_box_by_default lsmash_memdup; do
              echo "--- gcc+bfd exe $sym ---"
              sed -n "/<$sym>/,/^$/p" lsmash_exe_gcc_bfd.objdump.txt || true
            done
          fi
          if [ -f ./lsmash_root_smoke_clang_bfd.exe ]; then
            echo '=== clang+bfd exe disassembly ==='
            objdump -drC ./lsmash_root_smoke_clang_bfd.exe > lsmash_exe_clang_bfd.objdump.txt
            grep -nE 'isom_root_abstract_box_default|<lsmash_create_root>|<allocate_box_by_default>|<lsmash_memdup>' lsmash_exe_clang_bfd.objdump.txt || true
            for sym in lsmash_create_root allocate_box_by_default lsmash_memdup; do
              echo "--- clang+bfd exe $sym ---"
              sed -n "/<$sym>/,/^$/p" lsmash_exe_clang_bfd.objdump.txt || true
            done
          fi
          if [ -f ./lsmash_root_smoke_gcc_lld.exe ]; then
            echo '=== gcc+lld exe disassembly ==='
            objdump -drC ./lsmash_root_smoke_gcc_lld.exe > lsmash_exe_gcc_lld.objdump.txt
            grep -nE 'isom_root_abstract_box_default|<lsmash_create_root>|<allocate_box_by_default>|<lsmash_memdup>' lsmash_exe_gcc_lld.objdump.txt || true
            for sym in lsmash_create_root allocate_box_by_default lsmash_memdup; do
              echo "--- gcc+lld exe $sym ---"
              sed -n "/<$sym>/,/^$/p" lsmash_exe_gcc_lld.objdump.txt || true
            done
            echo '=== gcc+lld gdb ==='
            gdb -batch -q ./lsmash_root_smoke_gcc_lld.exe \
              -ex run \
              -ex "bt full" \
              -ex "p/x &isom_root_abstract_box_default" \
              -ex "p/x sizeof(isom_root_abstract_box_default)" \
              -ex "x/16gx &isom_root_abstract_box_default" \
              -ex "disassemble /r lsmash_create_root" \
              -ex "disassemble /r allocate_box_by_default" \
              -ex "disassemble /r lsmash_memdup" \
              -ex "info address isom_root_abstract_box_default" \
              -ex "info address lsmash_create_root" \
              -ex "info address allocate_box_by_default" \
              -ex "info address lsmash_memdup" \
              -ex "info files" \
              -ex "info sharedlibrary" \
              -ex "info registers" || true
          fi
          gdb -batch -q ./lsmash_root_smoke.exe \
            -ex run \
            -ex "bt full" \
            -ex "p/x &isom_root_abstract_box_default" \
            -ex "p/x sizeof(isom_root_abstract_box_default)" \
            -ex "x/16gx &isom_root_abstract_box_default" \
            -ex "disassemble /r lsmash_create_root" \
            -ex "disassemble /r allocate_box_by_default" \
            -ex "disassemble /r lsmash_memdup" \
            -ex "info address isom_root_abstract_box_default" \
            -ex "info address lsmash_create_root" \
            -ex "info address allocate_box_by_default" \
            -ex "info address lsmash_memdup" \
            -ex "info files" \
            -ex "info sharedlibrary" \
            -ex "info registers"
          exit 1
        fi

    - name: Compile mimalloc
      if: matrix.use_mimalloc == 'ON'
      working-directory: mimalloc
      run: |
        mkdir build
        cd build
        cmake -GNinja .. -DCMAKE_INSTALL_PREFIX=/usr/local \
          -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=ON \
          -DMI_BUILD_SHARED=OFF -DMI_BUILD_STATIC=ON -DMI_BUILD_OBJECT=OFF \
          -DMI_BUILD_TESTS=OFF -DMI_USE_CXX=ON
        ninja
        ninja install
        # Create compatibility symlink for CMake (mimalloc v3.x uses versioned directories)
        shopt -s nullglob
        for dir in /usr/local/lib/cmake/mimalloc-*; do
          ln -s "$dir" /usr/local/lib/cmake/mimalloc
          break
        done

    # === Build x265 (All variants in parallel) ===
    - name: Setup build dirs
      run: mkdir -p build/8b build/10b build/12b build/8b-lib build/12b-lib build/all

    - name: Compile x265 (all variants parallel)
      env:
        PKG_CONFIG_PATH: /usr/local/lib/pkgconfig:/clang64/lib/pkgconfig
      run: |
        CPU=${{matrix.target_cpu}}
        PGO_FLAG=""
        if [ -f build/x265.profdata ]; then
          PGO_FLAG="-fprofile-instr-use=$GITHUB_WORKSPACE/build/x265.profdata"
          echo "Using PGO profdata"
        else
          echo "Building without PGO"
        fi

        CXX_FLAGS="-O3 -flto=thin -fmerge-all-constants -I/usr/local/include $PGO_FLAG"

        # === Configure and build 8bit CLI ===
        echo "=== Building 8bit CLI ==="
        cmake -GNinja x265/source -B build/8b -DCMAKE_PREFIX_PATH=/usr/local \
          -DENABLE_SHARED=OFF -DENABLE_LAVF=ON -DENABLE_STATIC_LAVF=ON \
          -DENABLE_MKV=ON -DENABLE_LSMASH=ON -DTARGET_CPU=$CPU \
          -DENABLE_AVISYNTH=OFF -DENABLE_VPYSYNTH=OFF \
          -DUSE_MIMALLOC=${{ matrix.use_mimalloc || 'ON' }} -DENABLE_UNITY_BUILD=ON \
          -DCMAKE_ASM_NASM_FLAGS=-w-macro-params-legacy \
          -DCMAKE_CXX_FLAGS="$CXX_FLAGS" \
          -DCMAKE_EXE_LINKER_FLAGS="-flto=thin"
        ninja -C build/8b &

        # === Configure and build 10bit CLI ===
        echo "=== Building 10bit CLI ==="
        cmake -GNinja x265/source -B build/10b -DCMAKE_PREFIX_PATH=/usr/local \
          -DHIGH_BIT_DEPTH=ON -DENABLE_SHARED=OFF -DENABLE_LAVF=ON -DENABLE_STATIC_LAVF=ON \
          -DENABLE_MKV=ON -DENABLE_LSMASH=ON -DTARGET_CPU=$CPU \
          -DENABLE_AVISYNTH=OFF -DENABLE_VPYSYNTH=OFF \
          -DUSE_MIMALLOC=${{ matrix.use_mimalloc || 'ON' }} -DENABLE_UNITY_BUILD=ON \
          -DCMAKE_ASM_NASM_FLAGS=-w-macro-params-legacy \
          -DCMAKE_CXX_FLAGS="$CXX_FLAGS" \
          -DCMAKE_EXE_LINKER_FLAGS="-flto=thin"
        ninja -C build/10b &

        # === Configure and build 12bit CLI ===
        echo "=== Building 12bit CLI ==="
        cmake -GNinja x265/source -B build/12b -DCMAKE_PREFIX_PATH=/usr/local \
          -DHIGH_BIT_DEPTH=ON -DMAIN12=ON -DENABLE_SHARED=OFF -DENABLE_LAVF=ON -DENABLE_STATIC_LAVF=ON \
          -DENABLE_MKV=ON -DENABLE_LSMASH=ON -DTARGET_CPU=$CPU \
          -DENABLE_AVISYNTH=OFF -DENABLE_VPYSYNTH=OFF \
          -DUSE_MIMALLOC=${{ matrix.use_mimalloc || 'ON' }} -DENABLE_UNITY_BUILD=ON \
          -DCMAKE_ASM_NASM_FLAGS=-w-macro-params-legacy \
          -DCMAKE_CXX_FLAGS="$CXX_FLAGS" \
          -DCMAKE_EXE_LINKER_FLAGS="-flto=thin"
        ninja -C build/12b &

        # === Configure and build 8bit multilib ===
        echo "=== Building 8bit multilib ==="
        cmake -GNinja x265/source -B build/8b-lib -DCMAKE_PREFIX_PATH=/usr/local \
          -DENABLE_SHARED=OFF -DENABLE_CLI=OFF -DEXPORT_C_API=OFF \
          -DENABLE_LAVF=ON -DENABLE_STATIC_LAVF=ON \
          -DENABLE_MKV=ON -DENABLE_LSMASH=ON -DTARGET_CPU=$CPU \
          -DENABLE_AVISYNTH=OFF -DENABLE_VPYSYNTH=OFF \
          -DUSE_MIMALLOC=${{ matrix.use_mimalloc || 'ON' }} -DENABLE_UNITY_BUILD=ON \
          -DCMAKE_ASM_NASM_FLAGS=-w-macro-params-legacy \
          -DCMAKE_CXX_FLAGS="$CXX_FLAGS" \
          -DCMAKE_EXE_LINKER_FLAGS="-flto=thin"
        ninja -C build/8b-lib &

        # === Configure and build 12bit multilib ===
        echo "=== Building 12bit multilib ==="
        cmake -GNinja x265/source -B build/12b-lib -DCMAKE_PREFIX_PATH=/usr/local \
          -DHIGH_BIT_DEPTH=ON -DMAIN12=ON -DENABLE_SHARED=OFF -DENABLE_CLI=OFF -DEXPORT_C_API=OFF \
          -DENABLE_LAVF=ON -DENABLE_STATIC_LAVF=ON \
          -DENABLE_MKV=ON -DENABLE_LSMASH=ON -DTARGET_CPU=$CPU \
          -DENABLE_AVISYNTH=OFF -DENABLE_VPYSYNTH=OFF \
          -DUSE_MIMALLOC=${{ matrix.use_mimalloc || 'ON' }} -DENABLE_UNITY_BUILD=ON \
          -DCMAKE_ASM_NASM_FLAGS=-w-macro-params-legacy \
          -DCMAKE_CXX_FLAGS="$CXX_FLAGS" \
          -DCMAKE_EXE_LINKER_FLAGS="-flto=thin"
        ninja -C build/12b-lib &

        wait
        echo "=== All CLI and multilib builds complete ==="

        # === Build all-bit-depth version ===
        echo "=== Building all-bit-depth version ==="
        cp build/8b-lib/libx265.a build/all/libx265_8b.a
        cp build/12b-lib/libx265.a build/all/libx265_12b.a

        cmake -GNinja x265/source -B build/all -DCMAKE_PREFIX_PATH=/usr/local \
          -DEXTRA_LIB="x265_8b.a;x265_12b.a" -DEXTRA_LINK_FLAGS=-L. \
          -DLINKED_8BIT=ON -DLINKED_12BIT=ON -DENABLE_HDR10_PLUS=ON \
          -DENABLE_AVISYNTH=OFF -DENABLE_VPYSYNTH=OFF -DHIGH_BIT_DEPTH=ON \
          -DENABLE_SHARED=OFF -DENABLE_LAVF=ON -DENABLE_STATIC_LAVF=ON \
          -DENABLE_MKV=ON -DENABLE_LSMASH=ON -DTARGET_CPU=$CPU \
          -DUSE_MIMALLOC=${{ matrix.use_mimalloc || 'ON' }} -DENABLE_UNITY_BUILD=ON \
          -DCMAKE_ASM_NASM_FLAGS=-w-macro-params-legacy \
          -DCMAKE_CXX_FLAGS="$CXX_FLAGS" \
          -DCMAKE_EXE_LINKER_FLAGS="-flto=thin"
        ninja -C build/all
        echo "=== All builds complete ==="

        # Strip all executables
        strip -s build/8b/x265.exe
        strip -s build/10b/x265.exe
        strip -s build/12b/x265.exe
        strip -s build/all/x265.exe

    - name: MP4 smoke (8bit CLI)
      run: |
        ffmpeg -hide_banner -loglevel error -f lavfi -i testsrc2=size=128x72:rate=24 -frames:v 16 -pix_fmt yuv420p smoke.y4m
        build/8b/x265.exe --input smoke.y4m --input-res 128x72 --fps 24 --frames 16 --bframes 4 --keyint 8 --min-keyint 8 --no-open-gop --output smoke.mp4
        ffprobe -v error -show_streams -select_streams v:0 smoke.mp4 > smoke_stream.txt
        ffprobe -v error -show_entries stream=time_base,r_frame_rate,avg_frame_rate,duration,nal_length_size -select_streams v:0 -of default=noprint_wrappers=1 smoke.mp4 > smoke_timing.txt
        ffprobe -v error -show_entries format=format_name,duration -of default=noprint_wrappers=1 smoke.mp4 > smoke_format.txt
        ffprobe -v error -count_frames -select_streams v:0 -show_entries stream=nb_read_frames -of default=noprint_wrappers=1 smoke.mp4 > smoke_count.txt
        ffprobe -v error -show_packets -select_streams v:0 -show_entries packet=flags -of csv=p=0 smoke.mp4 > smoke_packets.csv
        ffprobe -v error -select_streams v:0 -show_entries frame=pts_time,pkt_dts_time,pkt_duration_time,key_frame -of csv=p=0 smoke.mp4 > smoke_frames.csv
        grep -q "format_name=mov,mp4,m4a,3gp,3g2,mj2" smoke_format.txt
        grep -q "duration=" smoke_format.txt
        grep -q "codec_name=hevc" smoke_stream.txt
        grep -q "codec_tag_string=hvc1" smoke_stream.txt
        grep -q "codec_type=video" smoke_stream.txt
        grep -q "width=128" smoke_stream.txt
        grep -q "height=72" smoke_stream.txt
        grep -q "pix_fmt=yuv420p" smoke_stream.txt
        awk -F= '/^extradata_size=/{ if (($2+0) > 0) found=1 } END { if (!found) exit 1 }' smoke_stream.txt
        grep -q "time_base=" smoke_timing.txt
        grep -q "time_base=1/24" smoke_timing.txt
        grep -q "nal_length_size=4" smoke_timing.txt
        grep -q "r_frame_rate=24/1" smoke_timing.txt
        grep -q "avg_frame_rate=24/1" smoke_timing.txt
        grep -q "nb_read_frames=16" smoke_count.txt
        test -s smoke_timing.txt
        test -s smoke_format.txt
        test -s smoke_count.txt
        test -s smoke_packets.csv
        test -s smoke_frames.csv
        awk -F, 'NR == 1 { if ($1 !~ /K/) exit 1 } END { if (NR != 16) exit 1 }' smoke_packets.csv
        awk -F, 'NF >= 2 && $2 != "N/A" { if (seen && ($2+0) < prev) exit 1; prev=$2+0; seen=1 } END { if (!seen) exit 1 }' smoke_frames.csv
        awk -F, 'NF >= 2 && $1 != "N/A" && $2 != "N/A" { if (($1+0) > ($2+0)) diff=1 } END { if (!diff) exit 1 }' smoke_frames.csv
        awk -F, 'NR == 1 { if (NF < 4 || $4 != 1) exit 1 }' smoke_frames.csv
        awk -F, 'NR == 1 { if (NF < 1 || $1 == "N/A") exit 1 }' smoke_frames.csv
        awk -F, 'NR == 1 { if (($1+0) < -0.001 || ($1+0) > 0.05) exit 1 }' smoke_frames.csv
        awk -F, 'NR == 1 { if (NF < 3 || $3 == "N/A") exit 1; if (($3+0) < 0.03 || ($3+0) > 0.05) exit 1 }' smoke_frames.csv
        awk -F, '$3 == "N/A" { exit 1 } { if (($3+0) < 0.03 || ($3+0) > 0.05) exit 1 } END { if (NR != 16) exit 1 }' smoke_frames.csv
        awk -F, 'NR > 1 && $1 != "N/A" && prev != "" { delta = ($1+0) - prev; if (delta < 0.03 || delta > 0.05) exit 1 } { if ($1 != "N/A") prev = $1+0 } END { if (NR < 2) exit 1 }' smoke_frames.csv
        awk -F, 'NR == 1 { if (NF < 2 || $2 == "N/A") exit 1 }' smoke_frames.csv
        awk -F, 'NR == 1 { if (($2+0) < -0.001 || ($2+0) > 0.05) exit 1 }' smoke_frames.csv
        awk -F, 'NR == 1 { if (($1+0) < ($2+0)) exit 1 }' smoke_frames.csv
        awk -F, 'END { if (NR != 16) exit 1; if (NF < 2 || $1 == "N/A" || $2 == "N/A") exit 1; if (($1+0) < 0.55 || ($1+0) > 0.75) exit 1; if (($2+0) < 0 || ($2+0) > ($1+0)) exit 1 }' smoke_frames.csv
        awk -F, 'NR > 8 && NF >= 2 && $1 != "N/A" && $2 != "N/A" { if (($1+0) > ($2+0)) diff=1 } END { if (!diff) exit 1 }' smoke_frames.csv
        awk -F, 'NF >= 4 && $4 == 1 { kf++; if (kf == 2 && NR != 9) exit 1 } END { if (kf < 2) exit 1 }' smoke_frames.csv
        awk -F= '/^duration=/{ d=$2+0 } END { if (d < 0.60 || d > 0.75) exit 1 }' smoke_format.txt
        awk -F= '/^duration=/{ d=$2+0 } END { if (d < 0.60 || d > 0.75) exit 1 }' smoke_timing.txt
        awk -F, 'BEGIN { first=""; last=""; dur="" } $1 != "N/A" { if (first == "") first = $1+0; last = $1+0 } $3 != "N/A" { dur = $3+0 } END { if (first == "" || last == "" || dur == "") exit 1; span = (last - first) + dur; if (span < 0.60 || span > 0.75) exit 1 }' smoke_frames.csv

