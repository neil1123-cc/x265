name: Build x265 profiling binaries
description: Build shared profiling-oriented x265 binaries for Windows CI

inputs:
  target-cpu:
    description: Target CPU passed to CMake
    required: true
  profile-class:
    description: 'Profiling output class: 8b-lib, 12b-lib, or all'
    required: true
  use-mimalloc:
    description: Whether to enable mimalloc in x265 builds
    required: false
    default: 'true'
  source-dir:
    description: Path to the x265 source directory from the workspace root
    required: false
    default: x265/source
  build-prefix-path:
    description: Prefix path passed to CMake
    required: false
    default: /usr/local
  common-cxx-flags:
    description: Shared non-profiling CXX flags reserved for future profiling action variants
    required: false
    default: -O3 -flto=thin -fmerge-all-constants -I/usr/local/include
  profiling-cxx-flags:
    description: CXX flags for the profiling executable build
    required: false
    default: -O3 -flto=thin -fmerge-all-constants -fprofile-instr-generate -fprofile-update=atomic -I/usr/local/include
  output-name:
    description: Output filename for the profiling executable
    required: false
    default: x265-profiling.exe
  enable-lsmash:
    description: Whether to enable L-SMASH support in the profiling executable build
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: Setup build dir
      shell: msys2 {0}
      run: |
        mkdir -p build/8b build/10b build/12b
        cp "${{ github.action_path }}/../../scripts/cxx20_scan_helpers.sh" build/cxx20_scan_helpers.sh

    - name: Build 8b-lib profiling CLI
      if: ${{ inputs.profile-class == '8b-lib' }}
      shell: msys2 {0}
      env:
        PKG_CONFIG_PATH: /usr/local/lib/pkgconfig:/clang64/lib/pkgconfig
      run: |
        source build/cxx20_scan_helpers.sh
        CXX20_CHECK_SCRIPT="${{ github.action_path }}/../../scripts/check_compile_commands.py"
        lsmash_args=()
        if [ "${{ inputs.enable-lsmash }}" = 'true' ] || [ "${{ inputs.enable-lsmash }}" = 'ON' ]; then
          lsmash_args=(-DENABLE_LSMASH=ON)
        fi
        cmake_common_args=(
          -GNinja "${{ inputs.source-dir }}"
          -DCMAKE_PREFIX_PATH=${{ inputs.build-prefix-path }}
          -DENABLE_LAVF=ON
          -DENABLE_STATIC_LAVF=ON
          -DENABLE_MKV=ON
          -DTARGET_CPU=${{ inputs.target-cpu }}
          -DENABLE_AVISYNTH=OFF
          -DENABLE_VPYSYNTH=OFF
          -DUSE_MIMALLOC=${{ inputs.use-mimalloc }}
          -DENABLE_UNITY_BUILD=ON
          -DCMAKE_ASM_NASM_FLAGS=-w-macro-params-legacy
          -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
          "${lsmash_args[@]}"
        )

        configure_x265() {
          local build_dir="$1"
          shift
          cmake "${cmake_common_args[@]}" -B "$build_dir" "$@"
        }

        configure_x265 build/8b \
          -DENABLE_SHARED=OFF \
          -DCMAKE_CXX_FLAGS="${{ inputs.profiling-cxx-flags }}" \
          -DCMAKE_EXE_LINKER_FLAGS="-flto=thin"
        check_cxx20_commands_profiling build/8b
        ninja -C build/8b
        mv build/8b/x265.exe build/8b/${{ inputs.output-name }}

    - name: Build 12b-lib profiling CLI
      if: ${{ inputs.profile-class == '12b-lib' }}
      shell: msys2 {0}
      env:
        PKG_CONFIG_PATH: /usr/local/lib/pkgconfig:/clang64/lib/pkgconfig
      run: |
        source build/cxx20_scan_helpers.sh
        CXX20_CHECK_SCRIPT="${{ github.action_path }}/../../scripts/check_compile_commands.py"
        lsmash_args=()
        if [ "${{ inputs.enable-lsmash }}" = 'true' ] || [ "${{ inputs.enable-lsmash }}" = 'ON' ]; then
          lsmash_args=(-DENABLE_LSMASH=ON)
        fi
        cmake_common_args=(
          -GNinja "${{ inputs.source-dir }}"
          -DCMAKE_PREFIX_PATH=${{ inputs.build-prefix-path }}
          -DENABLE_LAVF=ON
          -DENABLE_STATIC_LAVF=ON
          -DENABLE_MKV=ON
          -DTARGET_CPU=${{ inputs.target-cpu }}
          -DENABLE_AVISYNTH=OFF
          -DENABLE_VPYSYNTH=OFF
          -DUSE_MIMALLOC=${{ inputs.use-mimalloc }}
          -DENABLE_UNITY_BUILD=ON
          -DCMAKE_ASM_NASM_FLAGS=-w-macro-params-legacy
          -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
          "${lsmash_args[@]}"
        )

        configure_x265() {
          local build_dir="$1"
          shift
          cmake "${cmake_common_args[@]}" -B "$build_dir" "$@"
        }

        configure_x265 build/12b \
          -DHIGH_BIT_DEPTH=ON -DMAIN12=ON \
          -DENABLE_SHARED=OFF \
          -DCMAKE_CXX_FLAGS="${{ inputs.profiling-cxx-flags }}" \
          -DCMAKE_EXE_LINKER_FLAGS="-flto=thin"
        check_cxx20_commands_profiling build/12b
        ninja -C build/12b
        mv build/12b/x265.exe build/12b/${{ inputs.output-name }}

    - name: Build all profiling CLI
      if: ${{ inputs.profile-class == 'all' }}
      shell: msys2 {0}
      env:
        PKG_CONFIG_PATH: /usr/local/lib/pkgconfig:/clang64/lib/pkgconfig
      run: |
        source build/cxx20_scan_helpers.sh
        CXX20_CHECK_SCRIPT="${{ github.action_path }}/../../scripts/check_compile_commands.py"
        lsmash_args=()
        if [ "${{ inputs.enable-lsmash }}" = 'true' ] || [ "${{ inputs.enable-lsmash }}" = 'ON' ]; then
          lsmash_args=(-DENABLE_LSMASH=ON)
        fi
        cmake_common_args=(
          -GNinja "${{ inputs.source-dir }}"
          -DCMAKE_PREFIX_PATH=${{ inputs.build-prefix-path }}
          -DEXPORT_C_API=OFF
          -DENABLE_SHARED=OFF
          -DENABLE_CLI=OFF
          -DENABLE_LAVF=ON
          -DENABLE_STATIC_LAVF=ON
          -DENABLE_MKV=ON
          -DTARGET_CPU=${{ inputs.target-cpu }}
          -DENABLE_AVISYNTH=OFF
          -DENABLE_VPYSYNTH=OFF
          -DUSE_MIMALLOC=${{ inputs.use-mimalloc }}
          -DENABLE_UNITY_BUILD=ON
          -DCMAKE_ASM_NASM_FLAGS=-w-macro-params-legacy
          -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
          "${lsmash_args[@]}"
        )

        configure_x265() {
          local build_dir="$1"
          shift
          cmake "${cmake_common_args[@]}" -B "$build_dir" "$@"
        }

        NPROC=$(nproc)
        NINJA_JOBS_PAIR=$(( (NPROC + 1) / 2 ))
        echo "Ninja job limit for paired profiling helper builds: ${NINJA_JOBS_PAIR}"
        wait_for_jobs() {
          local status=0
          local pid

          for pid in "$@"; do
            if ! wait "$pid"; then
              status=1
            fi
          done

          return "$status"
        }

        configure_x265 build/8b \
          -DCMAKE_CXX_FLAGS="${{ inputs.profiling-cxx-flags }}"
        check_cxx20_commands_profiling build/8b
        ninja -C build/8b -j "$NINJA_JOBS_PAIR" &
        ninja_8b_pid=$!

        configure_x265 build/12b \
          -DHIGH_BIT_DEPTH=ON -DMAIN12=ON \
          -DCMAKE_CXX_FLAGS="${{ inputs.profiling-cxx-flags }}"
        check_cxx20_commands_profiling build/12b
        ninja -C build/12b -j "$NINJA_JOBS_PAIR" &
        ninja_12b_pid=$!

        wait_for_jobs "$ninja_8b_pid" "$ninja_12b_pid"
        cp build/8b/libx265.a build/10b/libx265_8b.a
        cp build/12b/libx265.a build/10b/libx265_12b.a

        cd build/10b
        cmake ../../${{ inputs.source-dir }} \
          -GNinja \
          -DCMAKE_PREFIX_PATH=${{ inputs.build-prefix-path }} \
          -DTARGET_CPU=${{ inputs.target-cpu }} \
          -DENABLE_AVISYNTH=OFF \
          -DENABLE_VPYSYNTH=OFF \
          -DUSE_MIMALLOC=${{ inputs.use-mimalloc }} \
          -DENABLE_UNITY_BUILD=ON \
          -DCMAKE_ASM_NASM_FLAGS=-w-macro-params-legacy \
          -DENABLE_LAVF=ON \
          -DENABLE_STATIC_LAVF=ON \
          -DENABLE_MKV=ON \
          "${lsmash_args[@]}" \
          -DEXTRA_LIB="x265_8b.a;x265_12b.a" -DEXTRA_LINK_FLAGS=-L. \
          -DLINKED_8BIT=ON -DLINKED_12BIT=ON -DENABLE_HDR10_PLUS=ON \
          -DHIGH_BIT_DEPTH=ON -DENABLE_SHARED=OFF \
          -DCMAKE_CXX_FLAGS="${{ inputs.profiling-cxx-flags }}" \
          -DCMAKE_EXE_LINKER_FLAGS="-flto=thin"
        check_cxx20_commands_profiling .
        ninja
        mv x265.exe ${{ inputs.output-name }}
